<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buck Converter Ripple — Post-LC Filter</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 19</div>
  <h1>Buck Converter: Post-Filter LC Ripple Reduction</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Post-Filter L (µH) <span class="ctrl-value" id="lbl-l">4.7 µH</span></div>
      <input type="range" id="sl-l" min="0.1" max="47" value="4.7" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Post-Filter C (µF) <span class="ctrl-value" id="lbl-c">10 µF</span></div>
      <input type="range" id="sl-c" min="1" max="100" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Buck fsw (kHz) <span class="ctrl-value" id="lbl-f">400 kHz</span></div>
      <input type="range" id="sl-f" min="50" max="2000" value="400" step="50">
    </div>
    <div class="result-box" id="result">Adjust post-filter to meet 5mV spec</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slL=document.getElementById('sl-l'),slC=document.getElementById('sl-c'),slF=document.getElementById('sl-f');
const lblL=document.getElementById('lbl-l'),lblC=document.getElementById('lbl-c'),lblF=document.getElementById('lbl-f');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const L=parseFloat(slL.value)*1e-6;
  const C=parseFloat(slC.value)*1e-6;
  const fsw=parseFloat(slF.value)*1e3;
  lblL.textContent=parseFloat(slL.value).toFixed(1)+' µH';
  lblC.textContent=slC.value+' µF';
  lblF.textContent=slF.value+' kHz';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  // Input ripple (buck output before post filter): 50mV
  const Vripple_in=50e-3,VDC=5;
  // Post-filter corner
  const f0=1/(2*Math.PI*Math.sqrt(L*C));
  const ratio=fsw/f0;
  // 2nd order attenuation
  const atten=ratio>1?1/(ratio*ratio):1;
  const Vripple_out=Vripple_in*atten;
  // Show two waveforms
  const nCycles=3;
  const tTotal=nCycles/fsw;
  const vMin=VDC-0.06,vMax=VDC+0.06;
  function yPx(v){return pad+plotH*(1-(v-vMin)/(vMax-vMin))}
  // Grid
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  [VDC-0.05,VDC-0.025,VDC,VDC+0.025,VDC+0.05].forEach(v=>{ctx.beginPath();ctx.moveTo(pad,yPx(v));ctx.lineTo(W-pad,yPx(v));ctx.stroke()});
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // Spec line: 5mV
  ctx.setLineDash([5,3]);ctx.strokeStyle='#f57c00';ctx.lineWidth=1.5;
  if(VDC+5e-3<=vMax){ctx.beginPath();ctx.moveTo(pad,yPx(VDC+5e-3));ctx.lineTo(W-pad,yPx(VDC+5e-3));ctx.stroke();}
  if(VDC-5e-3>=vMin){ctx.beginPath();ctx.moveTo(pad,yPx(VDC-5e-3));ctx.lineTo(W-pad,yPx(VDC-5e-3));ctx.stroke();}
  ctx.fillStyle='#f57c00';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('±5mV spec',pad+4,yPx(VDC+5e-3)-3);
  ctx.setLineDash([]);
  // Buck output (before post-filter): sawtooth-like 50mV ripple
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const phase=(t*fsw)%1;
    const v=VDC+Vripple_in*(phase-0.5);
    px===0?ctx.moveTo(pad+px,yPx(Math.max(vMin,Math.min(vMax,v)))):ctx.lineTo(pad+px,yPx(Math.max(vMin,Math.min(vMax,v))));
  }ctx.stroke();
  // After post-filter: much smaller ripple
  ctx.strokeStyle='#2e7d32';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const phase=(t*fsw)%1;
    const v=VDC+Vripple_out*(phase-0.5);
    px===0?ctx.moveTo(pad+px,yPx(Math.max(vMin,Math.min(vMax,v)))):ctx.lineTo(pad+px,yPx(Math.max(vMin,Math.min(vMax,v))));
  }ctx.stroke();
  // Labels
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  [vMin,VDC-0.025,VDC,VDC+0.025,vMax].forEach(v=>ctx.fillText(v.toFixed(3)+'V',pad-4,yPx(v)+3));
  ctx.textAlign='left';ctx.font='11px system-ui';
  ctx.fillStyle='#e53935';ctx.fillText('Buck output: ±'+( Vripple_in*1000).toFixed(0)+'mV ripple',pad+8,pad+16);
  ctx.fillStyle='#2e7d32';ctx.fillText('After post-filter: ±'+(Vripple_out*1000).toFixed(1)+'mV',pad+8,pad+30);
  const meetSpec=Vripple_out*1000<=5;
  result.innerHTML='<b>Post-filter f₀ = '+(f0/1000).toFixed(0)+'kHz</b><br>fsw/f₀ = <b>'+ratio.toFixed(0)+'×</b><br>Ripple: 50mV → <b>'+(Vripple_out*1000).toFixed(2)+'mV</b><br>Spec (5mV): <b>'+(meetSpec?'✅ MET!':'⚠️ Not met — increase LC')+'</b><br><b>Rule: Use ceramic caps for post-filter (low ESR)</b>';
}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slL,slC,slF].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
