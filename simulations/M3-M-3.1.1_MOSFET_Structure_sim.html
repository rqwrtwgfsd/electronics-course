<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-M-3.1.1 MOSFET I-V Characteristics</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-M-3.1.1 — NMOS I-V Characteristics (Family of Curves)</h1>
<p class="note">Adjust V_GS and V_DD to explore triode and saturation regions. Load line shows Q-point.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>V_GS (V): <span id="vgsv">3</span></label><input type="range" id="vgs" min="0" max="5" value="3" step="0.1" oninput="sv('vgsv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>V_T (V): <span id="vtv">1</span></label><input type="range" id="vt" min="0.3" max="3" value="1" step="0.1" oninput="sv('vtv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>k_n (mA/V²): <span id="knv">2</span></label><input type="range" id="kn" min="0.1" max="10" value="2" step="0.1" oninput="sv('knv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_D (kΩ): <span id="rdv">2</span></label><input type="range" id="rd" min="0.1" max="10" value="2" step="0.1" oninput="sv('rdv',parseFloat(this.value).toFixed(1));draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_OD (V_GS−V_T): <span id="vod">2.0</span> V</div>
  <div class="ro">I_D: <span id="id">0</span> mA</div>
  <div class="ro">V_DS: <span id="vds">0</span> V</div>
  <div class="ro">Region: <span id="region">-</span></div>
  <div class="ro">g_m: <span id="gm">0</span> mA/V</div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const VDD=12;
window.addEventListener('resize',()=>resize(cv,draw));

function calcId(vgs,vds,vt,kn){
  if(vgs<=vt) return 0;
  const vod=vgs-vt;
  if(vds<vod) return kn*(vod*vds - vds*vds/2)*1e-3; // triode (mA)
  else return (kn/2)*vod*vod*1e-3; // saturation (mA)
}

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const VGS=gs('vgs'), VT=gs('vt'), KN=gs('kn'), RD=gs('rd')*1000;
  const vod=Math.max(0,VGS-VT);

  // Find operating point by load line intersection
  let id_op=0, vds_op=0;
  for(let vd=0;vd<=VDD;vd+=0.01){
    const id_curve=calcId(VGS,vd,VT,KN);
    const id_load=(VDD-vd)/RD*1000;
    if(id_curve>=id_load-0.01){ id_op=id_curve; vds_op=vd; break; }
  }
  // Refine
  id_op=(VDD-vds_op)/RD*1000;
  const region = VGS<=VT?'Cutoff':(vds_op<vod?'Triode':'Saturation');
  const gm = vod>0?KN*vod:0; // mA/V

  sv('vod',vod.toFixed(2));
  sv('id',id_op.toFixed(3));
  sv('vds',vds_op.toFixed(2));
  sv('region',region);
  sv('gm',gm.toFixed(2));

  const idmax=Math.max(VDD/RD*1000*1.2, 5);
  const xsc=(W-2*pad)/VDD, ysc=(H-2*pad)/idmax;
  drawAxes(ctx,W,H,pad,'V_DS (V)','I_D (mA)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let v=0;v<=VDD;v+=2){
    const x=pad+v*xsc;
    ctx.fillText(v,x-5,H-pad+13*dpr);
    ctx.beginPath();ctx.strokeStyle=dark?'#30363d':'#dddddd';ctx.lineWidth=0.5;
    ctx.moveTo(x,pad);ctx.lineTo(x,H-pad);ctx.stroke();
  }
  for(let i=0;i<=idmax;i+=Math.ceil(idmax/5)){
    const y=H-pad-i*ysc;
    ctx.fillText(i,pad-22*dpr,y+4);
    ctx.beginPath();ctx.strokeStyle=dark?'#30363d':'#dddddd';ctx.lineWidth=0.5;
    ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();
  }

  // Saturation boundary curve
  ctx.strokeStyle='#ffa502'; ctx.lineWidth=1*dpr; ctx.setLineDash([3*dpr,3*dpr]);
  ctx.beginPath();
  for(let vod2=0;vod2<=5;vod2+=0.05){
    const vgs2=vod2+VT; const id_sat=(KN/2)*vod2*vod2*1e-3;
    const x=pad+vod2*xsc; const y=H-pad-Math.min(id_sat,idmax)*ysc;
    if(vod2===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Family of curves (different V_GS)
  const colors=['#ff6b6b','#ffa502','#2ed573','#1e90ff','#a29bfe','#fd79a8'];
  [VT+0.5, VT+1, VT+1.5, VT+2, VT+2.5, VT+3].forEach((vg,idx)=>{
    if(vg<VT) return;
    ctx.strokeStyle=colors[idx]; ctx.lineWidth=1.5*dpr; ctx.beginPath();
    for(let vd=0;vd<=VDD;vd+=0.05){
      const id=calcId(vg,vd,VT,KN);
      const x=pad+vd*xsc; const y=H-pad-Math.min(id,idmax)*ysc;
      if(vd===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    const id_sat=(KN/2)*Math.pow(vg-VT,2)*1e-3;
    const yl=H-pad-Math.min(id_sat,idmax)*ysc;
    ctx.fillStyle=colors[idx]; ctx.font=`${8*dpr}px system-ui`;
    ctx.fillText(`${(vg-VT).toFixed(1)}V`,W-pad+2*dpr,Math.max(pad+idx*10*dpr,yl));
  });

  // Load line
  ctx.strokeStyle=acc; ctx.lineWidth=2*dpr;
  ctx.beginPath(); ctx.moveTo(pad+VDD*xsc,H-pad); ctx.lineTo(pad,H-pad-VDD/RD*1000*ysc); ctx.stroke();

  // Q-point
  const qx=pad+vds_op*xsc, qy=H-pad-Math.min(id_op,idmax)*ysc;
  ctx.beginPath(); ctx.arc(qx,qy,6*dpr,0,2*Math.PI);
  ctx.fillStyle=acc; ctx.fill();
  ctx.fillStyle=acc; ctx.font=`${10*dpr}px system-ui`;
  ctx.fillText('Q',qx+7*dpr,qy-5*dpr);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`V_GS=${VGS.toFixed(1)}V  V_OD=${vod.toFixed(2)}V  I_D=${id_op.toFixed(3)}mA  V_DS=${vds_op.toFixed(2)}V  [${region}]`,pad,pad-8*dpr);
}
draw();
</script></body></html>
