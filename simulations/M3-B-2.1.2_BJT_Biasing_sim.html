<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-B-2.1.2 BJT Biasing Simulation</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-B-2.1.2 — Voltage Divider Bias DC Operating Point</h1>
<p class="note">Design a voltage divider bias circuit. Adjust R1, R2, RC, RE to set the Q-point.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>R1 (kΩ): <span id="r1v">82</span></label><input type="range" id="r1" min="10" max="200" value="82" step="1" oninput="sv('r1v',this.value);draw();"></div>
  <div class="ctrl"><label>R2 (kΩ): <span id="r2v">12</span></label><input type="range" id="r2" min="1" max="100" value="12" step="1" oninput="sv('r2v',this.value);draw();"></div>
  <div class="ctrl"><label>RC (kΩ): <span id="rcv">4.7</span></label><input type="range" id="rc" min="0.5" max="10" value="4.7" step="0.1" oninput="sv('rcv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>RE (Ω): <span id="rev">470</span></label><input type="range" id="re" min="0" max="2000" value="470" step="10" oninput="sv('rev',this.value);draw();"></div>
  <div class="ctrl"><label>β: <span id="betav">150</span></label><input type="range" id="beta" min="50" max="400" value="150" step="10" oninput="sv('betav',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_B: <span id="vb">0</span> V</div>
  <div class="ro">I_C: <span id="ic">0</span> mA</div>
  <div class="ro">V_CE: <span id="vce">0</span> V</div>
  <div class="ro">Region: <span id="region">-</span></div>
  <div class="ro">A_v (w/ bypass): <span id="av">0</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));
const Vcc=9;

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const R1=gs('r1')*1000, R2=gs('r2')*1000;
  const RC=gs('rc')*1000, RE=gs('re');
  const beta=gs('beta');

  const VB = Vcc*R2/(R1+R2);
  const VE = VB-0.7;
  const IC = VE>0 ? VE/RE : 0;
  const VCE = Vcc - IC*(RC+RE);
  const region = IC<=0 ? 'Cutoff' : (VCE<0.2?'Saturation':(VCE<0.5?'Near-sat':'Active'));
  const re_small = 0.026/Math.max(IC/1000,1e-6);
  const Av = -(RC/re_small).toFixed(1);

  sv('vb',VB.toFixed(2)); sv('ic',(IC*1000).toFixed(2)); sv('vce',VCE.toFixed(2));
  sv('region',region); sv('av',Av);

  // Load line + Q-point
  const xsc=(W-2*pad)/Vcc;
  const IC_max=Vcc/(RC+RE)*1000;
  const ymax=Math.max(IC_max*1.1,1);
  const ysc=(H-2*pad)/ymax;

  drawAxes(ctx,W,H,pad,'V_CE (V)','I_C (mA)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let v=0;v<=Vcc;v+=2){ ctx.fillText(v,pad+v*xsc-5,H-pad+13*dpr); }
  for(let i=0;i<=Math.ceil(ymax);i+=Math.ceil(ymax/5)){ ctx.fillText(i,pad-22*dpr,H-pad-i*ysc+4); }

  // Load line
  ctx.beginPath(); ctx.strokeStyle=acc; ctx.lineWidth=2*dpr;
  ctx.moveTo(pad+Vcc*xsc,H-pad);
  ctx.lineTo(pad, H-pad-Math.min(IC_max,ymax)*ysc);
  ctx.stroke();

  // Q-point
  const qx=pad+Math.max(0,VCE)*xsc;
  const qy=H-pad-Math.min(IC*1000,ymax)*ysc;
  ctx.beginPath(); ctx.arc(qx,qy,7*dpr,0,2*Math.PI);
  ctx.fillStyle=region==='Active'?acc:'#ff6b6b'; ctx.fill();

  // Labels
  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`V_B=${VB.toFixed(2)}V  I_C=${(IC*1000).toFixed(2)}mA  V_CE=${VCE.toFixed(2)}V  [${region}]`,pad,pad-8*dpr);
  ctx.fillStyle=acc;
  ctx.fillText('Q',qx+8*dpr,qy-4*dpr);
}
draw();
</script></body></html>
