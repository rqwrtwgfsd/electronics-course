<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sim: Oscilloscope Probe Compensation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:12px;}
canvas{display:block;border:1px solid #444;border-radius:6px;background:#0d0d1a;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:12px;}
label{color:#aaa;}
input[type=range]{width:140px;}
.vals{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#ccc;margin:6px 0;}
.val-item{background:#222;border-radius:4px;padding:4px 8px;}
h3{font-size:13px;color:#90caf9;margin-bottom:6px;}
@media(prefers-color-scheme:light){body{background:#f5f5f5;color:#111;}canvas{background:#fff;border-color:#ccc;}.val-item{background:#eee;color:#222;}label{color:#555;}h3{color:#005a9c;}}
</style>
</head>
<body>
<h3>Problem 8 — Probe Compensation: Step Response (Over/Under/Correct)</h3>
<p style="font-size:11px;color:#aaa;margin-bottom:8px;">Adjust C_comp. Correct value = R_scope*C_load/R_tip. Under-comp: overshoot. Over-comp: undershoot. Correct: flat step.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>C_comp (pF)</label><input type="range" id="Cc" min="1" max="50" value="13" step="0.5"><span id="CcV">13.0</span></div>
  <div class="ctrl"><label>C_load cable+scope (pF)</label><input type="range" id="Cl" min="20" max="300" value="120" step="1"><span id="ClV">120</span></div>
  <div class="ctrl"><label>R_tip (MOhm)</label><input type="range" id="Rt" min="1" max="20" value="9" step="0.5"><span id="RtV">9.0</span></div>
  <div class="ctrl"><label>R_scope (MOhm)</label><input type="range" id="Rs" min="0.5" max="10" value="1" step="0.1"><span id="RsV">1.0</span></div>
</div>
<div class="vals">
  <div class="val-item">C_comp ideal: <strong id="Cc_ideal">-</strong></div>
  <div class="val-item">tau_upper: <strong id="tau_up">-</strong></div>
  <div class="val-item">tau_lower: <strong id="tau_lo">-</strong></div>
  <div class="val-item">Status: <strong id="status">-</strong></div>
</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resizeCanvas(){
  const w=cv.parentElement.getBoundingClientRect().width;
  cv.width=Math.min(w-24,700);
  cv.height=Math.round(cv.width*0.45);
}
function get(id){return parseFloat(document.getElementById(id).value);}
function draw(){
  const W=cv.width,H=cv.height;
  const Cc=get('Cc')*1e-12,Cl=get('Cl')*1e-12,Rt=get('Rt')*1e6,Rs=get('Rs')*1e6;
  document.getElementById('CcV').textContent=get('Cc').toFixed(1);
  document.getElementById('ClV').textContent=get('Cl');
  document.getElementById('RtV').textContent=get('Rt').toFixed(1);
  document.getElementById('RsV').textContent=get('Rs').toFixed(1);
  const Cc_ideal=Rs*Cl/Rt;
  const tau_upper=Rt*Cc;
  const tau_lower=Rs*Cl;
  document.getElementById('Cc_ideal').textContent=(Cc_ideal*1e12).toFixed(1)+'pF';
  document.getElementById('tau_up').textContent=(tau_upper*1e6).toFixed(1)+'µs';
  document.getElementById('tau_lo').textContent=(tau_lower*1e6).toFixed(1)+'µs';
  const diff_pct=(tau_upper-tau_lower)/tau_lower*100;
  let status,statusColor;
  if(Math.abs(diff_pct)<3){status='CORRECT — flat step';statusColor='#55ff88';}
  else if(diff_pct<0){status='UNDER-COMP — overshoot';statusColor='#ff9955';}
  else{status='OVER-COMP — undershoot';statusColor='#5599ff';}
  document.getElementById('status').textContent=status;
  document.getElementById('status').style.color=statusColor;
  // Step response simulation: voltage at scope (V_out for unit step input)
  // Compensated divider step response: V_out(t) = A_dc + (A_HF - A_dc)*exp(-t/tau_eq)
  // A_dc = Rs/(Rt+Rs), A_HF = Cl/(Cc+Cl) * (for fast response the cap ratio)
  // More precisely: double pole system, approximate with single pole
  const A_dc=Rs/(Rt+Rs); // DC attenuation = 1/(1+Rt/Rs)
  const A_inf=Cl/(Cc+Cl); // HF attenuation from capacitor divider
  const tau_eff=Math.min(tau_upper,tau_lower)*(1+Math.abs(diff_pct/100));
  const t_max=Math.max(tau_upper,tau_lower)*5;
  ctx.clearRect(0,0,W,H);
  const pad={l:52,r:30,t:28,b:38};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const v_min=0,v_max=0.15;
  function tx(t){return pad.l+t/t_max*pw;}
  function vy(v){return H-pad.b-(v-v_min)/(v_max-v_min)*ph;}
  // Grid
  ctx.strokeStyle='#1e2a3a';ctx.lineWidth=0.5;
  [0.05,0.1,0.15].forEach(v=>{
    ctx.beginPath();ctx.moveTo(pad.l,vy(v));ctx.lineTo(W-pad.r,vy(v));ctx.stroke();
    ctx.fillStyle='#555';ctx.font='10px Arial';ctx.fillText((v*10).toFixed(0)+'%',2,vy(v)+4);
  });
  // Ideal flat line at A_dc
  ctx.strokeStyle='#336633';ctx.lineWidth=0.8;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.l,vy(A_dc));ctx.lineTo(W-pad.r,vy(A_dc));ctx.stroke();
  ctx.fillStyle='#55aa55';ctx.font='9px Arial';ctx.fillText('Ideal '+((A_dc).toFixed(3))+' = 1/'+Math.round(1/A_dc)+':1',pad.l+4,vy(A_dc)-4);
  ctx.setLineDash([]);
  const N=400;
  // Actual response (simplified two-time-constant model)
  ctx.beginPath();ctx.strokeStyle=statusColor;ctx.lineWidth=2.5;
  for(let i=0;i<=N;i++){
    const t=t_max*i/N;
    // At t=0: capacitors set the ratio. At t=inf: resistors set the ratio.
    // If tau_upper=tau_lower: response is flat (A_dc all the time).
    const Vout_t0=A_inf; // initial (HF) value
    const Vout_tf=A_dc; // final (DC) value
    const tau_tr=Math.max(tau_upper,tau_lower);
    const Vout=Vout_tf+(Vout_t0-Vout_tf)*Math.exp(-t/tau_tr);
    if(i===0)ctx.moveTo(tx(t),vy(Vout));else ctx.lineTo(tx(t),vy(Vout));
  }
  ctx.stroke();
  // Axes
  ctx.strokeStyle='#666';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  // tau marks
  [1,2,3,4,5].forEach(k=>{
    const t=k*tau_lower;
    if(t<t_max){
      ctx.strokeStyle='#333';ctx.lineWidth=0.5;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(tx(t),pad.t);ctx.lineTo(tx(t),H-pad.b);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#555';ctx.font='9px Arial';ctx.fillText(k+'τ',tx(t)-6,H-pad.b+13);
    }
  });
  ctx.fillStyle='#aaa';ctx.font='10px Arial';ctx.fillText('Time',W/2-10,H-5);
  ctx.fillStyle='#90caf9';ctx.font='bold 11px Arial';
  ctx.fillText('Cc='+get('Cc').toFixed(1)+'pF  Cl='+get('Cl')+'pF  Rt='+get('Rt')+'MO  Rs='+get('Rs')+'MO',pad.l+5,pad.t-8);
  ctx.fillStyle=statusColor;ctx.font='11px Arial';
  ctx.fillText(status+' | diff='+diff_pct.toFixed(1)+'%',pad.l+5,pad.t+16);
}
['Cc','Cl','Rt','Rs'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>{resizeCanvas();draw();});
resizeCanvas();draw();
</script>
</body>
</html>
