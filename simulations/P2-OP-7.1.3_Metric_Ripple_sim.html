<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>P2-OP-7.1.3 Ripple Metric</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Courier New',monospace;font-size:13px}
h1{color:#0066cc;padding:12px 16px;border-bottom:1px solid #0066cc;font-size:15px}
.container{display:flex;gap:10px;padding:10px}
canvas{background:#0a0a1a;border:1px solid #333}
.panel{background:#12122a;border:1px solid #2a2a4a;border-radius:4px;padding:12px;min-width:220px}
.panel h2{color:#0066cc;font-size:12px;margin-bottom:8px;text-transform:uppercase}
label{display:block;margin-top:8px;color:#aaa;font-size:11px}
input[type=range]{width:100%;accent-color:#0066cc;margin-top:3px}
.readout{color:#00ff88;font-size:12px;margin-top:3px}
.warn{color:#ff6600;font-size:11px;margin-top:4px}
.formula{color:#ffaa00;font-size:11px;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<h1>P2-OP-7.1.3 — Ripple Metric: C_bulk, C_decouple, ESR</h1>
<div class="container">
<div>
<canvas id="cv" width="580" height="380"></canvas>
</div>
<div class="panel">
<h2>Power Supply Parameters</h2>
<label>C_bulk (μF)
<input type="range" id="cbulk" min="1" max="1000" step="1" value="100">
<div class="readout" id="cbulk_v">C_bulk = 100 μF</div>
</label>
<label>ESR (mΩ)
<input type="range" id="esr" min="1" max="500" step="1" value="50">
<div class="readout" id="esr_v">ESR = 50 mΩ</div>
</label>
<label>I_load (A)
<input type="range" id="iload" min="0.1" max="5" step="0.1" value="1">
<div class="readout" id="iload_v">I_load = 1.0 A</div>
</label>
<label>f_sw (kHz)
<input type="range" id="fsw" min="10" max="500" step="5" value="100">
<div class="readout" id="fsw_v">f_sw = 100 kHz</div>
</label>
<h2 style="margin-top:10px">Ripple Analysis</h2>
<div class="readout" id="dv_c">ΔV_C = —</div>
<div class="readout" id="dv_esr">ΔV_ESR = —</div>
<div class="readout" id="dv_total">ΔV_total ≈ —</div>
<div class="warn" id="warn_esr"></div>
<div class="formula">ΔV_C = I/(8×C×f_sw)<br>ΔV_ESR = ΔI_L × ESR<br>ΔI_L ≈ I_load (approx)</div>
</div>
</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let cbulk=100,esr=50,iload=1,fsw=100;
const W=580,H=380,PAD={l:60,r:20,t:30,b:40};
const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;
const Vnom=5;

['cbulk','esr','iload','fsw'].forEach(id=>{
  document.getElementById(id).oninput=function(){
    if(id==='cbulk'){cbulk=parseFloat(this.value);document.getElementById('cbulk_v').textContent='C_bulk = '+cbulk+' μF';}
    if(id==='esr'){esr=parseFloat(this.value);document.getElementById('esr_v').textContent='ESR = '+esr+' mΩ';}
    if(id==='iload'){iload=parseFloat(this.value);document.getElementById('iload_v').textContent='I_load = '+iload.toFixed(1)+' A';}
    if(id==='fsw'){fsw=parseFloat(this.value);document.getElementById('fsw_v').textContent='f_sw = '+fsw+' kHz';}
    draw();
  };
});

function draw(){
  ctx.clearRect(0,0,W,H);
  const dV_C=iload/(8*cbulk*1e-6*fsw*1e3)*1000; // mV
  const dV_ESR=iload*(esr*1e-3)*1000; // mV
  const dV_total=Math.sqrt(dV_C*dV_C+dV_ESR*dV_ESR);
  // Waveform: show 3 switching cycles of ripple
  const Tsw=1/(fsw*1e3)*1e6; // μs
  const tmax=4*Tsw;
  const vrange=Math.max(dV_total*3,20); // mV
  function toPx(t,v_mv){
    return[PAD.l+CW*(t/tmax),PAD.t+CH*(1-(v_mv+vrange/2)/vrange)];
  }
  ctx.strokeStyle='#1a1a3a';ctx.lineWidth=1;
  for(let i=0;i<=8;i++){const x=PAD.l+CW*(i/8);ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+CH);ctx.stroke();}
  for(let i=0;i<=5;i++){const y=PAD.t+CH*(i/5);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+CW,y);ctx.stroke();}
  ctx.strokeStyle='#555';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+CH);ctx.moveTo(PAD.l,PAD.t+CH);ctx.lineTo(PAD.l+CW,PAD.t+CH);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.textAlign='center';
  for(let i=0;i<=4;i++){const t=tmax*i/4;ctx.fillText((t).toFixed(2)+'μs',PAD.l+CW*(i/4),PAD.t+CH+14);}
  ctx.textAlign='right';
  for(let i=0;i<=5;i++){const v=-vrange/2+vrange*(1-i/5);ctx.fillText(v.toFixed(0)+'mV',PAD.l-4,PAD.t+CH*(i/5)+4);}
  // Ripple waveform
  ctx.strokeStyle='#00ff88';ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<=600;i++){
    const t=tmax*i/600;
    const phase=(t%Tsw)/Tsw;
    const v_C=dV_C*(phase<0.5?(4*phase-1):(3-4*phase)); // triangular
    const v_ESR=dV_ESR*(phase<0.5?1:-1); // square wave
    const v=v_C+v_ESR;
    const[x,y]=toPx(t,v);
    if(y>PAD.t-5&&y<PAD.t+CH+5){i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  }
  ctx.stroke();
  // Components
  ctx.strokeStyle='#0066cc';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.beginPath();
  for(let i=0;i<=600;i++){
    const t=tmax*i/600;const phase=(t%Tsw)/Tsw;
    const v_C=dV_C*(phase<0.5?(4*phase-1):(3-4*phase));
    const[x,y]=toPx(t,v_C);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.textAlign='right';
  ctx.fillText('ΔV_C='+dV_C.toFixed(1)+'mV',PAD.l+CW,PAD.t+CH-20);
  // ESR component
  ctx.strokeStyle='#ff6600';ctx.lineWidth=1.5;ctx.setLineDash([4,2]);
  ctx.beginPath();
  for(let i=0;i<=600;i++){
    const t=tmax*i/600;const phase=(t%Tsw)/Tsw;
    const v_ESR=dV_ESR*(phase<0.5?1:-1);
    const[x,y]=toPx(t,v_ESR);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();ctx.setLineDash([]);
  // Readouts
  document.getElementById('dv_c').textContent='ΔV_C = '+dV_C.toFixed(2)+' mV';
  document.getElementById('dv_esr').textContent='ΔV_ESR = '+dV_ESR.toFixed(2)+' mV';
  document.getElementById('dv_total').textContent='ΔV_total ≈ '+dV_total.toFixed(2)+' mV';
  const warn=document.getElementById('warn_esr');
  if(dV_ESR>dV_C){warn.textContent='ESR dominates: replacing cap type (MLCC) reduces ripple more than larger C.';}
  else{warn.textContent='';}
  ctx.fillStyle='#00ff88';ctx.font='bold 11px Courier New';ctx.textAlign='left';
  ctx.fillText('ΔV_pp = '+dV_total.toFixed(1)+' mV | C='+cbulk+'μF, ESR='+esr+'mΩ, f_sw='+fsw+'kHz',PAD.l+4,PAD.t+14);
}
draw();
</script>
</body>
</html>
