<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lec28 Pr3 — Single-Stage vs Two-Stage Bode Plot</title>
<style>
  body{margin:0;padding:10px;font-family:sans-serif;background:#1a1a2e;color:#e0e0e0;}
  canvas{display:block;border:1px solid #444;border-radius:6px;background:#0f0f1e;}
  .ctrl{margin:6px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  label{min-width:180px;font-size:0.85em;}
  input[type=range]{flex:1;min-width:120px;}
  .val{min-width:70px;font-size:0.85em;color:#7ec8e3;}
  .result-box{background:#162032;border:1px solid #2a4a6a;border-radius:6px;padding:10px;margin-top:8px;font-size:0.85em;}
  h3{color:#7ec8e3;margin:4px 0 10px;}
  .legend{display:flex;gap:20px;margin:6px 0;font-size:0.8em;}
  .leg-item{display:flex;align-items:center;gap:6px;}
  .leg-dot{width:16px;height:3px;display:inline-block;}
</style>
</head>
<body>
<h3>Problem 3 — Single-Stage Telescopic OTA vs Two-Stage: Bode Plot</h3>
<canvas id="cv"></canvas>
<div class="legend">
  <div class="leg-item"><span class="leg-dot" style="background:#4fc3f7"></span>Single-stage gain</div>
  <div class="leg-item"><span class="leg-dot" style="background:#ff7043"></span>Two-stage gain</div>
  <div class="leg-item"><span class="leg-dot" style="background:#aed581;opacity:0.6"></span>Phase (single)</div>
  <div class="leg-item"><span class="leg-dot" style="background:#ffb74d;opacity:0.6"></span>Phase (two-stage)</div>
</div>
<div class="ctrl">
  <label>Gm input (mA/V):</label>
  <input type="range" id="gm" min="0.5" max="10" value="6.28" step="0.1">
  <span class="val" id="gm_v">6.28</span>
</div>
<div class="ctrl">
  <label>C_L (pF):</label>
  <input type="range" id="cl" min="0.2" max="5" value="1" step="0.1">
  <span class="val" id="cl_v">1 pF</span>
</div>
<div class="ctrl">
  <label>Second-stage pole f_p2 (× GBW):</label>
  <input type="range" id="fp2mult" min="1.5" max="20" value="5" step="0.5">
  <span class="val" id="fp2mult_v">5×</span>
</div>
<div class="result-box" id="result">Results</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

function resizeCanvas(){
  const w=cv.parentElement.getBoundingClientRect().width-20;
  cv.width=Math.max(300,w); cv.height=Math.round(cv.width*0.5);
}

function getVals(){
  const gm=parseFloat(document.getElementById('gm').value)*1e-3;
  const cl=parseFloat(document.getElementById('cl').value)*1e-12;
  const fp2mult=parseFloat(document.getElementById('fp2mult').value);
  return {gm, cl, fp2mult};
}

function updateLabels(){
  document.getElementById('gm_v').textContent=parseFloat(document.getElementById('gm').value).toFixed(2)+' mA/V';
  document.getElementById('cl_v').textContent=parseFloat(document.getElementById('cl').value).toFixed(1)+' pF';
  document.getElementById('fp2mult_v').textContent=parseFloat(document.getElementById('fp2mult').value).toFixed(1)+'×';
}

function draw(){
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  const {gm, cl, fp2mult}=getVals();

  const mx=60, my=15, bx=W-60, by=H-30;
  const pw=bx-mx, ph=by-my;
  const phH=ph*0.55; // gain portion height
  const phaseY0=my+phH+10; // phase plot starts here

  // Parameters
  const rout=5e6; // 5 MOhm for single-stage cascode
  const ADC=gm*rout; // DC gain single stage
  const ADC_dB=20*Math.log10(ADC);
  const fp1=1/(2*Math.PI*rout*cl);
  const GBW=ADC*fp1;
  const fp2=fp2mult*GBW;
  const fp2mult_2stage=1.5; // two-stage has non-dom pole at 1.5×GBW
  const fp2_2stage=fp2mult_2stage*GBW;
  const A_2stage=ADC*5; // two stage has 5x more gain
  const A_2stage_dB=20*Math.log10(A_2stage);
  const fp1_2stage=fp1/5; // dominant pole shifted lower (Miller)

  // Frequency axis: log from 100Hz to 10×GBW
  const fMin=1e2, fMax=10*GBW;
  const fRange=Math.log10(fMax/fMin);

  // Axes
  ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(mx,my); ctx.lineTo(mx,by); ctx.lineTo(bx,by);
  ctx.moveTo(mx,phaseY0); ctx.lineTo(bx,phaseY0);
  ctx.stroke();

  // Frequency grid & labels
  for(let exp=Math.floor(Math.log10(fMin));exp<=Math.ceil(Math.log10(fMax));exp++){
    for(let m=1;m<=9;m++){
      const f=m*Math.pow(10,exp);
      if(f<fMin||f>fMax) continue;
      const x=mx+(Math.log10(f/fMin)/fRange)*pw;
      ctx.strokeStyle=m===1?'#333':'#222'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(x,my); ctx.lineTo(x,by); ctx.stroke();
    }
    const f=Math.pow(10,exp);
    if(f<fMin||f>fMax) continue;
    const x=mx+(Math.log10(f/fMin)/fRange)*pw;
    ctx.fillStyle='#666'; ctx.font='9px sans-serif';
    const lbl=exp>=6?(f/1e6).toFixed(0)+'M':exp>=3?(f/1e3).toFixed(0)+'k':f.toFixed(0);
    ctx.fillText(lbl, x-8, by+12);
  }

  // Gain Y-axis
  const gainMax=Math.max(ADC_dB, A_2stage_dB)+10;
  const gainMin=-20;
  for(let g=gainMin;g<=gainMax;g+=20){
    const y=my+phH-(g-gainMin)/(gainMax-gainMin)*phH;
    if(y<my||y>my+phH) continue;
    ctx.strokeStyle='#333'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(mx,y); ctx.lineTo(bx,y); ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='9px sans-serif';
    ctx.fillText(g+'dB', mx-40, y+4);
  }

  // Phase Y-axis labels
  for(let ph_val=0;ph_val>=-180;ph_val-=45){
    const y=phaseY0+(0-ph_val)/180*(by-phaseY0);
    if(y>by) continue;
    ctx.strokeStyle='#333'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(mx,y); ctx.lineTo(bx,y); ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='9px sans-serif';
    ctx.fillText(ph_val+'°', mx-35, y+4);
  }

  function plotBode(poles, zeros, ADC_val, color, phaseColor){
    ctx.strokeStyle=color; ctx.lineWidth=2;
    ctx.beginPath();
    let first=true;
    for(let i=0;i<=400;i++){
      const f=fMin*Math.pow(fMax/fMin,i/400);
      const w=2*Math.PI*f;
      let mag=ADC_val;
      for(const p of poles) mag/=Math.sqrt(1+(w/(2*Math.PI*p))**2);
      for(const z of zeros) mag*=Math.sqrt(1+(w/(2*Math.PI*z))**2);
      const mag_dB=20*Math.log10(Math.max(mag,1e-6));
      const x=mx+(Math.log10(f/fMin)/fRange)*pw;
      const y=my+phH-(mag_dB-gainMin)/(gainMax-gainMin)*phH;
      if(first){ctx.moveTo(x,Math.max(my,Math.min(my+phH,y)));first=false;}
      else ctx.lineTo(x,Math.max(my,Math.min(my+phH,y)));
    }
    ctx.stroke();

    // Phase
    ctx.strokeStyle=phaseColor; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); first=true;
    for(let i=0;i<=400;i++){
      const f=fMin*Math.pow(fMax/fMin,i/400);
      const w=2*Math.PI*f;
      let phase=0;
      for(const p of poles) phase-=Math.atan(w/(2*Math.PI*p))*180/Math.PI;
      for(const z of zeros) phase+=Math.atan(w/(2*Math.PI*z))*180/Math.PI;
      const x=mx+(Math.log10(f/fMin)/fRange)*pw;
      const y=phaseY0+(0-phase)/180*(by-phaseY0);
      if(first){ctx.moveTo(x,Math.max(phaseY0,Math.min(by,y)));first=false;}
      else ctx.lineTo(x,Math.max(phaseY0,Math.min(by,y)));
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Single-stage: dominant pole fp1, non-dom pole fp2 (very high)
  plotBode([fp1, fp2], [], ADC, '#4fc3f7', 'rgba(100,200,150,0.7)');
  // Two-stage: dominant pole fp1_2stage, non-dom pole fp2_2stage
  plotBode([fp1_2stage, fp2_2stage], [], A_2stage, '#ff7043', 'rgba(255,183,77,0.7)');

  // GBW marker
  const xgbw=mx+(Math.log10(GBW/fMin)/fRange)*pw;
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(xgbw,my); ctx.lineTo(xgbw,my+phH); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#888'; ctx.font='9px sans-serif';
  const gbwLabel=GBW>=1e6?(GBW/1e6).toFixed(1)+'GHz':GBW>=1e3?(GBW/1e3).toFixed(0)+'MHz':GBW.toFixed(0)+'Hz';
  ctx.fillText('GBW='+gbwLabel, Math.min(xgbw-10,bx-70), my+12);

  ctx.fillStyle='#7ec8e3'; ctx.font='11px sans-serif';
  ctx.fillText('|A(f)| (dB)', mx+5, my+10);
  ctx.fillText('Phase', mx+5, phaseY0+14);
  ctx.fillText('Frequency →', bx-70, by+20);

  // Phase margin calculation
  function calcPM(poles, zeros, ADC_val){
    for(let i=0;i<=10000;i++){
      const f=fMin*Math.pow(fMax/fMin,i/10000);
      const w=2*Math.PI*f;
      let mag=ADC_val;
      for(const p of poles) mag/=Math.sqrt(1+(w/(2*Math.PI*p))**2);
      if(mag<=1){
        let phase=0;
        for(const p of poles) phase-=Math.atan(w/(2*Math.PI*p))*180/Math.PI;
        return 180+phase;
      }
    }
    return 90;
  }
  const pm1=calcPM([fp1,fp2],[],ADC);
  const pm2=calcPM([fp1_2stage,fp2_2stage],[],A_2stage);

  document.getElementById('result').innerHTML=
    `<b>Single-Stage Telescopic:</b> A_DC=${ADC_dB.toFixed(0)}dB | GBW=${GBW>=1e6?(GBW/1e6).toFixed(2)+'GHz':(GBW/1e3).toFixed(1)+'MHz'} | PM=${pm1.toFixed(0)}° ${pm1>60?'✓':'⚠'}<br>
    f_p2 (non-dom) = ${(fp2/1e6).toFixed(0)} MHz = ${fp2mult.toFixed(1)}× GBW<br>
    <b>Two-Stage (Miller):</b> A_DC=${A_2stage_dB.toFixed(0)}dB | PM=${pm2.toFixed(0)}° ${pm2>60?'✓':'⚠'}<br>
    f_p2_2stage = ${(fp2_2stage/1e6).toFixed(1)} MHz = ${fp2mult_2stage}× GBW<br>
    Key insight: Single-stage has f_p2 >> GBW → inherently more stable`;
}

['gm','cl','fp2mult'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{updateLabels();draw();}));
resizeCanvas(); updateLabels(); draw();
window.addEventListener('resize',()=>{resizeCanvas();draw();});
</script>
</body>
</html>
