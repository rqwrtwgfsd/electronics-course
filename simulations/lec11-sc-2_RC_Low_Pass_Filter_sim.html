<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Low-Pass Filter — ADC Noise Filtering</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 11 | Scenario 2</div>
  <h1>RC Low-Pass Filter: Sensor ADC Noise Rejection</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">R (kΩ) <span class="ctrl-value" id="lbl-r">1.0 kΩ</span></div>
      <input type="range" id="sl-r" min="0.1" max="10" value="1" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">C (µF) <span class="ctrl-value" id="lbl-c">1.5 µF</span></div>
      <input type="range" id="sl-c" min="0.1" max="10" value="1.5" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Noise Freq (kHz) <span class="ctrl-value" id="lbl-fn">1000 kHz</span></div>
      <input type="range" id="sl-fn" min="10" max="2000" value="1000" step="10">
    </div>
    <div class="result-box" id="result">Adjust to design your filter</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slR=document.getElementById('sl-r'),slC=document.getElementById('sl-c'),slFn=document.getElementById('sl-fn');
const lblR=document.getElementById('lbl-r'),lblC=document.getElementById('lbl-c'),lblFn=document.getElementById('lbl-fn');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const R=parseFloat(slR.value)*1e3;
  const C=parseFloat(slC.value)*1e-6;
  const fn=parseFloat(slFn.value)*1e3;
  lblR.textContent=parseFloat(slR.value).toFixed(1)+' kΩ';
  lblC.textContent=parseFloat(slC.value).toFixed(1)+' µF';
  lblFn.textContent=parseFloat(slFn.value).toFixed(0)+' kHz';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  // Draw Bode plot (frequency response)
  const fMin=1,fMax=10e6;
  const fc=1/(2*Math.PI*R*C);
  function yDb(f){const ratio=f/fc;return -20*Math.log10(Math.sqrt(1+ratio*ratio))}
  function xPx(f){return pad+plotW*(Math.log10(f)-Math.log10(fMin))/(Math.log10(fMax)-Math.log10(fMin))}
  function yPx(db){return pad+plotH*(1-(-db)/60)}
  // grid
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  for(let db=-60;db<=0;db+=10){ctx.beginPath();ctx.moveTo(pad,yPx(db));ctx.lineTo(W-pad,yPx(db));ctx.stroke()}
  for(let exp=0;exp<=7;exp++){const f=Math.pow(10,exp);if(f>=fMin&&f<=fMax){const xp=xPx(f);ctx.beginPath();ctx.moveTo(xp,pad);ctx.lineTo(xp,H-pad);ctx.stroke()}}
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // filter curve
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2.5;ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const logF=Math.log10(fMin)+(px/plotW)*(Math.log10(fMax)-Math.log10(fMin));
    const f=Math.pow(10,logF);
    const db=yDb(f);
    const yp=Math.max(pad,Math.min(H-pad,yPx(db)));
    px===0?ctx.moveTo(pad+px,yp):ctx.lineTo(pad+px,yp);
  }ctx.stroke();
  // fc marker
  ctx.setLineDash([5,3]);ctx.strokeStyle='#f57c00';ctx.lineWidth=1.5;
  const xcf=xPx(fc);ctx.beginPath();ctx.moveTo(xcf,pad);ctx.lineTo(xcf,H-pad);ctx.stroke();
  // noise freq marker
  const xfn=xPx(fn);
  ctx.strokeStyle='#e53935';
  ctx.beginPath();ctx.moveTo(xfn,pad);ctx.lineTo(xfn,H-pad);ctx.stroke();
  ctx.setLineDash([]);
  // Labels
  ctx.fillStyle='#888';ctx.font='10px system-ui';ctx.textAlign='right';
  [-60,-50,-40,-30,-20,-10,0].forEach(db=>ctx.fillText(db+'dB',pad-4,yPx(db)+3));
  ctx.textAlign='center';
  ['1','10','100','1k','10k','100k','1M','10M'].forEach((lbl,i)=>{
    const f=Math.pow(10,i);if(f>=fMin&&f<=fMax)ctx.fillText(lbl,xPx(f),H-pad+14);
  });
  ctx.fillStyle='#f57c00';ctx.font='11px system-ui';ctx.fillText('fc='+_fmtHz(fc),xcf,pad+14);
  ctx.fillStyle='#e53935';ctx.fillText('noise',xfn,pad+28);
  // attenuation at noise freq
  const dbAtNoise=yDb(fn);
  const linear=Math.pow(10,dbAtNoise/20);
  const pct=((1-linear)*100).toFixed(1);
  result.innerHTML='<b>f_c = '+_fmtHz(fc)+'</b><br>Attenuation at noise ('+_fmtHz(fn)+'): <b>'+dbAtNoise.toFixed(1)+' dB</b><br>Noise reduced by: <b>'+pct+'%</b><br>τ = RC = '+(R*C*1e3).toFixed(2)+' ms<br><b>Rule:</b> f_c should be 10× below noise, 10× above signal';
}
function _fmtHz(f){if(f>=1e6)return (f/1e6).toFixed(2)+'MHz';if(f>=1e3)return (f/1e3).toFixed(1)+'kHz';return f.toFixed(0)+'Hz'}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slR,slC,slFn].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
