<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-MS-5.4.2 — Debug: Gain Too Low</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:260px; min-width:240px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; color:var(--text2); line-height:1.5; }
  select { width:100%; padding:5px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; font-size:13px; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-MS-5.4.2</div>
  <h1>Multi-Stage Debug — Gain Too Low</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="300"></canvas>
    <div class="readouts">
      <div class="readout"><label>Stage 1 Gain</label><span class="val" id="r-av1">—</span></div>
      <div class="readout"><label>Stage 2 Gain</label><span class="val" id="r-av2">—</span></div>
      <div class="readout"><label>Total A_OL</label><span class="val" id="r-total">—</span></div>
      <div class="readout"><label>Status vs Spec</label><span class="val" id="r-status">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Inject Fault</div>
    <div class="ctrl">
      <label>Fault Type</label>
      <select id="sel-fault" onchange="update()">
        <option value="none">No fault (healthy)</option>
        <option value="triode">Stage 2: Triode (V_DS too low)</option>
        <option value="loading">Interstage: 10kΩ loading</option>
        <option value="bias">Bias current 50% low</option>
        <option value="corner">SS process corner</option>
      </select>
    </div>
    <div class="section-title" style="margin-top:8px">Design Parameters</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.2</span></label>
      <input type="range" id="sl-gm1" min="0.2" max="5" step="0.1" value="1.2" oninput="update()">
    </div>
    <div class="ctrl">
      <label>Rout1 (kΩ) <span id="lbl-ro1">50</span></label>
      <input type="range" id="sl-ro1" min="5" max="200" step="5" value="50" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm2 (mA/V) <span id="lbl-gm2">4.0</span></label>
      <input type="range" id="sl-gm2" min="0.5" max="10" step="0.5" value="4.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>Rout2 (kΩ) <span id="lbl-ro2">15</span></label>
      <input type="range" id="sl-ro2" min="1" max="100" step="1" value="15" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Specification</div>
    <div class="ctrl">
      <label>Min A_OL (dB) <span id="lbl-spec">70</span></label>
      <input type="range" id="sl-spec" min="40" max="100" step="2" value="70" oninput="update()">
    </div>
  </div>
</div>
<script>
function update() {
  let gm1 = parseFloat(document.getElementById('sl-gm1').value)/1000;
  let ro1  = parseFloat(document.getElementById('sl-ro1').value)*1000;
  let gm2  = parseFloat(document.getElementById('sl-gm2').value)/1000;
  let ro2  = parseFloat(document.getElementById('sl-ro2').value)*1000;
  const spec_db = parseFloat(document.getElementById('sl-spec').value);
  const fault   = document.getElementById('sel-fault').value;

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-ro1').textContent=(ro1/1000).toFixed(0);
  document.getElementById('lbl-gm2').textContent=(gm2*1000).toFixed(1);
  document.getElementById('lbl-ro2').textContent=(ro2/1000).toFixed(0);
  document.getElementById('lbl-spec').textContent=spec_db;

  let ro1_eff=ro1, gm1_eff=gm1, ro2_eff=ro2, gm2_eff=gm2;
  let fault_desc='';

  switch(fault) {
    case 'triode':
      ro2_eff = 96.4; // ~100 Ω
      fault_desc='FAULT: Stage 2 NMOS in triode (V_DS < V_ov). ro2 collapsed to 96Ω.';
      break;
    case 'loading':
      ro1_eff = (ro1*10000)/(ro1+10000);
      fault_desc=`FAULT: 10kΩ loading at interstage. Rout1_eff=${(ro1_eff/1000).toFixed(1)}kΩ.`;
      break;
    case 'bias':
      gm1_eff *= 0.707; // sqrt(0.5)
      gm2_eff *= 0.707;
      ro2_eff *= 2; // ro doubles
      ro1_eff *= 2;
      fault_desc='FAULT: Bias 50% low. gm ×0.707, ro ×2. Net gain increase (lower V_ov).';
      break;
    case 'corner':
      gm1_eff *= 0.72; gm2_eff *= 0.72;
      ro1_eff *= 0.80; ro2_eff *= 0.80;
      fault_desc='FAULT: SS corner. gm ×0.72, ro ×0.80. Both stages lose gain.';
      break;
    default:
      fault_desc='No fault injected. Healthy circuit.';
  }

  const av1 = gm1_eff * ro1_eff;
  const av2 = gm2_eff * ro2_eff;
  const avT = av1 * av2;
  const db1 = 20*Math.log10(av1);
  const db2 = 20*Math.log10(av2);
  const dbT = 20*Math.log10(avT);

  document.getElementById('r-av1').textContent=db1.toFixed(1)+'dB ('+av1.toFixed(1)+'×)';
  document.getElementById('r-av2').textContent=db2.toFixed(1)+'dB ('+av2.toFixed(1)+'×)';
  document.getElementById('r-total').textContent=dbT.toFixed(1)+' dB';
  const stEl=document.getElementById('r-status');
  const pass=dbT>=spec_db;
  stEl.textContent=pass?'PASS (+'+(dbT-spec_db).toFixed(1)+'dB)':'FAIL (-'+(spec_db-dbT).toFixed(1)+'dB)';
  stEl.style.color=pass?'var(--green)':'var(--warn)';

  document.getElementById('ins').textContent=fault_desc+' | A_v1='+db1.toFixed(1)+'dB, A_v2='+db2.toFixed(1)+'dB, Total='+dbT.toFixed(1)+'dB vs spec '+spec_db+'dB.';

  draw(db1,db2,dbT,spec_db,av1,av2,fault);
}

function draw(db1,db2,dbT,spec,av1,av2,fault) {
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500; canvas.width=W; canvas.height=300;
  const ctx=canvas.getContext('2d');
  const pad={l:50,r:20,t:25,b:40};
  const pw=W-pad.l-pad.r, ph=300-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)'; ctx.fillRect(0,0,W,300);

  const yMax=100, yMin=0;
  const yScale=ph/(yMax-yMin);

  // Axes
  ctx.strokeStyle='var(--border)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+ph); ctx.lineTo(pad.l+pw,pad.t+ph); ctx.stroke();
  for(let y=0;y<=100;y+=20){
    const yp=pad.t+ph-(y-yMin)*yScale;
    ctx.beginPath(); ctx.moveTo(pad.l,yp); ctx.lineTo(pad.l+pw,yp); ctx.stroke();
    ctx.fillStyle='var(--text)'; ctx.font='9px monospace'; ctx.textAlign='right';
    ctx.fillText(y+'dB',pad.l-3,yp+3);
  }

  // Spec line
  const ySpec=pad.t+ph-(spec-yMin)*yScale;
  ctx.strokeStyle='#cc4400'; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(pad.l,ySpec); ctx.lineTo(pad.l+pw,ySpec); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#cc4400'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText('Min: '+spec+'dB',pad.l+4,ySpec-4);

  // Bars: Stage 1, Stage 2, Total (healthy), Total (faulty)
  const barData=[
    {label:'Stage 1',val:db1,color:'#0066cc'},
    {label:'Stage 2',val:db2,color:'#00994d'},
    {label:'Total',val:dbT,color:dbT>=spec?'#00994d':'#cc4400'},
  ];
  const barW=pw/5;
  barData.forEach((b,i)=>{
    const bx=pad.l+(i+0.8)*barW;
    const bw=barW*0.6;
    const bh=Math.max(0,(b.val-yMin))*yScale;
    const by=pad.t+ph-bh;
    ctx.fillStyle=b.color; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='var(--text)'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText(b.val.toFixed(1)+'dB',bx+bw/2,by-4);
    ctx.fillText(b.label,bx+bw/2,pad.t+ph+14);
  });

  // Title
  ctx.fillStyle=fault==='none'?'var(--green)':'#cc4400';
  ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText(fault==='none'?'Healthy Circuit':'FAULT INJECTED: '+fault.toUpperCase(),pad.l+pw/2,pad.t+14);
}
update();
</script>
</body>
</html>
