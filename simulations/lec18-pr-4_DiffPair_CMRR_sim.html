<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lec 18 Pr 4 — Differential Pair CMRR</title>
<style>
  :root { --bg:#fff; --surface:#f5f5f5; --border:#ccc; --text:#1a1a1a; --accent:#0066cc; --muted:#666; }
  @media (prefers-color-scheme:dark) { :root { --bg:#1a1a1a; --surface:#2a2a2a; --border:#444; --text:#e8e8e8; --accent:#4499ff; --muted:#999; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; max-width:900px; margin:0 auto; }
  h1 { font-size:18px; margin-bottom:12px; border-bottom:2px solid var(--accent); padding-bottom:8px; }
  .layout { display:grid; grid-template-columns:1fr 260px; gap:16px; }
  canvas { border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .controls { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px; }
  .ctrl-group { margin-bottom:12px; }
  label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; display:flex; justify-content:space-between; margin-bottom:4px; }
  .val { color:var(--accent); font-family:monospace; font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
  .info { background:rgba(0,102,204,0.08); border:1px solid rgba(0,102,204,0.2); border-radius:4px; padding:10px; margin-top:12px; font-size:12px; line-height:1.6; }
  @media (max-width:600px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>Pr 4 — Differential Pair: CMRR vs Tail Impedance</h1>
<div class="layout">
  <canvas id="cv" height="380"></canvas>
  <div class="controls">
    <div class="ctrl-group">
      <label>Tail Resistance (kΩ) <span class="val" id="v-rt">10</span></label>
      <input type="range" id="rt" min="1" max="500" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <label>I_tail (mA) <span class="val" id="v-ic">1</span></label>
      <input type="range" id="ic" min="0.1" max="5" value="1" step="0.1">
    </div>
    <div class="ctrl-group">
      <label>R_C (kΩ) <span class="val" id="v-rc">10</span></label>
      <input type="range" id="rc" min="1" max="50" value="10" step="1">
    </div>
    <div class="info" id="info">Adjust parameters to see CMRR.</div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resizeCanvas() {
  cv.width = cv.parentElement.getBoundingClientRect().width || 600;
  cv.height = 380;
}

function draw() {
  resizeCanvas();
  const W = cv.width, H = cv.height;
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const bg = dark ? '#1a1a1a' : '#ffffff';
  const fg = dark ? '#e8e8e8' : '#1a1a1a';
  const gridC = dark ? '#333' : '#eee';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const R_tail = +document.getElementById('rt').value * 1e3;
  const I_tail = +document.getElementById('ic').value * 1e-3;
  const RC = +document.getElementById('rc').value * 1e3;

  document.getElementById('v-rt').textContent = (R_tail/1e3).toFixed(0) + ' kΩ';
  document.getElementById('v-ic').textContent = (I_tail*1e3).toFixed(1) + ' mA';
  document.getElementById('v-rc').textContent = (RC/1e3).toFixed(0) + ' kΩ';

  const IC_each = I_tail / 2;
  const VT = 0.026;
  const gm = IC_each / VT;
  const A_d = gm * RC / 2; // Differential gain (one side)
  const A_cm = RC / (2 * R_tail); // CM gain approx
  const CMRR = A_d / A_cm;  // = gm * R_tail
  const CMRR_dB = 20 * Math.log10(CMRR);

  // Plot CMRR vs R_tail sweep
  const pad = { l: 70, r: 20, t: 40, b: 50 };
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;

  // X: Rtail from 1kΩ to 10MΩ (log)
  const xMin = 1e3, xMax = 10e6;
  const logXMin = Math.log10(xMin), logXMax = Math.log10(xMax);
  // Y: CMRR dB 0 to 120
  const yMin = 0, yMax = 120;

  // Grid
  ctx.strokeStyle = gridC; ctx.lineWidth = 1;
  for (let db = 0; db <= 120; db += 20) {
    const y = pad.t + ph * (1 - (db - yMin) / (yMax - yMin));
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(db + ' dB', pad.l - 4, y + 4);
  }
  [1e3,10e3,100e3,1e6,10e6].forEach(r => {
    const x = pad.l + pw * (Math.log10(r) - logXMin) / (logXMax - logXMin);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    const lbl = r >= 1e6 ? (r/1e6).toFixed(0)+'MΩ' : (r/1e3).toFixed(0)+'kΩ';
    ctx.fillText(lbl, x, pad.t + ph + 18);
  });

  ctx.fillStyle = fg; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Tail Resistance R_tail (Ω)', pad.l + pw / 2, H - 6);
  ctx.save(); ctx.translate(14, pad.t + ph / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('CMRR (dB)', 0, 0); ctx.restore();

  // Plot CMRR curve
  ctx.beginPath();
  ctx.strokeStyle = '#1565c0';
  ctx.lineWidth = 2.5;
  let first = true;
  for (let i = 0; i <= 300; i++) {
    const lR = logXMin + (logXMax - logXMin) * i / 300;
    const R = Math.pow(10, lR);
    const cmrr = 20 * Math.log10(gm * R);
    const x = pad.l + pw * (lR - logXMin) / (logXMax - logXMin);
    const y = pad.t + ph * (1 - (Math.max(0, Math.min(120, cmrr)) - yMin) / (yMax - yMin));
    if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 80dB line
  const line80y = pad.t + ph * (1 - 80 / 120);
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = '#e53935'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.l, line80y); ctx.lineTo(pad.l + pw, line80y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e53935'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('80 dB target', pad.l + 4, line80y - 4);

  // Mark current R_tail
  const curX = pad.l + pw * (Math.log10(R_tail) - logXMin) / (logXMax - logXMin);
  const curY = pad.t + ph * (1 - (Math.max(0, Math.min(120, CMRR_dB)) - yMin) / (yMax - yMin));
  ctx.beginPath();
  ctx.arc(curX, curY, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#fb8c00'; ctx.fill();

  ctx.fillStyle = fg; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('CMRR = g_m × R_tail,  g_m = I_C/V_T', pad.l, pad.t - 10);

  const R_needed = Math.pow(10, 80/20) / gm;
  document.getElementById('info').innerHTML =
    `<b>g_m = ${(gm*1e3).toFixed(1)} mA/V</b><br>` +
    `A_d = ${A_d.toFixed(1)}<br>` +
    `A_cm = ${A_cm.toFixed(4)}<br>` +
    `<b>CMRR = ${CMRR_dB.toFixed(1)} dB</b><br>` +
    `For 80 dB: R_tail ≥ ${(R_needed/1e3).toFixed(0)} kΩ<br>` +
    `(Use Wilson mirror: r_o ≈ 20MΩ → 111 dB)`;
}

['rt','ic','rc'].forEach(id => document.getElementById(id).addEventListener('input', draw));
window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
