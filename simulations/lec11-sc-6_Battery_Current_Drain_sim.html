<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Current Drain Optimizer</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 11 | Scenario 6</div>
  <h1>Battery Life: Quiescent Current &amp; Resistor Sizing</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Pull-up R (kΩ) <span class="ctrl-value" id="lbl-rpu">4.7 kΩ</span></div>
      <input type="range" id="sl-rpu" min="1" max="1000" value="4.7" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Divider R (kΩ) <span class="ctrl-value" id="lbl-rdiv">10 kΩ</span></div>
      <input type="range" id="sl-rdiv" min="1" max="1000" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Battery (mAh) <span class="ctrl-value" id="lbl-bat">2000 mAh</span></div>
      <input type="range" id="sl-bat" min="100" max="5000" value="2000" step="100">
    </div>
    <div class="result-box" id="result">Adjust to optimize battery life</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slRpu=document.getElementById('sl-rpu'),slRdiv=document.getElementById('sl-rdiv'),slBat=document.getElementById('sl-bat');
const lblRpu=document.getElementById('lbl-rpu'),lblRdiv=document.getElementById('lbl-rdiv'),lblBat=document.getElementById('lbl-bat');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const Rpu=parseFloat(slRpu.value)*1e3;
  const Rdiv=parseFloat(slRdiv.value)*1e3;
  const bat=parseFloat(slBat.value);
  lblRpu.textContent=parseFloat(slRpu.value).toFixed(1)+' kΩ';
  lblRdiv.textContent=slRdiv.value+' kΩ';
  lblBat.textContent=bat+' mAh';
  ctx.clearRect(0,0,W,H);
  const VCC=3.3;
  const Ipu=VCC/Rpu*1000; // mA
  const Idiv=VCC/(2*Rdiv)*1000; // mA (two equal resistors)
  const Icore=0.5; // mA baseline MCU current
  const Itotal=Icore+Ipu+Idiv;
  const lifetime=bat/Itotal; // hours
  const lifeDays=lifetime/24;
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  // Show bar chart of current breakdown
  const categories=[
    {label:'MCU Core',mA:Icore,color:'#0066cc'},
    {label:'Pull-up R',mA:Ipu,color:'#e53935'},
    {label:'Divider R',mA:Idiv,color:'#f57c00'},
  ];
  const maxMA=Math.max(Itotal*1.1,5);
  const barW=plotW/4;
  const barX=[pad+barW*0.3,pad+barW*1.3,pad+barW*2.3];
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const yp=pad+plotH*(i/5);ctx.beginPath();ctx.moveTo(pad,yp);ctx.lineTo(W-pad,yp);ctx.stroke()}
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  categories.forEach((cat,i)=>{
    const barH=plotH*(cat.mA/maxMA);
    const x=barX[i];
    ctx.fillStyle=cat.color;
    ctx.fillRect(x,H-pad-barH,barW*0.7,barH);
    ctx.fillStyle='var(--text)';ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(cat.label,x+barW*0.35,H-pad+14);
    ctx.fillText(cat.mA.toFixed(2)+'mA',x+barW*0.35,H-pad-barH-4);
  });
  // Total bar
  const totH=plotH*(Itotal/maxMA);
  const tx=barX[2]+barW;
  ctx.fillStyle='#555';
  ctx.fillRect(tx,H-pad-totH,barW*0.7,totH);
  ctx.fillStyle='var(--text)';ctx.textAlign='center';ctx.font='11px system-ui';
  ctx.fillText('TOTAL',tx+barW*0.35,H-pad+14);
  ctx.fillText(Itotal.toFixed(2)+'mA',tx+barW*0.35,H-pad-totH-4);
  // Y axis labels
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  for(let i=0;i<=5;i++){
    const v=(i/5)*maxMA;
    ctx.fillText(v.toFixed(1)+'mA',pad-4,pad+plotH*(1-i/5)+3);
  }
  const lifeStr=lifeDays>=1?lifeDays.toFixed(1)+' days':lifetime.toFixed(1)+' hours';
  result.innerHTML='<b>Total idle current: '+Itotal.toFixed(2)+'mA</b><br>Pull-up: '+Ipu.toFixed(2)+'mA | Divider: '+Idiv.toFixed(2)+'mA<br>Battery: '+bat+'mAh<br><b>Runtime: '+lifeStr+'</b><br>'+(lifeDays<7?'⚠️ Too short! Increase resistor values':'✅ Good battery life')+'<br><b>Rule:</b> Use largest R that still meets timing';
}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slRpu,slRdiv,slBat].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
