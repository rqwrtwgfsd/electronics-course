<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall Sensor — PWM Noise Filter</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 12</div>
  <h1>Hall Sensor: PWM Noise Rejection Filter</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">R (kΩ) <span class="ctrl-value" id="lbl-r">1.6 kΩ</span></div>
      <input type="range" id="sl-r" min="0.1" max="10" value="1.6" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">C (nF) <span class="ctrl-value" id="lbl-c">100 nF</span></div>
      <input type="range" id="sl-c" min="1" max="1000" value="100" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">PWM Freq (kHz) <span class="ctrl-value" id="lbl-f">20 kHz</span></div>
      <input type="range" id="sl-f" min="1" max="100" value="20" step="1">
    </div>
    <div class="result-box" id="result">Adjust filter to kill PWM noise</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slR=document.getElementById('sl-r'),slC=document.getElementById('sl-c'),slF=document.getElementById('sl-f');
const lblR=document.getElementById('lbl-r'),lblC=document.getElementById('lbl-c'),lblF=document.getElementById('lbl-f');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const R=parseFloat(slR.value)*1e3;
  const C=parseFloat(slC.value)*1e-9;
  const fpwm=parseFloat(slF.value)*1e3;
  lblR.textContent=parseFloat(slR.value).toFixed(1)+' kΩ';
  lblC.textContent=slC.value+' nF';
  lblF.textContent=slF.value+' kHz';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  const fc=1/(2*Math.PI*R*C);
  // Show signal with noise (noisy) vs filtered
  // Sensor output: 1.25V (50% of 2.5V) + PWM noise ±0.375V
  const Vsig=1.25,Vnoise=0.375;
  const tTotal=5/fpwm; // 5 PWM cycles
  const vMin=0,vMax=2.5;
  function yPx(v){return pad+plotH*(1-(v-vMin)/(vMax-vMin))}
  // Grid
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  [0,0.5,1.0,1.25,1.5,2.0,2.5].forEach(v=>{ctx.beginPath();ctx.moveTo(pad,yPx(v));ctx.lineTo(W-pad,yPx(v));ctx.stroke()});
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // Noisy input
  ctx.strokeStyle='#e53935';ctx.lineWidth=1.5;ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const pwm=Math.sin(2*Math.PI*fpwm*t)>0?1:-1;
    const v=Math.max(vMin,Math.min(vMax,Vsig+Vnoise*pwm));
    px===0?ctx.moveTo(pad+px,yPx(v)):ctx.lineTo(pad+px,yPx(v));
  }ctx.stroke();
  // Filtered output
  ctx.strokeStyle='#2e7d32';ctx.lineWidth=2;ctx.beginPath();
  let vCap=Vsig;
  const dt=tTotal/plotW;
  const tau=R*C;
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const pwm=Math.sin(2*Math.PI*fpwm*t)>0?1:-1;
    const vIn=Vsig+Vnoise*pwm;
    vCap+=(vIn-vCap)*dt/tau;
    vCap=Math.max(vMin,Math.min(vMax,vCap));
    px===0?ctx.moveTo(pad+px,yPx(vCap)):ctx.lineTo(pad+px,yPx(vCap));
  }ctx.stroke();
  // Signal level line
  ctx.setLineDash([4,3]);ctx.strokeStyle='#0066cc';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,yPx(Vsig));ctx.lineTo(W-pad,yPx(Vsig));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  [0,0.5,1.0,1.25,1.5,2.0,2.5].forEach(v=>ctx.fillText(v.toFixed(2)+'V',pad-4,yPx(v)+3));
  ctx.textAlign='left';ctx.font='11px system-ui';
  ctx.fillStyle='#e53935';ctx.fillText('Noisy sensor output (PWM @ '+slF.value+'kHz)',pad+8,pad+16);
  ctx.fillStyle='#2e7d32';ctx.fillText('After RC filter (fc='+_fmtHz(fc)+')',pad+8,pad+30);
  const ratio=fpwm/fc;
  const atten=20*Math.log10(1/Math.sqrt(1+ratio*ratio));
  const pct=((1-Math.pow(10,atten/20))*100).toFixed(0);
  result.innerHTML='<b>f_c = '+_fmtHz(fc)+'</b><br>PWM frequency: <b>'+slF.value+'kHz</b><br>Attenuation: <b>'+atten.toFixed(0)+' dB</b><br>Noise removed: <b>'+pct+'%</b><br>'+(ratio>10?'✅ Excellent filtering':'ratio f_pwm/fc = '+ratio.toFixed(1)+' — increase RC')+'<br><b>Rule: fc = 10× signal, ÷10 noise freq</b>';
}
function _fmtHz(f){if(f>=1e3)return(f/1e3).toFixed(1)+'kHz';return f.toFixed(0)+'Hz'}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slR,slC,slF].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
