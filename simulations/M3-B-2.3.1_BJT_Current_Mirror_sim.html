<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-B-2.3.1 BJT Current Mirror</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-B-2.3.1 — BJT Current Mirror Accuracy vs β</h1>
<p class="note">See how β affects mirror accuracy. Compare simple mirror vs Wilson mirror error.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>I_ref (µA): <span id="irefv">100</span></label><input type="range" id="iref" min="1" max="1000" value="100" step="1" oninput="sv('irefv',this.value);draw();"></div>
  <div class="ctrl"><label>β: <span id="betav">100</span></label><input type="range" id="beta" min="10" max="500" value="100" step="5" oninput="sv('betav',this.value);draw();"></div>
  <div class="ctrl"><label>V_CE mirror (V): <span id="vcev">5</span></label><input type="range" id="vce" min="0.3" max="15" value="5" step="0.1" oninput="sv('vcev',parseFloat(this.value).toFixed(1));draw();"></div>
</div>
<div class="readouts">
  <div class="ro">I_mirror simple: <span id="im_s">0</span> µA</div>
  <div class="ro">Simple error: <span id="err_s">0</span> %</div>
  <div class="ro">Wilson error: <span id="err_w">0</span> %</div>
  <div class="ro">Early effect: <span id="early">0</span> %</div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const Iref=gs('iref')*1e-6;
  const beta=gs('beta');
  const Vce=gs('vce');
  const VA=100; // Early voltage

  const Im_simple=Iref*beta/(beta+2);
  const err_simple=(Im_simple-Iref)/Iref*100;
  const err_wilson=Iref*(2/(beta*(beta+2)))*100; // approximation
  const early_err=(Vce-0.7)/VA*100; // % increase from Early effect

  sv('im_s',(Im_simple*1e6).toFixed(2));
  sv('err_s',err_simple.toFixed(2));
  sv('err_w',err_wilson.toFixed(3));
  sv('early',early_err.toFixed(2));

  // Plot mirror error vs beta
  drawAxes(ctx,W,H,pad,'β','Mirror Error (%)',fg);
  const bmax=500, errmax=30;
  const xsc=(W-2*pad)/bmax, ysc=(H-2*pad)/errmax;

  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let b=0;b<=bmax;b+=100){ ctx.fillText(b,pad+b*xsc-8,H-pad+13*dpr); }
  for(let e=0;e<=errmax;e+=5){ ctx.fillText(e+'%',pad-28*dpr,H-pad-e*ysc+4); }

  // Simple mirror error curve
  ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2*dpr; ctx.beginPath();
  for(let b=5;b<=bmax;b+=1){
    const err=(-2/(b+2))*100;
    const x=pad+b*xsc, y=H-pad-Math.abs(err)*ysc;
    if(b===5) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Wilson error curve (much smaller)
  ctx.strokeStyle='#2ed573'; ctx.lineWidth=2*dpr; ctx.beginPath();
  for(let b=5;b<=bmax;b+=1){
    const err=(2/(b*(b+2)))*100;
    const x=pad+b*xsc, y=H-pad-Math.max(0,err)*ysc;
    if(b===5) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Current beta marker
  const bx=pad+beta*xsc;
  ctx.beginPath(); ctx.strokeStyle=acc; ctx.lineWidth=1.5*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.moveTo(bx,pad); ctx.lineTo(bx,H-pad); ctx.stroke(); ctx.setLineDash([]);

  ctx.fillStyle='#ff6b6b'; ctx.font=`${10*dpr}px system-ui`;
  ctx.fillText('Simple mirror',W-pad-90*dpr,pad+20*dpr);
  ctx.fillStyle='#2ed573';
  ctx.fillText('Wilson mirror',W-pad-90*dpr,pad+35*dpr);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`β=${beta}: simple=${err_simple.toFixed(2)}%  wilson=${err_wilson.toFixed(3)}%  Early=${early_err.toFixed(2)}%`,pad,pad-8*dpr);
}
draw();
</script></body></html>
