<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-D-1.8.3 — Photodiode</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#0066cc;--accent2:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
@media(prefers-color-scheme:light){:root{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#24292f;--text2:#656d76;--accent:#0066cc;--accent2:#0969da;--green:#2da44e;--red:#cf222e;--yellow:#9a6700}}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;padding:16px}
h2{color:var(--accent2);font-size:16px;margin-bottom:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
canvas{width:100%;border-radius:6px;background:var(--bg);display:block}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.ctrl{flex:1;min-width:180px}
label{display:block;color:var(--text2);font-size:12px;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--accent)}
.readout{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ro{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;font-family:monospace}
.ro span{color:var(--accent2);font-weight:bold}
.note{color:var(--text2);font-size:12px;margin-top:8px;line-height:1.5}
</style></head>
<body>
<h2>M3-D-1.8.3 — Photodiode</h2>
<div class="panel">
<canvas id="cv" height="260"></canvas>
<div class="controls">

  <div class="ctrl"><label>Optical power P (µW): <b id="lP">10</b></label>
    <input type="range" id="P" min="0.001" max="1000" step="0.5" value="10"></div>
  <div class="ctrl"><label>Responsivity R (A/W): <b id="lRsp">0.6</b></label>
    <input type="range" id="Rsp" min="0.1" max="0.9" step="0.05" value="0.6"></div>
  <div class="ctrl"><label>TIA R_f (kΩ): <b id="lRf">10</b></label>
    <input type="range" id="Rf" min="1" max="1000" step="1" value="10"></div>
  <div class="ctrl"><label>V_reverse (V): <b id="lVr">5</b></label>
    <input type="range" id="Vr" min="0" max="20" step="1" value="5"></div>

</div>
<div class="readout">
  <div class="ro">I_ph (nA): <span id="r1">0</span></div>
  <div class="ro">V_TIA (mV): <span id="r2">0</span></div>
  <div class="ro">C_j (pF): <span id="r3">0</span></div>
  <div class="ro">BW (kHz): <span id="r4">0</span></div>
</div>
<p class="note">Photocurrent vs optical power. TIA output voltage and bandwidth calculations.</p>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;cv.getContext('2d').scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillStyle=color;ctx.font='11px system-ui';
  ctx.fillText(yl,pad+4,pad+12);ctx.fillText(xl,W-pad-2,H-pad-4);
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function draw(){

  const P=gs('P')*1e-6,Rsp=gs('Rsp'),Rf=gs('Rf')*1e3,Vr=gs('Vr');
  document.getElementById('lP').textContent=(P*1e6).toFixed(2);
  document.getElementById('lRsp').textContent=Rsp.toFixed(2);
  document.getElementById('lRf').textContent=(Rf/1e3).toFixed(0);
  document.getElementById('lVr').textContent=Vr.toFixed(0);
  const Iph=Rsp*P*1e9;
  const Vtia=Rsp*P*Rf;
  const Cj=100e-12/Math.sqrt(1+Vr/0.7);
  const BW=1/(2*Math.PI*Rf*Cj)/1e3;
  sv('r1',Iph.toFixed(3));sv('r2',(Vtia*1000).toFixed(3));
  sv('r3',(Cj*1e12).toFixed(1));sv('r4',BW.toFixed(1));

  const W=cv.offsetWidth,H=260,pad=40;
  const bg=isDark()?'#0d1117':'#fff',fg=isDark()?'#8b949e':'#656d76';
  ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawAxes(ctx,W,H,pad,'P_opt (log µW) →','V_TIA (mV) ↑',fg);
  const pMin=0.001e-6,pMax=1000e-6;
  const logMin=Math.log10(pMin*1e6),logMax=Math.log10(pMax*1e6);
  const xsc=(W-2*pad)/(logMax-logMin);
  const vmax=Rsp*pMax*Rf*1000;const ysc=(H-2*pad)/Math.min(vmax,10000);
  ctx.strokeStyle='#3fb950';ctx.lineWidth=2;ctx.beginPath();
  for(let lp=logMin;lp<=logMax;lp+=0.05){{
    const pp=Math.pow(10,lp)*1e-6;
    const v=Rsp*pp*Rf*1000;
    const x=pad+(lp-logMin)*xsc,y=H-pad-Math.min(v,vmax)*ysc;
    if(lp===logMin)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }}
  ctx.stroke();
  const logP=Math.log10(P*1e6);
  const xop=pad+(logP-logMin)*xsc,yop=H-pad-Math.min(Vtia*1000,vmax)*ysc;
  ctx.fillStyle='#f85149';ctx.beginPath();ctx.arc(xop,Math.max(pad+5,yop),5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fg;ctx.font='11px system-ui';
  ctx.fillText('0.001µW',pad,H-pad+14);ctx.fillText('1mW',W-pad-30,H-pad+14);
  ctx.fillStyle='#3fb950';ctx.fillText('R_sp='+Rsp.toFixed(2)+'A/W, R_f='+Math.round(Rf/1e3)+'kΩ',pad,pad+15);
  ctx.fillStyle='#f85149';ctx.fillText(Iph.toFixed(2)+'nA → '+(Vtia*1000).toFixed(2)+'mV',xop+8,Math.max(pad+20,yop));

}
document.querySelectorAll('input[type=range],select').forEach(e=>e.addEventListener('input',draw));
window.addEventListener('resize',()=>resize(cv,draw));
resize(cv,draw);
</script>
</body></html>
