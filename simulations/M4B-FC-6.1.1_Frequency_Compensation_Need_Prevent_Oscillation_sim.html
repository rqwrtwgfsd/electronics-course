<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-FC-6.1.1 — Frequency Compensation: Need</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:250px; min-width:230px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; line-height:1.5; color:var(--text2); }
  .tabs { display:flex; gap:4px; margin-bottom:10px; }
  .tab { padding:5px 10px; border:1px solid var(--border); border-radius:4px; font-size:11px; cursor:pointer; background:var(--bg); color:var(--text); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>
</head>
<body>
<header>
  <div class="id">M4B-FC-6.1.1</div>
  <h1>Frequency Compensation — Need: Prevent Oscillation</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <div class="tabs">
      <button class="tab active" onclick="setTab('uncomp')">Uncompensated</button>
      <button class="tab" onclick="setTab('comp')">Compensated</button>
    </div>
    <canvas id="cv" height="320"></canvas>
    <div class="readouts">
      <div class="readout"><label>Unity-Gain fc</label><span class="val" id="r-fc">—</span></div>
      <div class="readout"><label>Phase Margin</label><span class="val" id="r-pm">—</span></div>
      <div class="readout"><label>GBW</label><span class="val" id="r-gbw">—</span></div>
      <div class="readout"><label>Dominant fp1</label><span class="val" id="r-fp1d">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Amplifier</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.2</span></label>
      <input type="range" id="sl-gm1" min="0.5" max="5" step="0.1" value="1.2" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp1_nat (MHz) <span id="lbl-fp1">6</span></label>
      <input type="range" id="sl-fp1" min="1" max="50" value="6" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp2 (MHz) <span id="lbl-fp2">10</span></label>
      <input type="range" id="sl-fp2" min="1" max="100" value="10" oninput="update()">
    </div>
    <div class="ctrl">
      <label>DC Gain A₀ (dB) <span id="lbl-a0">80</span></label>
      <input type="range" id="sl-a0" min="40" max="100" value="80" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Compensation</div>
    <div class="ctrl">
      <label>Cc (pF) <span id="lbl-cc">33</span></label>
      <input type="range" id="sl-cc" min="1" max="100" value="33" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm2 (mA/V) <span id="lbl-gm2">4</span></label>
      <input type="range" id="sl-gm2" min="1" max="10" step="0.5" value="4" oninput="update()">
    </div>
    <div class="ctrl">
      <label style="align-items:center">Nulling Rs <span id="lbl-rs">OFF</span>
        <input type="checkbox" id="chk-rs" onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
  </div>
</div>
<script>
let tab='uncomp';
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='uncomp')||(i===1&&t==='comp')));update();}

function phaseAt(f,fp1,fp2,fz) {
  let p=-Math.atan(f/fp1)-Math.atan(f/fp2);
  if(fz>0) p-=Math.atan(f/fz);
  return p*180/Math.PI;
}
function magAt(f,a0,fp1,fp2){return a0/Math.sqrt(1+(f/fp1)**2)/Math.sqrt(1+(f/fp2)**2);}
function findCross(a0,fp1,fp2){
  let lo=1,hi=1e12;
  for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);magAt(m,a0,fp1,fp2)>1?lo=m:hi=m;}
  return Math.sqrt(lo*hi);
}

function update() {
  const gm1=parseFloat(document.getElementById('sl-gm1').value)/1000;
  const fp1_nat=parseFloat(document.getElementById('sl-fp1').value)*1e6;
  const fp2=parseFloat(document.getElementById('sl-fp2').value)*1e6;
  const a0_db=parseFloat(document.getElementById('sl-a0').value);
  const cc=parseFloat(document.getElementById('sl-cc').value)*1e-12;
  const gm2=parseFloat(document.getElementById('sl-gm2').value)/1000;
  const useRs=document.getElementById('chk-rs').checked;

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-fp1').textContent=(fp1_nat/1e6).toFixed(0);
  document.getElementById('lbl-fp2').textContent=(fp2/1e6).toFixed(0);
  document.getElementById('lbl-a0').textContent=a0_db;
  document.getElementById('lbl-cc').textContent=(cc*1e12).toFixed(0);
  document.getElementById('lbl-gm2').textContent=(gm2*1000).toFixed(1);
  document.getElementById('lbl-rs').textContent=useRs?'ON':'OFF';

  const a0=Math.pow(10,a0_db/20);
  const gbw=gm1/(2*Math.PI*cc);
  // Miller compensation: dominant pole at fp1_miller = fp1_nat / (1+A0) approximately
  // More precisely: fp1_miller ≈ gm1/(2π*a0*cc) — very low
  const fp1_miller=gbw/a0;
  const fz_rhp=useRs?0:gm2/(2*Math.PI*cc);

  let fp1_use, label;
  if(tab==='uncomp'){fp1_use=fp1_nat; label='Uncompensated';}
  else{fp1_use=fp1_miller; label='Compensated';}

  const fc=findCross(a0,fp1_use,fp2);
  const pm=180+phaseAt(fc,fp1_use,fp2,tab==='comp'?fz_rhp:0);

  document.getElementById('r-fc').textContent=fc<1e6?(fc/1e3).toFixed(1)+'kHz':(fc/1e6).toFixed(2)+'MHz';
  const pmEl=document.getElementById('r-pm');
  pmEl.textContent=pm.toFixed(1)+'°';
  pmEl.style.color=pm>=60?'var(--green)':pm>=45?'#cc8800':'var(--warn)';
  document.getElementById('r-gbw').textContent=tab==='comp'?(gbw/1e6).toFixed(1)+'MHz':'—';
  document.getElementById('r-fp1d').textContent=tab==='comp'?
    (fp1_miller<1e3?(fp1_miller).toFixed(0)+'Hz':(fp1_miller/1e3).toFixed(1)+'kHz'):
    (fp1_nat/1e6).toFixed(0)+'MHz';

  let ins=`${label}: fc=${fc<1e6?(fc/1e3).toFixed(0)+'kHz':(fc/1e6).toFixed(2)+'MHz'}, PM=${pm.toFixed(1)}°. `;
  if(tab==='uncomp') {
    ins+=pm<45?`UNSTABLE/MARGINAL without compensation. `:`Stable but marginal. `;
    ins+=`fp1=${(fp1_nat/1e6).toFixed(0)}MHz, fp2=${(fp2/1e6).toFixed(0)}MHz contribute phase simultaneously at fc.`;
  } else {
    ins+=`Miller dominant pole at ${fp1_miller<1e3?fp1_miller.toFixed(0)+'Hz':(fp1_miller/1e3).toFixed(1)+'kHz'}. `;
    ins+=`GBW=${(gbw/1e6).toFixed(1)}MHz. `;
    if(!useRs&&fz_rhp>0) ins+=`RHP zero at ${(fz_rhp/1e6).toFixed(0)}MHz costs ${(Math.atan(fc/fz_rhp)*180/Math.PI).toFixed(0)}°.`;
    else ins+=`Nulling Rs eliminates RHP zero.`;
  }
  document.getElementById('ins').textContent=ins;

  draw(a0,fp1_use,fp2,tab==='comp'?fz_rhp:0,fc,pm,gbw,tab);
}

function draw(a0,fp1,fp2,fz,fc,pm,gbw,mode) {
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500; canvas.width=W; canvas.height=320;
  const ctx=canvas.getContext('2d');
  const pad={l:50,r:15,t:20,b:35};
  const pw=W-pad.l-pad.r, ph=320-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)'; ctx.fillRect(0,0,W,320);
  const magH=ph*0.52, phH=ph*0.48;
  const magTop=pad.t, phTop=pad.t+magH+4;
  const fMin=1e2, fMax=1e11;
  const lMin=Math.log10(fMin),lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(f)-lMin)/(lMax-lMin)*pw;
  const mToY=(m,top,h)=>top+h-((m+40)/120)*h;
  const pToY=(p,top,h)=>top+h-((p+270)/270)*h;

  ctx.strokeStyle='var(--border)';ctx.lineWidth=0.6;
  for(let m=-40;m<=80;m+=40){const y=mToY(m,magTop,magH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(m+'dB',pad.l-3,y+3);}
  for(let p=-270;p<=0;p+=90){const y=pToY(p,phTop,phH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p+'°',pad.l-3,y+3);}
  const y0=mToY(0,magTop,magH);ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+pw,y0);ctx.stroke();
  const y180=pToY(-180,phTop,phH);ctx.strokeStyle='rgba(204,68,0,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.l,y180);ctx.lineTo(pad.l+pw,y180);ctx.stroke();ctx.setLineDash([]);

  const color=mode==='uncomp'?'#cc4400':'#0066cc';
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();let first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const m=20*Math.log10(Math.max(1e-6,Math.abs(a0/Math.sqrt(1+(f/fp1)**2)/Math.sqrt(1+(f/fp2)**2))));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-10||y>magTop+magH+10){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  ctx.strokeStyle='#00994d';ctx.lineWidth=2;ctx.beginPath();first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const p=-Math.atan(f/fp1)*180/Math.PI - Math.atan(f/fp2)*180/Math.PI - (fz>0?Math.atan(f/fz)*180/Math.PI:0);const x=fToX(f);const y=pToY(Math.max(-270,p),phTop,phH);first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  if(fc>=fMin&&fc<=fMax){
    const xcf=fToX(fc);
    ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(xcf,magTop);ctx.lineTo(xcf,phTop+phH);ctx.stroke();ctx.setLineDash([]);
    const yphc=pToY(-(180-pm),phTop,phH);
    ctx.fillStyle=pm>=60?'#00994d':pm>=45?'#cc8800':'#cc4400';
    ctx.beginPath();ctx.arc(xcf,yphc,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='var(--text)';ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillText('PM='+pm.toFixed(0)+'°',xcf+6,yphc-3);
  }
  ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='center';
  ['100Hz','1k','10k','100k','1M','10M','100M','1G','10G'].forEach((l,i)=>ctx.fillText(l,fToX(Math.pow(10,2+i)),phTop+phH+14));
  ctx.fillStyle=color;ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.fillText(mode==='uncomp'?'UNCOMPENSATED':'COMPENSATED (Miller)',pad.l+4,magTop+12);
}
update();
</script>
</body>
</html>
