<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-DS-4.3 PCB Parasitic Inductance</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-DS-4.3 — PCB Layout: Parasitic Inductance Voltage Spikes</h1>
<p class="note">Adjust trace inductance and switching speed to see V_DS voltage spike during turn-off.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>L_stray (nH): <span id="lv">10</span></label><input type="range" id="l" min="0.1" max="100" value="10" step="0.1" oninput="sv('lv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>I_load (A): <span id="ilv">10</span></label><input type="range" id="il" min="0.1" max="50" value="10" step="0.1" oninput="sv('ilv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>t_fall (ns): <span id="tfv">20</span></label><input type="range" id="tf" min="1" max="200" value="20" step="1" oninput="sv('tfv',this.value);draw();"></div>
  <div class="ctrl"><label>V_DS_supply (V): <span id="vdsv">48</span></label><input type="range" id="vds" min="5" max="400" value="48" step="1" oninput="sv('vdsv',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_spike: <span id="vspike">0</span> V</div>
  <div class="ro">V_DS_peak: <span id="vdspk">0</span> V</div>
  <div class="ro">dI/dt: <span id="didt">0</span> A/ns</div>
  <div class="ro">Exceeds BV: <span id="safe">-</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const L=gs('l')*1e-9; // H
  const IL=gs('il'); // A
  const TF=gs('tf')*1e-9; // s
  const VDS=gs('vds'); // V

  const dIdt=IL/TF; // A/s
  const Vspike=L*dIdt; // V
  const VDS_peak=VDS+Vspike;
  const BV=VDS*2; // assumed 2× margin
  const safe=VDS_peak<BV;

  sv('vspike',Vspike.toFixed(1));
  sv('vdspk',VDS_peak.toFixed(1));
  sv('didt',(dIdt/1e9).toFixed(2));
  sv('safe',safe?'SAFE':'EXCEEDS BV!');

  // Draw V_DS waveform
  const N=300;
  const tmax=200e-9; // 200 ns total
  const xsc=(W-2*pad)/tmax*1e9; // per ns
  const vmax=Math.max(VDS_peak*1.3, VDS*1.5);
  const ysc=(H-2*pad)/vmax;

  drawAxes(ctx,W,H,pad,'t (ns)','V_DS (V)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let t=0;t<=200;t+=40){
    ctx.fillText(t,pad+t*xsc-5,H-pad+13*dpr);
  }
  for(let v=0;v<=vmax;v+=vmax/5){
    ctx.fillText(v.toFixed(0),pad-28*dpr,H-pad-v*ysc+4);
  }

  // V_DS waveform
  ctx.strokeStyle=safe?acc:'#ff6b6b'; ctx.lineWidth=2.5*dpr; ctx.beginPath();
  for(let i=0;i<N;i++){
    const t=(i/N)*tmax;
    const t_off=50e-9; // switch off at 50 ns
    let vds_t;
    if(t<t_off) vds_t=0.1; // MOSFET on (low V_DS)
    else if(t<t_off+TF){
      // Rising V_DS + spike from L
      const frac=(t-t_off)/TF;
      const v_rise=VDS*frac; // V_DS rises as current falls
      const v_ind=Vspike*(1-frac); // spike decays
      vds_t=v_rise+v_ind;
    } else{
      // Oscillation damping (if no snubber)
      const tau=10e-9;
      const t2=t-t_off-TF;
      vds_t=VDS+Vspike*Math.exp(-t2/tau)*Math.cos(2*Math.PI*t2/20e-9)*0.3;
    }
    const x=pad+t*1e9*xsc; const y=H-pad-Math.min(vds_t,vmax)*ysc;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // BV line
  ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.5*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath(); ctx.moveTo(pad,H-pad-BV*ysc); ctx.lineTo(W-pad,H-pad-BV*ysc); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#ff4444'; ctx.font=`${9*dpr}px system-ui`;
  ctx.fillText('BV_DSS',W-pad+2*dpr,H-pad-BV*ysc);

  // V_supply line
  ctx.strokeStyle='#ffa502'; ctx.lineWidth=1*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath(); ctx.moveTo(pad,H-pad-VDS*ysc); ctx.lineTo(W-pad,H-pad-VDS*ysc); ctx.stroke(); ctx.setLineDash([]);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`V_spike=L×dI/dt=${L*1e9}nH×${(IL/TF/1e9).toFixed(1)}A/ns=${Vspike.toFixed(1)}V  V_peak=${VDS_peak.toFixed(0)}V  ${safe?'SAFE':'DANGER!'}`,pad,pad-8*dpr);
}
draw();
</script></body></html>
