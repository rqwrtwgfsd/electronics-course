<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2-SO-4.1.1 — LC Energy Exchange</title>
<style>
  :root { --accent: #0066cc; --bg: #1a1a1a; --panel: #242424; --border: #333; --text: #e0e0e0; --muted: #888; }
  @media (prefers-color-scheme: light) { :root { --bg: #f4f4f4; --panel: #fff; --border: #ccc; --text: #1a1a1a; --muted: #555; } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  h1 { font-size: 1.1rem; color: var(--accent); padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .subtitle { font-size: 0.8rem; color: var(--muted); padding: 0 16px 8px; }
  .layout { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; min-width: 230px; flex: 0 0 230px; }
  .ctrl-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .val { font-weight: bold; color: var(--accent); }
  .readout { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 7px; }
  .card-label { font-size: 0.68rem; color: var(--muted); }
  .card-val { font-size: 0.84rem; font-weight: bold; color: var(--accent); }
  .canvases { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 300px; }
  canvas { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: block; }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 0.82rem; margin-top: 8px; width: 100%; }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<h1>P2-SO-4.1.1 — LC Energy Exchange</h1>
<p class="subtitle">E_L = ½LI² &nbsp;|&nbsp; E_C = ½CV² &nbsp;|&nbsp; E_total = constant (ideal)</p>
<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <label>Inductance L (µH): <span class="val" id="vL">10.0</span></label>
      <input type="range" id="sL" min="1" max="100" step="1" value="10">
    </div>
    <div class="ctrl-group">
      <label>Capacitance C (nF): <span class="val" id="vC">10</span></label>
      <input type="range" id="sC" min="1" max="100" step="1" value="10">
    </div>
    <div class="ctrl-group">
      <label>Initial voltage V₀ (V): <span class="val" id="vV0">1.0</span></label>
      <input type="range" id="sV0" min="0.1" max="5" step="0.1" value="1">
    </div>
    <button class="btn" id="btnAnim">▶ Animate</button>
    <div class="readout">
      <div class="card"><div class="card-label">ω₀ = 1/√(LC)</div><div class="card-val" id="rOmega">10.0 Mrad/s</div></div>
      <div class="card"><div class="card-label">f₀</div><div class="card-val" id="rF0">1.59 MHz</div></div>
      <div class="card"><div class="card-label">Z₀ = √(L/C)</div><div class="card-val" id="rZ0">31.6 Ω</div></div>
      <div class="card"><div class="card-label">I_peak = V₀/Z₀</div><div class="card-val" id="rIpeak">31.6 mA</div></div>
      <div class="card"><div class="card-label">E_total = ½CV₀²</div><div class="card-val" id="rEtot">5.00 nJ</div></div>
      <div class="card"><div class="card-label">Period T</div><div class="card-val" id="rT">628 ns</div></div>
    </div>
  </div>
  <div class="canvases">
    <canvas id="cvWave" width="540" height="195"></canvas>
    <canvas id="cvBars" width="540" height="195"></canvas>
  </div>
</div>
<script>
let animId = null, animT = 0, animRunning = false;

function getC() {
  const d = window.matchMedia('(prefers-color-scheme: dark)').matches;
  return { bg: d?'#242424':'#fff', grid: d?'#2e2e2e':'#e8e8e8', mut: d?'#888':'#555' };
}

function getParams() {
  return {
    L: parseFloat(document.getElementById('sL').value)*1e-6,
    C: parseFloat(document.getElementById('sC').value)*1e-9,
    V0: parseFloat(document.getElementById('sV0').value),
  };
}

function updateReadouts(p) {
  const omega0 = 1/Math.sqrt(p.L*p.C);
  const f0 = omega0/(2*Math.PI);
  const Z0 = Math.sqrt(p.L/p.C);
  const Ip = p.V0/Z0;
  const Et = 0.5*p.C*p.V0*p.V0;
  const T = 2*Math.PI/omega0;
  document.getElementById('vL').textContent=(p.L*1e6).toFixed(1);
  document.getElementById('vC').textContent=(p.C*1e9).toFixed(0);
  document.getElementById('vV0').textContent=p.V0.toFixed(1);
  document.getElementById('rOmega').textContent=(omega0/1e6).toFixed(1)+' Mrad/s';
  document.getElementById('rF0').textContent=f0>=1e6?(f0/1e6).toFixed(2)+' MHz':f0>=1e3?(f0/1e3).toFixed(2)+' kHz':f0.toFixed(0)+' Hz';
  document.getElementById('rZ0').textContent=Z0.toFixed(1)+' Ω';
  document.getElementById('rIpeak').textContent=(Ip*1000).toFixed(1)+' mA';
  document.getElementById('rEtot').textContent=(Et*1e9).toFixed(2)+' nJ';
  document.getElementById('rT').textContent=T>=1e-6?(T*1e9).toFixed(0)+' ns':T>=1e-3?(T*1e6).toFixed(0)+' µs':(T*1e3).toFixed(2)+' ms';
}

function drawWave(tNow) {
  const p=getParams(), omega0=1/Math.sqrt(p.L*p.C), T=2*Math.PI/omega0;
  const cv=document.getElementById('cvWave'), ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,padL=55,padR=15,padT=22,padB=34,plotW=W-padL-padR,plotH=H-padT-padB;
  const c=getC();
  ctx.fillStyle=c.bg;ctx.fillRect(0,0,W,H);
  const tMax=2*T;
  const tx=t=>padL+(t/tMax)*plotW;
  const tyV=v=>padT+(1-v/p.V0)*(plotH/2);
  const tyI=i=>padT+plotH/2+(1-i/p.V0*Math.sqrt(p.L/p.C))*(plotH/2);
  // Actually: plot V_C and I*Z0 on same normalized scale
  const norm=v=>padT+(1-(v/p.V0))*plotH;

  ctx.strokeStyle=c.grid;ctx.lineWidth=1;
  for(let i=0;i<=4;i++){ctx.beginPath();ctx.moveTo(tx(i*tMax/4),padT);ctx.lineTo(tx(i*tMax/4),padT+plotH);ctx.stroke();}
  for(let i=0;i<=4;i++){ctx.beginPath();ctx.moveTo(padL,padT+i*plotH/4);ctx.lineTo(padL+plotW,padT+i*plotH/4);ctx.stroke();}
  ctx.strokeStyle=c.mut;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+plotH);ctx.lineTo(padL+plotW,padT+plotH);ctx.stroke();

  const Z0=Math.sqrt(p.L/p.C);
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=400;i++){const t=i/400*tMax;const vc=p.V0*Math.cos(omega0*t);if(i===0)ctx.moveTo(tx(t),norm(vc));else ctx.lineTo(tx(t),norm(vc));}
  ctx.stroke();
  ctx.strokeStyle='#ff8844';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=400;i++){const t=i/400*tMax;const iz=-(p.V0/Z0)*Z0*Math.sin(omega0*t);if(i===0)ctx.moveTo(tx(t),norm(iz));else ctx.lineTo(tx(t),norm(iz));}
  ctx.stroke();

  // current time marker
  if(tNow!==null){
    const tmod=((tNow%(tMax))+tMax)%tMax;
    ctx.strokeStyle='#44ff44';ctx.lineWidth=2;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(tx(tmod),padT);ctx.lineTo(tx(tmod),padT+plotH);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.fillStyle='#0066cc';ctx.font='10px sans-serif';ctx.fillText('V_C(t)',padL+4,padT+12);
  ctx.fillStyle='#ff8844';ctx.fillText('I(t)×Z₀',padL+4,padT+24);
  ctx.fillStyle=c.mut;ctx.font='10px sans-serif';
  for(let i=0;i<=4;i++)ctx.fillText((i*tMax/4*1e9).toFixed(0)+'ns',tx(i*tMax/4)-15,padT+plotH+16);
}

function drawBars(tNow) {
  const p=getParams(), omega0=1/Math.sqrt(p.L*p.C), T=2*Math.PI/omega0;
  const cv=document.getElementById('cvBars'), ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,c=getC();
  ctx.fillStyle=c.bg;ctx.fillRect(0,0,W,H);

  const tmod=tNow===null?0:((tNow%(2*T)+(2*T))%(2*T));
  const vc=p.V0*Math.cos(omega0*tmod);
  const il=(p.V0/Math.sqrt(p.L/p.C))*Math.sin(omega0*tmod);
  const Ec=0.5*p.C*vc*vc;
  const El=0.5*p.L*il*il;
  const Etot=0.5*p.C*p.V0*p.V0;
  const fracC=Ec/Etot, fracL=El/Etot;

  const bW=100,bH=H*0.6,bY=H*0.2,bX1=W*0.2,bX2=W*0.55;

  // Bar backgrounds
  [[bX1,'#1a2a3a'],[bX2,'#2a1a1a']].forEach(([x,bg])=>{
    ctx.fillStyle=bg;ctx.fillRect(x-bW/2,bY,bW,bH);
    ctx.strokeStyle=c.grid;ctx.lineWidth=1;ctx.strokeRect(x-bW/2,bY,bW,bH);
  });

  // E_C bar (blue)
  ctx.fillStyle='#0066cc';
  ctx.fillRect(bX1-bW/2, bY+bH*(1-fracC), bW, bH*fracC);
  // E_L bar (orange)
  ctx.fillStyle='#ff8844';
  ctx.fillRect(bX2-bW/2, bY+bH*(1-fracL), bW, bH*fracL);

  // Labels
  ctx.fillStyle='#0066cc';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText('E_C',bX1,bY-8);
  ctx.fillText(`${(Ec*1e12).toFixed(1)} pJ`,bX1,bY+bH+18);
  ctx.fillText(`${(fracC*100).toFixed(0)}%`,bX1,bY+bH*(1-fracC)-4);
  ctx.fillStyle='#ff8844';
  ctx.fillText('E_L',bX2,bY-8);
  ctx.fillText(`${(El*1e12).toFixed(1)} pJ`,bX2,bY+bH+18);
  ctx.fillText(`${(fracL*100).toFixed(0)}%`,bX2,bY+bH*(1-fracL)-4);

  // Total energy bar (thin, combined)
  const bX3=W*0.86;
  ctx.fillStyle='rgba(100,200,100,0.3)';ctx.fillRect(bX3-30,bY,60,bH);
  ctx.strokeStyle='#44aa44';ctx.lineWidth=2;ctx.strokeRect(bX3-30,bY,60,bH);
  const totFrac=(Ec+El)/Etot;
  ctx.fillStyle='#44aa44';ctx.fillRect(bX3-30,bY+bH*(1-totFrac),60,bH*totFrac);
  ctx.fillStyle='#44aa44';ctx.textAlign='center';ctx.font='bold 11px sans-serif';
  ctx.fillText('E_total',bX3,bY-8);
  ctx.fillText(`${((Ec+El)*1e12).toFixed(1)}pJ`,bX3,bY+bH+18);
  ctx.fillText('const',bX3,bY+bH/2);

  ctx.textAlign='left';
  ctx.fillStyle=c.mut;ctx.font='10px sans-serif';
  ctx.fillText(`ω₀t = ${(omega0*tmod).toFixed(2)} rad`,W*0.05,H-8);
}

function frame() {
  const p=getParams(), omega0=1/Math.sqrt(p.L*p.C), T=2*Math.PI/omega0;
  drawWave(animT);
  drawBars(animT);
  animT += T/120;
  if(animRunning) animId=requestAnimationFrame(frame);
}

document.getElementById('btnAnim').addEventListener('click',()=>{
  animRunning=!animRunning;
  document.getElementById('btnAnim').textContent=animRunning?'⏸ Pause':'▶ Animate';
  if(animRunning) frame();
  else cancelAnimationFrame(animId);
});

function draw() {
  const p=getParams(); updateReadouts(p);
  if(!animRunning){drawWave(0);drawBars(0);}
}

['sL','sC','sV0'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',draw);
draw();
</script>
</body>
</html>
