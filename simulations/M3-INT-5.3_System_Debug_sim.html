<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-INT-5.3 System Debug</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-INT-5.3 — System Debug: DC Operating Point Checker</h1>
<p class="note">Simulate a BJT amplifier stage. Identify operating region and diagnose common failures.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>V_CC (V): <span id="vccv">12</span></label><input type="range" id="vcc" min="3" max="20" value="12" step="0.5" oninput="sv('vccv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_B (kΩ): <span id="rbv">100</span></label><input type="range" id="rb" min="1" max="500" value="100" step="1" oninput="sv('rbv',this.value);draw();"></div>
  <div class="ctrl"><label>R_C (kΩ): <span id="rcv">2.2</span></label><input type="range" id="rc" min="0.1" max="10" value="2.2" step="0.1" oninput="sv('rcv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>β: <span id="betav">100</span></label><input type="range" id="beta" min="10" max="400" value="100" step="5" oninput="sv('betav',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_BE: <span id="vbe">0.7</span> V</div>
  <div class="ro">I_B: <span id="ib">0</span> µA</div>
  <div class="ro">I_C: <span id="ic">0</span> mA</div>
  <div class="ro">V_CE: <span id="vce">0</span> V</div>
  <div class="ro">State: <span id="state">-</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const VCC=gs('vcc'), RB=gs('rb')*1000, RC=gs('rc')*1000, beta=gs('beta');

  const IB=(VCC-0.7)/RB;
  const IC_max=beta*IB;
  const IC_sat=(VCC-0.2)/RC;
  const IC=Math.min(IC_max,IC_sat);
  const VCE=VCC-IC*RC;
  const state=IB<=0?'Cutoff':IC>=IC_sat*0.99?'Saturation':'Active';
  const diagnose=state==='Cutoff'?'Check: V_CC, R_B open, transistor installed?':
                 state==='Saturation'?'Check: R_B too small, β too high, R_C too large':
                 'Q-point OK: V_CE='+VCE.toFixed(2)+'V';

  sv('vbe','0.70'); sv('ib',(IB*1e6).toFixed(1)); sv('ic',(IC*1000).toFixed(2));
  sv('vce',VCE.toFixed(2)); sv('state',state);

  // Load line
  const icmax=VCC/RC*1000*1.2;
  const xsc=(W-2*pad)/VCC, ysc=(H-2*pad)/icmax;
  drawAxes(ctx,W,H,pad,'V_CE (V)','I_C (mA)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let v=0;v<=VCC;v+=VCC/6){ ctx.fillText(v.toFixed(0),pad+v*xsc-5,H-pad+13*dpr); }
  for(let i=0;i<=Math.ceil(icmax);i+=Math.ceil(icmax/5)){ ctx.fillText(i,pad-22*dpr,H-pad-i*ysc+4); }

  ctx.strokeStyle=acc; ctx.lineWidth=2*dpr;
  ctx.beginPath(); ctx.moveTo(pad+VCC*xsc,H-pad); ctx.lineTo(pad,H-pad-VCC/RC*1000*ysc); ctx.stroke();

  // I_C = β*I_B horizontal line
  ctx.strokeStyle='#2ed573'; ctx.lineWidth=1.5*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  const ic_active_y=H-pad-IC_max*1000*ysc;
  if(ic_active_y>pad){
    ctx.beginPath(); ctx.moveTo(pad,ic_active_y); ctx.lineTo(W-pad,ic_active_y); ctx.stroke();
    ctx.fillStyle='#2ed573'; ctx.font=`${9*dpr}px system-ui`;
    ctx.fillText('I_C=β×I_B',W-pad-60*dpr,ic_active_y-4*dpr);
  }
  ctx.setLineDash([]);

  // Q-point
  const qx=pad+Math.max(0,VCE)*xsc, qy=H-pad-Math.min(IC*1000,icmax)*ysc;
  const qcolor=state==='Active'?acc:(state==='Saturation'?'#ffa502':'#ff6b6b');
  ctx.beginPath(); ctx.arc(qx,qy,7*dpr,0,2*Math.PI);
  ctx.fillStyle=qcolor; ctx.fill();
  ctx.fillStyle=qcolor; ctx.font=`${10*dpr}px system-ui`;
  ctx.fillText('Q',qx+8*dpr,qy-4*dpr);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`[${state}] V_CE=${VCE.toFixed(2)}V  I_C=${(IC*1000).toFixed(2)}mA`,pad,pad-8*dpr);
  ctx.fillStyle=state==='Active'?'#2ed573':'#ffa502'; ctx.font=`${10*dpr}px system-ui`;
  ctx.fillText(diagnose,pad,H-pad+30*dpr);
}
draw();
</script></body></html>
