<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-B-2.2.2 BJT Switch Simulation</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-B-2.2.2 — BJT Switch: Saturation and Switching Speed</h1>
<p class="note">Set load current and base drive. See if BJT saturates. Observe storage time effect on waveform.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>I_C load (mA): <span id="icv">100</span></label><input type="range" id="ic" min="1" max="500" value="100" step="1" oninput="sv('icv',this.value);draw();"></div>
  <div class="ctrl"><label>I_B drive (mA): <span id="ibv">10</span></label><input type="range" id="ib" min="0.1" max="50" value="10" step="0.1" oninput="sv('ibv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>β_min: <span id="betav">100</span></label><input type="range" id="beta" min="20" max="400" value="100" step="10" oninput="sv('betav',this.value);draw();"></div>
  <div class="ctrl"><label>Freq (kHz): <span id="fv">10</span></label><input type="range" id="freq" min="1" max="1000" value="10" step="1" oninput="sv('fv',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">β_forced: <span id="bf">0</span></div>
  <div class="ro">V_CE_sat: <span id="vce">0</span> V</div>
  <div class="ro">State: <span id="state">-</span></div>
  <div class="ro">t_s / period: <span id="ts">0</span> %</div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=50*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const IC=gs('ic'); // mA
  const IB=gs('ib'); // mA
  const beta=gs('beta');
  const freq=gs('freq')*1000; // Hz

  const beta_forced=IC/IB;
  const saturated=beta_forced < beta;
  const VCE_sat=saturated?(0.1+beta_forced/beta*0.1):Math.max(0,(IC/beta/IB)*12-0.1); // rough
  const ts=300e-9; // 300 ns typical storage time
  const period=1/freq;
  const ts_pct=(ts/period*100);
  const state=IB===0?'Cutoff':(saturated?'Saturation':'Active');

  sv('bf',beta_forced.toFixed(1));
  sv('vce',saturated?'0.1–0.2':'(active)');
  sv('state',state);
  sv('ts',ts_pct.toFixed(1));

  // Draw switching waveform
  const mid=H/2, amp=80*dpr;
  const cycles=3;

  // Input waveform (square)
  ctx.strokeStyle='#2ed573'; ctx.lineWidth=2*dpr;
  ctx.fillStyle='#2ed573'; ctx.font=`${9*dpr}px system-ui`;
  ctx.fillText('V_base',pad,pad-5*dpr);
  ctx.beginPath();
  for(let i=0;i<cycles*2;i++){
    const x1=pad+(i/(cycles*2))*(W-2*pad);
    const x2=pad+((i+1)/(cycles*2))*(W-2*pad);
    const y=i%2===0?pad+20*dpr:H-pad-20*dpr;
    if(i===0) ctx.moveTo(x1,y); else ctx.lineTo(x1,y);
    ctx.lineTo(x2,y);
  }
  ctx.stroke();

  // Output waveform (V_CE, inverted + delayed if ts large)
  ctx.strokeStyle=ts_pct>30?'#ff6b6b':acc; ctx.lineWidth=2*dpr;
  ctx.fillStyle=ts_pct>30?'#ff6b6b':acc;
  ctx.fillText('V_CE',pad,H-pad-25*dpr);
  const t_delay=Math.min(ts_pct/100*0.5, 0.5); // normalized delay
  ctx.beginPath();
  for(let i=0;i<cycles*2;i++){
    const base=(i/(cycles*2));
    const x1=pad+(base+t_delay/(cycles*2))*(W-2*pad);
    const x2=pad+((i+1)/(cycles*2)+t_delay/(cycles*2))*(W-2*pad);
    const high_vce=H-pad-20*dpr; // V_CE high = transistor OFF
    const low_vce=pad+H*0.5; // V_CE sat
    const y=i%2===0?low_vce:high_vce; // inverting: in high → VCE low
    if(i===0) ctx.moveTo(Math.min(x1,W-pad),y);
    else ctx.lineTo(Math.min(x1,W-pad),y);
    ctx.lineTo(Math.min(x2,W-pad),y);
  }
  ctx.stroke();

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`β_forced=${beta_forced.toFixed(1)} (need <${beta}) | ${state} | t_s/T=${ts_pct.toFixed(1)}%${ts_pct>10?' ⚠ DISTORTION':''}`,pad,H/2);
}
draw();
</script></body></html>
