<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-MS-5.5.2 — Optimize: Maintain Stability</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:260px; min-width:240px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; color:var(--text2); line-height:1.5; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-MS-5.5.2</div>
  <h1>Multi-Stage Optimize — Maintain Stability</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="320"></canvas>
    <div class="readouts">
      <div class="readout"><label>Crossover fc</label><span class="val" id="r-fc">—</span></div>
      <div class="readout"><label>GBW (MHz)</label><span class="val" id="r-gbw">—</span></div>
      <div class="readout"><label>Phase Margin</label><span class="val" id="r-pm">—</span></div>
      <div class="readout"><label>Optimal Cc</label><span class="val" id="r-cc-opt">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Amplifier Parameters</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.5</span></label>
      <input type="range" id="sl-gm1" min="0.3" max="5" step="0.1" value="1.5" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm2 (mA/V) <span id="lbl-gm2">5.0</span></label>
      <input type="range" id="sl-gm2" min="1" max="15" step="0.5" value="5.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp2 (MHz) <span id="lbl-fp2">30</span></label>
      <input type="range" id="sl-fp2" min="5" max="200" value="30" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Compensation</div>
    <div class="ctrl">
      <label>Cc (pF) <span id="lbl-cc">5</span></label>
      <input type="range" id="sl-cc" min="0.5" max="50" step="0.5" value="5" oninput="update()">
    </div>
    <div class="ctrl">
      <label style="align-items:center">Nulling Rs <span id="lbl-rs-en">OFF</span>
        <input type="checkbox" id="chk-rs" onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
    <div class="section-title" style="margin-top:8px">Target PM</div>
    <div class="ctrl">
      <label>Target PM (°) <span id="lbl-tgt">60</span></label>
      <input type="range" id="sl-tgt" min="30" max="85" value="60" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Auto-Size Cc</div>
    <div class="ctrl">
      <button style="width:100%;padding:6px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700" onclick="autoSize()">Compute Optimal Cc</button>
    </div>
  </div>
</div>
<script>
function phaseAt(f,fp1,fp2,fz_rhp) {
  let p=-Math.atan(f/fp1)-Math.atan(f/fp2);
  if(fz_rhp>0) p-=Math.atan(f/fz_rhp);
  return p*180/Math.PI;
}
function magAt(f,a0,fp1,fp2){return a0/Math.sqrt(1+(f/fp1)**2)/Math.sqrt(1+(f/fp2)**2);}
function findCross(a0,fp1,fp2){
  let lo=1,hi=1e11;
  for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);magAt(m,a0,fp1,fp2)>1?lo=m:hi=m;}
  return Math.sqrt(lo*hi);
}

function autoSize() {
  const gm1=parseFloat(document.getElementById('sl-gm1').value)/1000;
  const fp2=parseFloat(document.getElementById('sl-fp2').value)*1e6;
  const tgt=parseFloat(document.getElementById('sl-tgt').value);
  const needAngle=180-90-tgt;
  const fc_target=fp2*Math.tan(needAngle*Math.PI/180);
  const cc_opt=gm1/(2*Math.PI*fc_target)*1e12;
  document.getElementById('sl-cc').value=Math.min(50,Math.max(0.5,cc_opt)).toFixed(1);
  update();
}

function update() {
  const gm1=parseFloat(document.getElementById('sl-gm1').value)/1000;
  const gm2=parseFloat(document.getElementById('sl-gm2').value)/1000;
  const fp2=parseFloat(document.getElementById('sl-fp2').value)*1e6;
  const cc=parseFloat(document.getElementById('sl-cc').value)*1e-12;
  const useRs=document.getElementById('chk-rs').checked;
  const tgt=parseFloat(document.getElementById('sl-tgt').value);

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-gm2').textContent=(gm2*1000).toFixed(1);
  document.getElementById('lbl-fp2').textContent=(fp2/1e6).toFixed(0);
  document.getElementById('lbl-cc').textContent=(cc*1e12).toFixed(1);
  document.getElementById('lbl-tgt').textContent=tgt;
  document.getElementById('lbl-rs-en').textContent=useRs?'ON (Rs='+(1/gm2*1000).toFixed(0)+'Ω)':'OFF';

  const gbw=gm1/(2*Math.PI*cc);
  const fp1=gbw/10000;
  const fz_rhp=useRs?0:gm2/(2*Math.PI*cc);
  const a0=10000;
  const fc=findCross(a0,fp1,fp2);
  const pm=180+phaseAt(fc,fp1,fp2,fz_rhp);

  // Optimal Cc for target PM
  const needAngle=180-90-tgt;
  const fc_opt=fp2*Math.tan(needAngle*Math.PI/180);
  const cc_opt_pF=gm1/(2*Math.PI*fc_opt)*1e12;

  document.getElementById('r-fc').textContent=fc<1e6?(fc/1e3).toFixed(0)+'kHz':(fc/1e6).toFixed(1)+'MHz';
  document.getElementById('r-gbw').textContent=(gbw/1e6).toFixed(1);
  const pmEl=document.getElementById('r-pm');
  pmEl.textContent=pm.toFixed(1)+'°';
  pmEl.style.color=pm>=tgt?'var(--green)':pm>=45?'#cc8800':'var(--warn)';
  document.getElementById('r-cc-opt').textContent=cc_opt_pF.toFixed(1)+'pF';

  let ins=`GBW=${(gbw/1e6).toFixed(1)}MHz, fc=${(fc/1e6).toFixed(2)}MHz, PM=${pm.toFixed(1)}°. `;
  ins+=`Optimal Cc for PM=${tgt}°: ${cc_opt_pF.toFixed(1)}pF. `;
  ins+=`Current Cc=${(cc*1e12).toFixed(1)}pF → ${pm>=tgt?'MEETS target.':'BELOW target. Click "Compute Optimal Cc".'}`;
  if(!useRs&&fz_rhp>0) ins+=` RHP zero at ${(fz_rhp/1e6).toFixed(0)}MHz costs ${(Math.atan(fc/fz_rhp)*180/Math.PI).toFixed(1)}° of PM.`;
  document.getElementById('ins').textContent=ins;

  draw(fp1,fp2,fz_rhp,a0,fc,pm,tgt,gbw);
}

function draw(fp1,fp2,fz_rhp,a0,fc,pm,tgt,gbw) {
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500; canvas.width=W; canvas.height=320;
  const ctx=canvas.getContext('2d');
  const pad={l:50,r:15,t:20,b:35};
  const pw=W-pad.l-pad.r, ph=320-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)'; ctx.fillRect(0,0,W,320);
  const magH=ph*0.5, phH=ph*0.5;
  const magTop=pad.t, phTop=pad.t+magH+4;
  const fMin=1e3,fMax=1e10;
  const lMin=Math.log10(fMin),lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(f)-lMin)/(lMax-lMin)*pw;
  const mToY=(m,top,h)=>top+h-((m+40)/120)*h;
  const pToY=(p,top,h)=>top+h-((p+270)/270)*h;

  // Grid
  ctx.strokeStyle='var(--border)'; ctx.lineWidth=0.7;
  for(let m=-40;m<=80;m+=40){const y=mToY(m,magTop,magH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(m+'dB',pad.l-3,y+3);}
  for(let p=-270;p<=0;p+=90){const y=pToY(p,phTop,phH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p+'°',pad.l-3,y+3);}
  // 0dB and -180°
  const y0=mToY(0,magTop,magH);ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+pw,y0);ctx.stroke();
  const y180=pToY(-180,phTop,phH);ctx.strokeStyle='rgba(204,68,0,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.l,y180);ctx.lineTo(pad.l+pw,y180);ctx.stroke();ctx.setLineDash([]);

  // Mag curve
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2;ctx.beginPath();let first=true;
  for(let i=0;i<=300;i++){const f=Math.pow(10,lMin+i/300*(lMax-lMin));const m=20*Math.log10(Math.max(magAt(f,a0,fp1,fp2),1e-9));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-10||y>magTop+magH+10){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  // Phase curve
  ctx.strokeStyle='#00994d';ctx.lineWidth=2;ctx.beginPath();first=true;
  for(let i=0;i<=300;i++){const f=Math.pow(10,lMin+i/300*(lMax-lMin));const p=phaseAt(f,fp1,fp2,fz_rhp);const x=fToX(f);const y=pToY(Math.max(-270,p),phTop,phH);first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  // Target PM line
  const tgtPhase=-(180-tgt);
  const yTgt=pToY(tgtPhase,phTop,phH);
  ctx.strokeStyle='#cc8800';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pad.l,yTgt);ctx.lineTo(pad.l+pw,yTgt);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#cc8800';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('Target PM='+tgt+'°',pad.l+2,yTgt-3);

  // fc marker
  if(fc>=fMin&&fc<=fMax){
    const xcf=fToX(fc);
    ctx.strokeStyle='#cc4400';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(xcf,magTop);ctx.lineTo(xcf,phTop+phH);ctx.stroke();ctx.setLineDash([]);
    const ycf=pToY(phaseAt(fc,fp1,fp2,fz_rhp),phTop,phH);
    ctx.fillStyle=pm>=(parseFloat(document.getElementById('sl-tgt').value))?'#00994d':'#cc4400';
    ctx.beginPath();ctx.arc(xcf,ycf,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='var(--text)';ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillText('PM='+pm.toFixed(0)+'°',xcf+5,ycf-3);
  }

  ctx.fillStyle='#0066cc';ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.fillText('|T|',pad.l+3,magTop+11);
  ctx.fillStyle='#00994d';ctx.fillText('∠T',pad.l+3,phTop+11);
  ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='center';
  ['1k','10k','100k','1M','10M','100M','1G'].forEach((l,i)=>ctx.fillText(l,fToX(Math.pow(10,3+i)),phTop+phH+14));
}
update();
</script>
</body>
</html>
