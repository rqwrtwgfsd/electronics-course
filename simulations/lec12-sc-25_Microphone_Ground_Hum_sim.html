<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Microphone Ground Hum</title>
<style>:root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}.module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}h1{font-size:18px;margin:4px 0}.layout{display:grid;grid-template-columns:1fr 260px;gap:16px}canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}.controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}.ctrl-group{margin-bottom:12px}.ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}.ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}.result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}@media(max-width:600px){.layout{grid-template-columns:1fr}}</style>
</head>
<body>
<header><div class="module-id">Lecture 12 | Scenario 25</div><h1>Mic Preamp: Body Capacitance &amp; 50Hz Ground Hum</h1></header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group"><div class="ctrl-label">Body Cap to Mains (pF) <span class="ctrl-value" id="lbl-c">5 pF</span></div><input type="range" id="sl-c" min="0.1" max="20" value="5" step="0.1"></div>
    <div class="ctrl-group"><div class="ctrl-label">Amp Gain (dB) <span class="ctrl-value" id="lbl-g">40 dB</span></div><input type="range" id="sl-g" min="20" max="80" value="40" step="1"></div>
    <div class="ctrl-group"><div class="ctrl-label">Case Grounded? <span class="ctrl-value" id="lbl-gnd">No</span></div><input type="range" id="sl-gnd" min="0" max="1" value="0" step="1"></div>
    <div class="result-box" id="result">Adjust to see hum level</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slC=document.getElementById('sl-c'),slG=document.getElementById('sl-g'),slGnd=document.getElementById('sl-gnd');
const lblC=document.getElementById('lbl-c'),lblG=document.getElementById('lbl-g'),lblGnd=document.getElementById('lbl-gnd');
const result=document.getElementById('result');
function draw(){
  const W=cv.width,H=cv.height;
  const Cbody=parseFloat(slC.value)*1e-12;const gain_dB=parseFloat(slG.value);const grounded=parseInt(slGnd.value);
  lblC.textContent=parseFloat(slC.value).toFixed(1)+' pF';lblG.textContent=gain_dB+' dB';lblGnd.textContent=grounded?'YES ✅':'No ⚠️';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  const gain=Math.pow(10,gain_dB/20);
  // Body leakage current: I = V_mains * 2*pi*f * C_body
  const Vmains=230,f50=50;
  const Ileak=Vmains*2*Math.PI*f50*Cbody; // A
  // Input impedance of mic preamp ~50kΩ
  const Rin=50e3;
  // Voltage at input due to leakage
  const Vhum_in=grounded?Ileak*1e3:Ileak*Rin; // grounded case diverts current
  const Vhum_out=Vhum_in*gain;
  // Normal audio signal (1kHz, 10mV from mic)
  const Vsignal_in=10e-3;const Vsignal_out=Vsignal_in*gain;
  const tTotal=0.04; // 2 cycles at 50Hz
  const vMin=-Math.max(Vhum_out,Vsignal_out)*1.2,vMax=Math.max(Vhum_out,Vsignal_out)*1.2;
  function yPx(v){return pad+plotH*(1-(v-vMin)/(vMax-vMin))}
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  [0,vMax*0.5,vMax,vMin*0.5,vMin].forEach(v=>{ctx.beginPath();ctx.moveTo(pad,yPx(v));ctx.lineTo(W-pad,yPx(v));ctx.stroke()});
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // Audio signal
  ctx.strokeStyle='#0066cc';ctx.lineWidth=1.5;ctx.setLineDash([4,2]);ctx.beginPath();
  for(let px=0;px<=plotW;px++){const t=(px/plotW)*tTotal;const v=Vsignal_out*Math.sin(2*Math.PI*1000*t);px===0?ctx.moveTo(pad+px,yPx(v)):ctx.lineTo(pad+px,yPx(v))}ctx.stroke();ctx.setLineDash([]);
  // Hum signal
  ctx.strokeStyle=grounded?'#2e7d32':'#e53935';ctx.lineWidth=2.5;ctx.beginPath();
  for(let px=0;px<=plotW;px++){const t=(px/plotW)*tTotal;const v=Vhum_out*Math.sin(2*Math.PI*50*t);px===0?ctx.moveTo(pad+px,yPx(v)):ctx.lineTo(pad+px,yPx(v))}ctx.stroke();
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  [0,vMax*0.5,vMax].filter(v=>v<=vMax).forEach(v=>ctx.fillText(v.toFixed(1)+'V',pad-4,yPx(v)+3));
  ctx.textAlign='left';ctx.font='11px system-ui';
  ctx.fillStyle='#0066cc';ctx.fillText('Audio signal (1kHz): '+( Vsignal_out).toFixed(1)+'V',pad+8,pad+16);
  ctx.fillStyle=grounded?'#2e7d32':'#e53935';ctx.fillText('50Hz hum ('+( grounded?'grounded case':'ungrounded')+'): '+Vhum_out.toFixed(2)+'V',pad+8,pad+30);
  const SNR=20*Math.log10(Vsignal_out/(Vhum_out+1e-10));
  result.innerHTML='<b>Body leakage current: '+(Ileak*1e9).toFixed(1)+'nA</b><br>Hum at preamp input: <b>'+(Vhum_in*1e3).toFixed(2)+'mV</b><br>Amplified hum: <b>'+Vhum_out.toFixed(2)+'V</b><br>SNR: <b>'+SNR.toFixed(0)+'dB</b><br><b>'+(grounded?'✅ Case grounded — hum diverted to GND':'⚠️ Ground the case! Filter cannot fix this without killing audio')+'</b>';
}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slC,slG,slGnd].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});resizeCanvas();draw();
</script>
</body>
</html>
