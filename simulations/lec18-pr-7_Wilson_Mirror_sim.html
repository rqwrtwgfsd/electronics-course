<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lec 18 Pr 7 — Wilson Current Mirror Accuracy</title>
<style>
  :root { --bg:#fff; --surface:#f5f5f5; --border:#ccc; --text:#1a1a1a; --accent:#0066cc; --muted:#666; }
  @media (prefers-color-scheme:dark) { :root { --bg:#1a1a1a; --surface:#2a2a2a; --border:#444; --text:#e8e8e8; --accent:#4499ff; --muted:#999; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; max-width:900px; margin:0 auto; }
  h1 { font-size:18px; margin-bottom:12px; border-bottom:2px solid var(--accent); padding-bottom:8px; }
  .layout { display:grid; grid-template-columns:1fr 260px; gap:16px; }
  canvas { border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .controls { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px; }
  .ctrl-group { margin-bottom:12px; }
  label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; display:flex; justify-content:space-between; margin-bottom:4px; }
  .val { color:var(--accent); font-family:monospace; font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
  .info { background:rgba(0,102,204,0.08); border:1px solid rgba(0,102,204,0.2); border-radius:4px; padding:10px; margin-top:12px; font-size:12px; line-height:1.6; }
  @media (max-width:600px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>Pr 7 — Simple vs Wilson Current Mirror: I_out Accuracy</h1>
<div class="layout">
  <canvas id="cv" height="380"></canvas>
  <div class="controls">
    <div class="ctrl-group">
      <label>β (hFE) <span class="val" id="v-beta">100</span></label>
      <input type="range" id="beta" min="10" max="500" value="100" step="10">
    </div>
    <div class="ctrl-group">
      <label>I_ref (mA) <span class="val" id="v-iref">1</span></label>
      <input type="range" id="iref" min="0.1" max="5" value="1" step="0.1">
    </div>
    <div class="ctrl-group">
      <label>V_CE2 (V) <span class="val" id="v-vce">3</span></label>
      <input type="range" id="vce" min="0.5" max="10" value="3" step="0.5">
    </div>
    <div class="info" id="info">Compare simple vs Wilson mirror accuracy.</div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resizeCanvas() {
  cv.width = cv.parentElement.getBoundingClientRect().width || 600;
  cv.height = 380;
}

function draw() {
  resizeCanvas();
  const W = cv.width, H = cv.height;
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const bg = dark ? '#1a1a1a' : '#ffffff';
  const fg = dark ? '#e8e8e8' : '#1a1a1a';
  const gridC = dark ? '#333' : '#eee';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const beta = +document.getElementById('beta').value;
  const Iref = +document.getElementById('iref').value * 1e-3;
  const VCE2 = +document.getElementById('vce').value;

  document.getElementById('v-beta').textContent = beta;
  document.getElementById('v-iref').textContent = (Iref*1e3).toFixed(1) + ' mA';
  document.getElementById('v-vce').textContent = VCE2 + ' V';

  // Simple mirror error = 2/beta from finite beta
  const err_simple_pct = (2 / beta) * 100;
  // Wilson mirror error = 2/beta^2
  const err_wilson_pct = (2 / (beta * beta)) * 100;

  // Plot error vs beta sweep
  const pad = { l: 70, r: 20, t: 40, b: 50 };
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;

  const betaMin = 10, betaMax = 500;
  const errMin = 0.001, errMax = 20; // %

  // Log Y axis
  const logErrMin = Math.log10(errMin), logErrMax = Math.log10(errMax);

  ctx.strokeStyle = gridC; ctx.lineWidth = 1;
  [0.001, 0.01, 0.1, 1, 10].forEach(e => {
    const y = pad.t + ph * (1 - (Math.log10(e) - logErrMin) / (logErrMax - logErrMin));
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(e + '%', pad.l - 4, y + 4);
  });
  for (let b = betaMin; b <= betaMax; b += 50) {
    const x = pad.l + pw * (b - betaMin) / (betaMax - betaMin);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    if (b % 100 === 0 || b === 10) ctx.fillText(b, x, pad.t + ph + 18);
  }

  ctx.fillStyle = fg; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('β (hFE)', pad.l + pw / 2, H - 6);
  ctx.save(); ctx.translate(14, pad.t + ph / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('Systematic Error (%)', 0, 0); ctx.restore();

  // Simple mirror curve
  const drawCurve = (color, label, errFn) => {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    let first = true;
    for (let b = betaMin; b <= betaMax; b++) {
      const e = Math.max(errMin, errFn(b));
      const x = pad.l + pw * (b - betaMin) / (betaMax - betaMin);
      const y = pad.t + ph * (1 - (Math.log10(e) - logErrMin) / (logErrMax - logErrMin));
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  };

  drawCurve('#e53935', 'Simple mirror (2/β)', b => 2/b * 100);
  drawCurve('#1565c0', 'Wilson mirror (2/β²)', b => 2/(b*b) * 100);

  // Labels
  ctx.fillStyle = '#e53935'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  const y_simple_label = pad.t + ph * (1 - (Math.log10(Math.max(errMin, 2/50*100)) - logErrMin) / (logErrMax - logErrMin));
  ctx.fillText('Simple: 2/β', pad.l + pw * 0.3, y_simple_label - 5);
  ctx.fillStyle = '#1565c0';
  const y_wilson_label = pad.t + ph * (1 - (Math.log10(Math.max(errMin, 2/(50*50)*100)) - logErrMin) / (logErrMax - logErrMin));
  ctx.fillText('Wilson: 2/β²', pad.l + pw * 0.3, y_wilson_label - 5);

  // 1% line
  const line1pct = pad.t + ph * (1 - (Math.log10(1) - logErrMin) / (logErrMax - logErrMin));
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = '#43a047'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(pad.l, line1pct); ctx.lineTo(pad.l + pw, line1pct); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#43a047'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('1% spec', pad.l + pw - 2, line1pct - 3);

  // Mark current beta
  const curX_s = pad.l + pw * (beta - betaMin) / (betaMax - betaMin);
  const curY_s = pad.t + ph * (1 - (Math.log10(Math.max(errMin, err_simple_pct)) - logErrMin) / (logErrMax - logErrMin));
  const curY_w = pad.t + ph * (1 - (Math.log10(Math.max(errMin, err_wilson_pct)) - logErrMin) / (logErrMax - logErrMin));
  ctx.beginPath(); ctx.arc(curX_s, curY_s, 6, 0, Math.PI*2); ctx.fillStyle = '#e53935'; ctx.fill();
  ctx.beginPath(); ctx.arc(curX_s, curY_w, 6, 0, Math.PI*2); ctx.fillStyle = '#1565c0'; ctx.fill();

  ctx.fillStyle = fg; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Current Mirror Error vs β', pad.l, pad.t - 10);

  document.getElementById('info').innerHTML =
    `<b>At β = ${beta}:</b><br>` +
    `Simple mirror error: ${err_simple_pct.toFixed(2)}%<br>` +
    `Wilson mirror error: ${err_wilson_pct.toFixed(4)}%<br>` +
    `Improvement: ${(err_simple_pct / err_wilson_pct).toFixed(0)}× (= β)<br>` +
    `<b>Wilson passes 1% spec for β > ${Math.ceil(Math.sqrt(2/0.01))}</b>`;
}

['beta','iref','vce'].forEach(id => document.getElementById(id).addEventListener('input', draw));
window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
