<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3-D-1.3.1 Ideal vs Practical Diode</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#0066cc;--accent2:#58a6ff;--text:#e6edf3;--subtext:#8b949e;--green:#3fb950;--red:#f85149;--orange:#d29922;}
  @media(prefers-color-scheme:light){:root{--bg:#fff;--surface:#f6f8fa;--border:#d0d7de;--accent:#0066cc;--accent2:#0969da;--text:#24292f;--subtext:#57606a;--green:#1a7f37;--red:#d1242f;--orange:#9a6700;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:20px;}
  h1{color:var(--accent2);font-size:1.3rem;margin-bottom:4px;}
  .sub{color:var(--subtext);font-size:0.85rem;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:700px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;}
  h2{font-size:0.95rem;color:var(--accent2);margin-bottom:10px;}
  canvas{display:block;width:100%;}
  .ctrl{display:flex;flex-direction:column;gap:10px;}
  label{font-size:0.82rem;color:var(--subtext);}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .ro-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:monospace;font-size:0.82rem;margin-top:10px;}
  .ro{display:flex;justify-content:space-between;margin-bottom:4px;}
  .ro b{color:var(--accent2);}
  .hl{color:var(--green);font-weight:bold;}
  button{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.8rem;margin-right:4px;}
  button.on{background:var(--green);}
</style>
</head>
<body>
<h1>M3-D-1.3.1 — Ideal vs Practical Diode</h1>
<p class="sub">Compare ideal, Si PN junction, and Schottky I-V curves</p>
<div class="grid">
  <div class="card"><h2>Simulation</h2><canvas id="c" height="260"></canvas></div>
  <div class="card"><h2>Controls</h2>
    <div class="ctrl"><div style="margin-bottom:8px"><button id="btn_ideal" onclick="setDT('ideal')">Ideal</button><button id="btn_practical" class="on" onclick="setDT('practical')">Si Practical</button><button id="btn_schottky" onclick="setDT('schottky')">Schottky</button></div>
<div><label>Temperature T (K): <b id="tL">300</b></label><input type="range" id="tS" min="250" max="420" value="300" step="5" oninput="document.getElementById('tL').textContent=this.value"></div>
<div><label>Series resistance r_s (Ohm): <b id="rsL">1</b></label><input type="range" id="rsS" min="0" max="50" value="1" step="0.5" oninput="document.getElementById('rsL').textContent=parseFloat(this.value).toFixed(1)"></div></div>
    <div class="ro-box"><div class="ro"><span>Type</span><b id="ro_type" class="hl">—</b></div>
<div class="ro"><span>V_D nominal</span><b id="ro_vd">—</b></div>
<div class="ro"><span>Temperature</span><b id="ro_t">—</b></div></div>
  </div>
</div>
<script>

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function resize(){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(W,H,pad,xl,yl){
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  ctx.strokeStyle=isDark()?'#333':'#ddd';ctx.lineWidth=1;ctx.strokeRect(pad.l,pad.t,pw,ph);
  for(let i=1;i<5;i++){
    ctx.beginPath();ctx.moveTo(pad.l+pw*i/5,pad.t);ctx.lineTo(pad.l+pw*i/5,pad.t+ph);
    ctx.strokeStyle=isDark()?'#222':'#eee';ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.l,pad.t+ph*i/5);ctx.lineTo(pad.l+pw,pad.t+ph*i/5);ctx.stroke();
  }
  ctx.fillStyle=isDark()?'#666':'#888';ctx.font='10px system-ui';
  ctx.textAlign='center';ctx.fillText(xl,pad.l+pw/2,H-3);
  ctx.save();ctx.translate(12,pad.t+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}


let dtype='practical';
function setDT(t){dtype=t;['ideal','practical','schottky'].forEach(x=>{const b=document.getElementById('btn_'+x);if(b)b.className=x===t?'on':'';});draw();}
function draw(){
  const T=gs('tS'),rs=gs('rsS');
  const VT=1.381e-23*T/1.602e-19;
  const W=cv.width/devicePixelRatio,H=260;
  ctx.clearRect(0,0,W,H);
  const pad={l:50,r:15,t:18,b:32};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const Vmax=1.0,Imax=0.1;
  drawAxes(W,H,pad,'Voltage (V)','Current (A)');
  function drawCurve(Is0,color,lbl,dashed){
    ctx.strokeStyle=color;ctx.lineWidth=dashed?1.5:2.5;
    if(dashed)ctx.setLineDash([5,3]);else ctx.setLineDash([]);
    ctx.beginPath();
    let first=true;
    for(let px=0;px<=pw;px++){
      const V=Vmax*px/pw;
      let I=0;
      if(dtype==='ideal'){I=V>0.7?Imax:0;}
      else {
        let Ij=1e-6;
        for(let it=0;it<30;it++){
          const Vj=V-Ij*rs;
          const In=Math.max(Is0*(Math.exp(Math.min(Vj/VT,40))-1),0);
          if(Math.abs(In-Ij)<1e-15)break;
          Ij=0.5*Ij+0.5*In;
        }
        I=Math.min(Ij,Imax);
      }
      const y=pad.t+ph*(1-I/Imax);
      if(first){ctx.moveTo(pad.l+px,y);first=false;}else ctx.lineTo(pad.l+px,y);
    }
    ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=color;ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText(lbl,pad.l+pw*0.5,dashed?pad.t+ph*0.45:pad.t+ph*0.3);
  }
  if(dtype==='ideal') drawCurve(1e-12,'#0066cc','Ideal (0V drop)',false);
  else if(dtype==='practical') drawCurve(1e-12,'#0066cc','Si ~0.7V',false);
  else {
    drawCurve(1e-8,'#3fb950','Schottky ~0.3V',false);
    drawCurve(1e-12,'#0066cc','Si ref',true);
  }
  ctx.fillStyle=isDark()?'#888':'#666';ctx.font='10px monospace';
  ctx.textAlign='center';ctx.fillText('0',pad.l,pad.t+ph+12);ctx.fillText('1V',pad.l+pw,pad.t+ph+12);
  ctx.textAlign='right';ctx.fillText('100mA',pad.l-3,pad.t+6);
  const vd=dtype==='schottky'?0.3:dtype==='ideal'?0.0:(0.7+(T-300)*(-0.002));
  document.getElementById('ro_vd').textContent=vd.toFixed(3)+' V';
  document.getElementById('ro_t').textContent=T+' K ('+(T-273)+'C)';
  document.getElementById('ro_type').textContent=dtype;
}

document.querySelectorAll('input[type=range]').forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
