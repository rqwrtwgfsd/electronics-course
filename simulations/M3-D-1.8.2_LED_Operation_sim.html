<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-D-1.8.2 — LED Operation</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#0066cc;--accent2:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
@media(prefers-color-scheme:light){:root{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#24292f;--text2:#656d76;--accent:#0066cc;--accent2:#0969da;--green:#2da44e;--red:#cf222e;--yellow:#9a6700}}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;padding:16px}
h2{color:var(--accent2);font-size:16px;margin-bottom:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
canvas{width:100%;border-radius:6px;background:var(--bg);display:block}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.ctrl{flex:1;min-width:180px}
label{display:block;color:var(--text2);font-size:12px;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--accent)}
.readout{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ro{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;font-family:monospace}
.ro span{color:var(--accent2);font-weight:bold}
.note{color:var(--text2);font-size:12px;margin-top:8px;line-height:1.5}
</style></head>
<body>
<h2>M3-D-1.8.2 — LED Operation</h2>
<div class="panel">
<canvas id="cv" height="260"></canvas>
<div class="controls">

  <div class="ctrl"><label>V_supply (V): <b id="lVs">5</b></label>
    <input type="range" id="Vs" min="1.8" max="24" step="0.1" value="5"></div>
  <div class="ctrl"><label>LED type</label>
    <select id="LED" style="width:100%;padding:4px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
      <option value="1.8,620,255,80,0">Red (1.8V, 620nm)</option>
      <option value="2.2,530,0,200,0">Green (2.2V, 530nm)</option>
      <option value="3.2,470,0,80,255">Blue (3.2V, 470nm)</option>
      <option value="3.2,450,255,255,255">White (3.2V)</option>
      <option value="0.35,950,200,100,50">IR Schottky (0.35V)</option>
    </select></div>
  <div class="ctrl"><label>R_series (Ω): <b id="lR">100</b></label>
    <input type="range" id="R" min="10" max="2000" step="10" value="100"></div>

</div>
<div class="readout">
  <div class="ro">V_F (V): <span id="r1">0</span></div>
  <div class="ro">I_F (mA): <span id="r2">0</span></div>
  <div class="ro">Optimal R (Ω): <span id="r3">0</span></div>
  <div class="ro">Rel. brightness (%): <span id="r4">0</span></div>
</div>
<p class="note">LED current vs forward voltage. Series resistor sizing for different supplies and LED colors.</p>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;cv.getContext('2d').scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillStyle=color;ctx.font='11px system-ui';
  ctx.fillText(yl,pad+4,pad+12);ctx.fillText(xl,W-pad-2,H-pad-4);
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function draw(){

  const vs=gs('Vs'),R=gs('R');
  const parts=document.getElementById('LED').value.split(',');
  const vf=parseFloat(parts[0]),lambda=parseFloat(parts[1]);
  const rc=parseInt(parts[2]),gc=parseInt(parts[3]),bc=parseInt(parts[4]);
  document.getElementById('lVs').textContent=vs.toFixed(1);
  document.getElementById('lR').textContent=R.toFixed(0);
  const vr=vs-vf,iF=Math.max(0,vr/R*1000);
  const brightness=Math.min(iF/20,1);
  const ropt=(vs-vf)/0.02;
  sv('r1',vf.toFixed(2));sv('r2',iF.toFixed(1));
  sv('r3',ropt.toFixed(0));sv('r4',(Math.min(brightness*100,100)).toFixed(0));

  const W=cv.offsetWidth,H=260,pad=40;
  const bg=isDark()?'#0d1117':'#fff',fg=isDark()?'#8b949e':'#656d76';
  ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawAxes(ctx,W,H,pad,'V_F (V) →','I_F (mA) ↑',fg);
  const vmax=Math.min(vs,vf+2),xsc=(W-2*pad)/vmax,ysc=(H-2*pad)/100;
  const Is=1e-12;
  ctx.strokeStyle='rgb('+rc+','+gc+','+bc+')';ctx.lineWidth=2;ctx.beginPath();
  for(let v=0;v<=vmax;v+=0.02){{
    const i=Is*(Math.exp(v/0.026)-1)*1000;
    const iL=Math.max(0,(v-vf+0.001)/R*1000);
    const iF=Math.min(i,100);
    const x=pad+v*xsc,y=H-pad-Math.min(iF,99)*ysc;
    if(v===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }}
  ctx.stroke();
  // Load line
  ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.beginPath();
  ctx.moveTo(pad+vs*xsc,H-pad);
  const iAtZeroV=(vs)/R*1000;
  ctx.lineTo(pad,H-pad-Math.min(iAtZeroV,100)*ysc);ctx.stroke();ctx.setLineDash([]);
  // Operating point
  const xop=pad+vf*xsc,yop=H-pad-iF*ysc;
  ctx.fillStyle='#f85149';ctx.beginPath();ctx.arc(xop,yop,5,0,Math.PI*2);ctx.fill();
  // LED glow
  const glR=Math.min(iF/20,1);
  ctx.fillStyle='rgba('+rc+','+gc+','+bc+','+glR.toFixed(2)+')';
  ctx.beginPath();ctx.arc(W-pad-25,pad+30,20*glR+5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fg;ctx.font='11px system-ui';ctx.fillText('LED '+lambda+'nm',W-pad-60,pad+70);
  ctx.fillText('I_F='+iF.toFixed(1)+'mA',xop+8,yop-5);
  ctx.fillText(vmax.toFixed(1)+'V',W-pad-20,H-pad+14);

}
document.querySelectorAll('input[type=range],select').forEach(e=>e.addEventListener('input',draw));
window.addEventListener('resize',()=>resize(cv,draw));
resize(cv,draw);
</script>
</body></html>
