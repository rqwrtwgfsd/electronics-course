<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-M-3.3.1 CMOS Inverter / Current Mirror</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-M-3.3.1 — CMOS Inverter Transfer Characteristic + Dynamic Power</h1>
<p class="note">Adjust V_DD and load capacitance to see switching threshold and power consumption.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>V_DD (V): <span id="vddv">3.3</span></label><input type="range" id="vdd" min="0.5" max="5" value="3.3" step="0.1" oninput="sv('vddv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>C_L (fF): <span id="clv">10</span></label><input type="range" id="cl" min="1" max="1000" value="10" step="1" oninput="sv('clv',this.value);draw();"></div>
  <div class="ctrl"><label>f (MHz): <span id="fv">100</span></label><input type="range" id="freq" min="1" max="5000" value="100" step="1" oninput="sv('fv',this.value);draw();"></div>
  <div class="ctrl"><label>V_T (V): <span id="vtv">0.5</span></label><input type="range" id="vt" min="0.1" max="1.5" value="0.5" step="0.05" oninput="sv('vtv',parseFloat(this.value).toFixed(2));draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_th: <span id="vth">0</span> V</div>
  <div class="ro">P_dynamic: <span id="pd">0</span> µW/gate</div>
  <div class="ro">P_1M gates: <span id="pm">0</span> W</div>
  <div class="ro">t_p: <span id="tp">0</span> ps</div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const VDD=gs('vdd');
  const CL=gs('cl')*1e-15; // F
  const FREQ=gs('freq')*1e6; // Hz
  const VT=gs('vt');

  const Vth=VDD/2; // approximate (matched CMOS)
  const alpha=0.5; // activity factor
  const Pd=CL*VDD*VDD*FREQ*alpha*1e6; // µW
  const Pm=1e6*Pd/1e6; // W for 1M gates
  // Delay: assume k_n = 200 µA/V² (unit size)
  const kn=200e-6;
  const Idsat=kn/2*Math.pow(VDD-VT,2);
  const tp=CL*VDD/(2*Idsat)*1e12; // ps

  sv('vth',Vth.toFixed(2));
  sv('pd',Pd.toFixed(2));
  sv('pm',(Pm).toFixed(1));
  sv('tp',tp.toFixed(1));

  // Draw CMOS inverter transfer characteristic
  const xsc=(W-2*pad)/VDD, ysc=(H-2*pad)/VDD;

  drawAxes(ctx,W,H,pad,'V_in (V)','V_out (V)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let v=0;v<=VDD;v+=VDD/5){
    ctx.fillText(v.toFixed(1),pad+v*xsc-8,H-pad+13*dpr);
    ctx.fillText(v.toFixed(1),pad-22*dpr,H-pad-v*ysc+4);
  }

  // Transfer curve (sigmoidal step)
  ctx.strokeStyle=acc; ctx.lineWidth=2.5*dpr; ctx.beginPath();
  for(let vin=0;vin<=VDD;vin+=VDD/200){
    let vout;
    if(vin<VT) vout=VDD; // PMOS on, NMOS off
    else if(vin>VDD-VT) vout=0; // PMOS off, NMOS on
    else{
      // Transition region: smooth
      const t=(vin-VT)/(VDD-2*VT);
      vout=VDD*(1-1/(1+Math.exp(-15*(t-0.5))));
    }
    const x=pad+vin*xsc; const y=H-pad-vout*ysc;
    if(vin===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Unity gain line (V_out = V_in — shows switching threshold intersection)
  ctx.strokeStyle='#ffa502'; ctx.lineWidth=1*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath(); ctx.moveTo(pad,H-pad); ctx.lineTo(pad+VDD*xsc,pad); ctx.stroke(); ctx.setLineDash([]);

  // Threshold marker
  const thx=pad+Vth*xsc, thy=H-pad-Vth*ysc;
  ctx.beginPath(); ctx.arc(thx,thy,5*dpr,0,2*Math.PI);
  ctx.fillStyle='#2ed573'; ctx.fill();

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`V_th=${Vth.toFixed(2)}V  P_dyn=${Pd.toFixed(2)}µW/gate  t_p=${tp.toFixed(0)}ps`,pad,pad-8*dpr);
}
draw();
</script></body></html>
