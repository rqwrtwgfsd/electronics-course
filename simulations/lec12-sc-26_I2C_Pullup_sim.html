<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenario 26 — I2C Pull-up Resistor</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666;}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto;}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px;}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
  h1{font-size:18px;margin:4px 0;}
  .layout{display:grid;grid-template-columns:1fr 280px;gap:16px;}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%;}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;}
  .ctrl-group{margin-bottom:12px;}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:flex;justify-content:space-between;}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace;}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
  .result-box{background:rgba(0,102,204,0.08);border:1px solid rgba(0,102,204,0.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.5;}
  @media(max-width:600px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 26</div>
  <h1>I2C Bus — Pull-up Resistor and Bus Capacitance</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Pull-up R (kΩ) <span class="ctrl-value" id="p1-val">4.7</span></div>
      <input type="range" id="p1" min="1" max="100" value="47">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Number of Devices <span class="ctrl-value" id="p2-val">1</span></div>
      <input type="range" id="p2" min="1" max="10" value="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">I2C Speed <span class="ctrl-value" id="p3-val">400kHz</span></div>
      <input type="range" id="p3" min="0" max="2" step="1" value="1">
    </div>
    <div class="result-box" id="result">Adjust parameters</div>
  </div>
</div>
<script>
const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
const speeds=[100e3,400e3,1e6];
const speedNames=['100kHz Standard','400kHz Fast','1MHz Fast+'];
function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;}
function draw(){
  const Rpullup=+document.getElementById('p1').value/10*1000; // Ω
  const nDev=+document.getElementById('p2').value;
  const speedIdx=+document.getElementById('p3').value;
  const f=speeds[speedIdx];
  document.getElementById('p1-val').textContent=(Rpullup/1000).toFixed(1)+' kΩ';
  document.getElementById('p2-val').textContent=nDev;
  document.getElementById('p3-val').textContent=speedNames[speedIdx];

  const C_per_dev=10e-12, C_trace=20e-12;
  const C_bus=C_per_dev*nDev+C_trace;
  const tau=Rpullup*C_bus*1e9; // ns
  const t_rise=2.2*tau; // ns (10%-90%)
  const bit_period=1/f*1e9; // ns
  const rise_ok=t_rise<bit_period*0.3; // must be < 30% of bit period

  canvas.width=canvas.parentElement.getBoundingClientRect().width||600;
  canvas.height=380;
  const W=canvas.width,H=canvas.height;
  const dark=isDark();
  const bg=dark?'#2a2a2a':'#f5f5f5';
  const fg=dark?'#e8e8e8':'#1a1a1a';
  const ac=dark?'#4499ff':'#0066cc';
  const gr=dark?'#444':'#ddd';
  const red='#e53935',grn='#43a047',orange='#ff9800';

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=fg;ctx.font='bold 13px system-ui';ctx.textAlign='center';
  ctx.fillText('I2C SCL Rising Edge — RC Pull-up Response',W/2,22);

  const mx=60,my=40,mw=W-80,mh=H-100;
  const VCC=3.3;
  const totalT=Math.max(bit_period*3, t_rise*5); // ns
  const toX=t=>mx+mw*t/totalT;
  const toY=v=>my+mh*(1-v/VCC);

  ctx.strokeStyle=gr;ctx.lineWidth=1;
  [0,1,2,3.3].forEach(v=>{
    const y=toY(v);
    ctx.beginPath();ctx.moveTo(mx,y);ctx.lineTo(mx+mw,y);ctx.stroke();
    ctx.fillStyle=fg;ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText(v.toFixed(1)+'V',mx-3,y+4);
  });

  // I2C HIGH min threshold (0.7×VCC)
  const Vih=VCC*0.7;
  ctx.strokeStyle=grn;ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(mx,toY(Vih));ctx.lineTo(mx+mw,toY(Vih));ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=grn;ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('V_IH='+Vih.toFixed(1)+'V',mx+4,toY(Vih)-3);

  // Rise curve
  ctx.strokeStyle=rise_ok?ac:red;ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<=400;i++){
    const t=i/400*totalT;
    const v=t<10?0:VCC*(1-Math.exp(-(t-10)/tau));
    i===0?ctx.moveTo(toX(t),toY(Math.max(0,Math.min(VCC,v)))):ctx.lineTo(toX(t),toY(Math.max(0,Math.min(VCC,v))));
  }
  ctx.stroke();

  // Bit period markers
  ctx.strokeStyle=orange;ctx.lineWidth=1;ctx.setLineDash([2,4]);
  [1,2].forEach(n=>{
    const xBit=toX(bit_period*n+10);
    if(xBit<mx+mw){
      ctx.beginPath();ctx.moveTo(xBit,my);ctx.lineTo(xBit,my+mh);ctx.stroke();
    }
  });
  ctx.setLineDash([]);

  ctx.strokeStyle=fg;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx,my+mh);ctx.lineTo(mx+mw,my+mh);ctx.stroke();

  ctx.fillStyle=fg;ctx.font='10px system-ui';ctx.textAlign='center';
  [0,totalT/4,totalT/2,3*totalT/4,totalT].forEach(t=>ctx.fillText(t.toFixed(0)+'ns',toX(t),my+mh+14));

  // t_rise annotation
  const t_90=tau*Math.log(10); // 90% point from 10% start
  const x90=toX(t_90+10);
  if(x90<mx+mw){
    ctx.strokeStyle=orange;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(toX(10),toY(VCC*0.1));ctx.lineTo(x90,toY(VCC*0.9));ctx.stroke();
    ctx.fillStyle=orange;ctx.font='9px system-ui';ctx.textAlign='center';
    ctx.fillText('t_rise='+t_rise.toFixed(0)+'ns',(toX(10)+x90)/2,toY(VCC*0.5)-8);
  }

  // Optimal R formula
  const R_opt=Math.round(bit_period*0.3/(2.2*C_bus)/1000);
  document.getElementById('result').innerHTML=
    `<b>R_pullup=${(Rpullup/1000).toFixed(1)}kΩ, C_bus=${(C_bus*1e12).toFixed(0)}pF</b><br>`+
    `τ = R×C = ${tau.toFixed(1)} ns<br>`+
    `Rise time = 2.2τ = ${t_rise.toFixed(1)} ns<br>`+
    `Bit period = ${bit_period.toFixed(1)} ns (${speedNames[speedIdx]})<br>`+
    (rise_ok?'<span style="color:green">✓ Rise time OK</span>':
     `<span style="color:red">⚠ Too slow! Use R ≤ ${R_opt}kΩ for this speed</span>`);
}
['p1','p2','p3'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>draw());
draw();
</script>
</body>
</html>
