<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lec 18 Pr 3 — MOSFET EMI Spectrum</title>
<style>
  :root { --bg:#fff; --surface:#f5f5f5; --border:#ccc; --text:#1a1a1a; --accent:#0066cc; --muted:#666; }
  @media (prefers-color-scheme:dark) { :root { --bg:#1a1a1a; --surface:#2a2a2a; --border:#444; --text:#e8e8e8; --accent:#4499ff; --muted:#999; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; max-width:900px; margin:0 auto; }
  h1 { font-size:18px; margin-bottom:12px; border-bottom:2px solid var(--accent); padding-bottom:8px; }
  .layout { display:grid; grid-template-columns:1fr 260px; gap:16px; }
  canvas { border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .controls { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px; }
  .ctrl-group { margin-bottom:12px; }
  label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; display:flex; justify-content:space-between; margin-bottom:4px; }
  .val { color:var(--accent); font-family:monospace; font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
  .info { background:rgba(0,102,204,0.08); border:1px solid rgba(0,102,204,0.2); border-radius:4px; padding:10px; margin-top:12px; font-size:12px; line-height:1.6; }
  @media (max-width:600px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>Pr 3 — MOSFET Switching EMI Spectral Envelope</h1>
<div class="layout">
  <canvas id="cv" height="380"></canvas>
  <div class="controls">
    <div class="ctrl-group">
      <label>Rise Time t_r (ns) <span class="val" id="v-tr">10</span></label>
      <input type="range" id="tr" min="2" max="200" value="10" step="2">
    </div>
    <div class="ctrl-group">
      <label>Switch Freq f_sw (kHz) <span class="val" id="v-fsw">100</span></label>
      <input type="range" id="fsw" min="10" max="500" value="100" step="10">
    </div>
    <div class="ctrl-group">
      <label>Loop Area (cm²) <span class="val" id="v-area">10</span></label>
      <input type="range" id="area" min="1" max="50" value="10" step="1">
    </div>
    <div class="info" id="info">Adjust to see EMI spectrum shape.</div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resizeCanvas() {
  cv.width = cv.parentElement.getBoundingClientRect().width || 600;
  cv.height = 380;
}

function draw() {
  resizeCanvas();
  const W = cv.width, H = cv.height;
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const bg = dark ? '#1a1a1a' : '#ffffff';
  const fg = dark ? '#e8e8e8' : '#1a1a1a';
  const gridC = dark ? '#333' : '#eee';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const tr = +document.getElementById('tr').value * 1e-9;
  const fsw = +document.getElementById('fsw').value * 1e3;
  const area_cm2 = +document.getElementById('area').value;

  document.getElementById('v-tr').textContent = (tr*1e9).toFixed(0) + ' ns';
  document.getElementById('v-fsw').textContent = (fsw/1e3).toFixed(0) + ' kHz';
  document.getElementById('v-area').textContent = area_cm2 + ' cm²';

  const f1 = 1 / (Math.PI * (1/fsw));  // = fsw/π
  const f2 = 1 / (Math.PI * tr);

  const pad = { l: 60, r: 20, t: 40, b: 50 };
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;

  // Log freq: 10kHz to 1GHz
  const fMin = 1e4, fMax = 1e9;
  const logMin = Math.log10(fMin), logMax = Math.log10(fMax);
  // dB axis: -100 to 0 (relative)
  const dbMin = -100, dbMax = 20;

  // Grid
  ctx.strokeStyle = gridC; ctx.lineWidth = 1;
  for (let db = dbMin; db <= dbMax; db += 20) {
    const y = pad.t + ph * (1 - (db - dbMin) / (dbMax - dbMin));
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(db + ' dB', pad.l - 4, y + 4);
  }
  [1e4,1e5,1e6,1e7,1e8,1e9].forEach(f => {
    const x = pad.l + pw * (Math.log10(f) - logMin) / (logMax - logMin);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    const lbl = f >= 1e9 ? '1G' : f >= 1e6 ? (f/1e6).toFixed(0)+'M' : f >= 1e3 ? (f/1e3).toFixed(0)+'k' : f;
    ctx.fillText(lbl, x, pad.t + ph + 18);
  });

  ctx.fillStyle = fg; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Frequency (Hz)', pad.l + pw / 2, H - 6);
  ctx.save(); ctx.translate(14, pad.t + ph / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('Relative EMI (dB)', 0, 0); ctx.restore();

  // Spectral envelope for trapezoidal wave
  // Below f1: flat (0 dB)
  // f1 to f2: -20 dB/decade
  // Above f2: -40 dB/decade
  ctx.beginPath();
  ctx.strokeStyle = '#e53935';
  ctx.lineWidth = 2.5;
  let first = true;
  for (let i = 0; i <= 400; i++) {
    const lf = logMin + (logMax - logMin) * i / 400;
    const f = Math.pow(10, lf);
    let db = 0;
    if (f > f1 && f <= f2) {
      db = -20 * Math.log10(f / f1);
    } else if (f > f2) {
      db = -20 * Math.log10(f2 / f1) - 40 * Math.log10(f / f2);
    }
    const x = pad.l + pw * (lf - logMin) / (logMax - logMin);
    const y = pad.t + ph * (1 - (db - dbMin) / (dbMax - dbMin));
    if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // FCC limit line (approximate: 43.5 dBuV/m at 3m for class B around 30-300MHz)
  // Shown as a relative reference
  const fccDB = -40; // relative
  const fccY = pad.t + ph * (1 - (fccDB - dbMin) / (dbMax - dbMin));
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = '#ff6f00'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.l, fccY); ctx.lineTo(pad.l + pw, fccY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ff6f00'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('FCC Class B ref limit', pad.l + 4, fccY - 4);

  // Mark f1 and f2
  [{ f: f1, lbl: 'f₁=fsw/π', c: '#43a047' }, { f: f2, lbl: 'f₂=1/πt_r', c: '#1565c0' }].forEach(p => {
    if (p.f > fMin && p.f < fMax) {
      const x = pad.l + pw * (Math.log10(p.f) - logMin) / (logMax - logMin);
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = p.c; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = p.c; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      const f_label = p.f >= 1e6 ? (p.f/1e6).toFixed(1)+'MHz' : (p.f/1e3).toFixed(1)+'kHz';
      ctx.fillText(p.lbl + '=' + f_label, x, pad.t + 16);
    }
  });

  // Title
  ctx.fillStyle = fg; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('Trapezoidal EMI Envelope — t_r=' + (tr*1e9).toFixed(0)+'ns, f_sw='+(fsw/1e3).toFixed(0)+'kHz', pad.l, pad.t - 10);

  const atf2_db = -20 * Math.log10(f2 / f1);
  document.getElementById('info').innerHTML =
    `<b>Spectral corners:</b><br>` +
    `f₁ (fsw/π) = ${(f1/1e3).toFixed(1)} kHz<br>` +
    `f₂ (1/πt_r) = ${(f2/1e6).toFixed(1)} MHz<br>` +
    `Content at f₂: ${atf2_db.toFixed(0)} dB below flat region<br>` +
    `Loop area: ${area_cm2} cm² → antenna coupling<br>` +
    `<b>Reduce loop area & t_r to lower EMI</b>`;
}

['tr','fsw','area'].forEach(id => document.getElementById(id).addEventListener('input', draw));
window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
