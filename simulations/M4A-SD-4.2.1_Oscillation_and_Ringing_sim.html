<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4A-SD-4.2.1 — Oscillation and Ringing</title>
<style>
:root {
  --bg: #f5f5f5; --panel: #ffffff; --border: #d0d0d0;
  --text: #1a1a1a; --text2: #555; --accent: #1a6fc4;
  --green: #2a9d2a; --orange: #e07b00; --red: #c42a2a;
  --grid: #e0e0e0; --ring: #c47a2a; --stable: #2a7fc4;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --panel: #252525; --border: #404040;
    --text: #e8e8e8; --text2: #aaa; --accent: #4a9fe8;
    --green: #4acd4a; --orange: #f0a030; --red: #e85050;
    --grid: #333; --ring: #e8a04a; --stable: #4a9fe8;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
h1 { font-size: 1.1rem; padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
h1 span { color: var(--text2); font-weight: normal; font-size: 0.85rem; }
.layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: calc(100vh - 44px); }
.controls { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
.plots { display: grid; grid-template-rows: 1fr 1fr; overflow: hidden; }
.plot-wrap { position: relative; background: var(--bg); border-bottom: 1px solid var(--border); }
.plot-wrap:last-child { border-bottom: none; }
canvas { display: block; width: 100%; height: 100%; }
.section { margin-bottom: 14px; }
.section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.ctrl { margin-bottom: 8px; }
.ctrl label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 3px; }
.ctrl label span { color: var(--accent); font-weight: 600; font-family: monospace; }
input[type=range] { width: 100%; accent-color: var(--accent); }
.preset-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.preset-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 3px 7px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.preset-btn:hover, .preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.verdict { border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 0.82rem; font-weight: 600; text-align: center; }
.verdict.stable    { background: #2a9d2a22; border: 1px solid var(--green); color: var(--green); }
.verdict.marginal  { background: #e07b0022; border: 1px solid var(--orange); color: var(--orange); }
.verdict.unstable  { background: #c42a2a22; border: 1px solid var(--red); color: var(--red); }
.readout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.readout { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 7px; }
.readout .label { font-size: 0.7rem; color: var(--text2); }
.readout .value { font-size: 0.85rem; font-weight: 700; font-family: monospace; }
.ok { color: var(--green); } .warn { color: var(--orange); } .bad { color: var(--red); }
.plot-label { position: absolute; top: 6px; left: 10px; font-size: 0.75rem; color: var(--text2); pointer-events: none; }
</style>
</head>
<body>
<h1>M4A-SD-4.2.1 — Oscillation and Ringing <span>| Step Response &amp; Bode Explorer</span></h1>
<div class="layout">
  <div class="controls">

    <div class="section">
      <div class="section-title">Scenario Presets</div>
      <div class="preset-row">
        <button class="preset-btn active" data-preset="stable">Stable (PM=60°)</button>
        <button class="preset-btn" data-preset="ringing">Ringing (PM=30°)</button>
        <button class="preset-btn" data-preset="marginal">Marginal (PM=15°)</button>
        <button class="preset-btn" data-preset="oscillate">Oscillating (PM≈0°)</button>
        <button class="preset-btn" data-preset="fixedload">Capacitive Load Fixed</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Amplifier Parameters</div>
      <div class="ctrl">
        <label>GBW Product <span id="val-gbw">10 MHz</span></label>
        <input type="range" id="sl-gbw" min="1" max="100" step="1" value="10">
      </div>
      <div class="ctrl">
        <label>Closed-Loop Gain <span id="val-gain">1×</span></label>
        <input type="range" id="sl-gain" min="1" max="20" step="1" value="1">
      </div>
      <div class="ctrl">
        <label>Output Impedance Rout <span id="val-rout">75 Ω</span></label>
        <input type="range" id="sl-rout" min="10" max="500" step="5" value="75">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Load &amp; Compensation</div>
      <div class="ctrl">
        <label>Capacitive Load CL <span id="val-cl">100 pF</span></label>
        <input type="range" id="sl-cl" min="1" max="10000" step="10" value="100">
      </div>
      <div class="ctrl">
        <label>Series Output Resistor Rs <span id="val-rs">0 Ω</span></label>
        <input type="range" id="sl-rs" min="0" max="500" step="5" value="0">
      </div>
      <div class="ctrl">
        <label>Extra Feedback Pole fp2 <span id="val-fp2">OFF</span></label>
        <input type="range" id="sl-fp2" min="0" max="100" step="1" value="0">
      </div>
    </div>

    <div id="verdict-box" class="verdict stable">STABLE</div>

    <div class="section">
      <div class="section-title">Analysis Results</div>
      <div class="readout-grid">
        <div class="readout"><div class="label">Phase Margin</div><div class="value" id="ro-pm">—</div></div>
        <div class="readout"><div class="label">Damping Ratio ζ</div><div class="value" id="ro-zeta">—</div></div>
        <div class="readout"><div class="label">Overshoot</div><div class="value" id="ro-os">—</div></div>
        <div class="readout"><div class="label">Load Pole fp_L</div><div class="value" id="ro-fpl">—</div></div>
        <div class="readout"><div class="label">Zero fz (Rs)</div><div class="value" id="ro-fz">—</div></div>
        <div class="readout"><div class="label">Ringing Freq</div><div class="value" id="ro-fring">—</div></div>
      </div>
    </div>

  </div>

  <div class="plots">
    <div class="plot-wrap">
      <div class="plot-label">Step Response</div>
      <canvas id="step-canvas"></canvas>
    </div>
    <div class="plot-wrap">
      <div class="plot-label">Bode Plot — Loop Gain Magnitude &amp; Phase</div>
      <canvas id="bode-canvas"></canvas>
    </div>
  </div>
</div>

<script>
function getParams() {
  const gbw  = +document.getElementById('sl-gbw').value  * 1e6;
  const gain = +document.getElementById('sl-gain').value;
  const rout = +document.getElementById('sl-rout').value;
  const cl   = +document.getElementById('sl-cl').value   * 1e-12;
  const rs   = +document.getElementById('sl-rs').value;
  const fp2v = +document.getElementById('sl-fp2').value;
  return { gbw, gain, rout, cl, rs, fp2: fp2v > 0 ? fp2v*1e6 : null };
}

// Loop gain transfer function for single-pole op-amp + load pole + optional zero (from Rs) + optional extra pole
// T(jω) ≈ (GBW/gain) × 1/(1+jω/w_opamp) × 1/(1+jω/w_load_eff) × (1+jω/w_zero) × 1/(1+jω/w_fp2)
// w_opamp = 2π × (GBW/gain) = gain crossover at GBW/gain for noise gain = gain+1
// Simplified: treat as two-pole loop gain
function evalLoop(f, p) {
  const w = 2*Math.PI*f;
  // Dominant op-amp pole: wp = GBW/gain × (1/DCgain) — simplified: model as single pole at fp_dom
  const fp_dom = p.gbw / (p.gain + 1); // noise gain crossover ≈ GBW/noise_gain
  const wp_dom = 2*Math.PI*fp_dom;

  // DC loop gain
  const K = p.gbw / (fp_dom); // ≈ gain

  let mag = K;
  let phase = 0;

  // Op-amp dominant pole
  mag   /= Math.sqrt(1 + (w/wp_dom)**2);
  phase -= Math.atan2(w, wp_dom);

  // Load pole: fp_load = 1/(2π×(rout+rs)×cl) or rout×cl if rs=0
  const r_load = p.rout + p.rs;
  const fp_load = 1/(2*Math.PI * r_load * p.cl);
  const wp_load = 2*Math.PI*fp_load;
  mag   /= Math.sqrt(1 + (w/wp_load)**2);
  phase -= Math.atan2(w, wp_load);

  // Zero from Rs: fz = 1/(2π×rs×cl)
  if (p.rs > 0) {
    const fz = 1/(2*Math.PI * p.rs * p.cl);
    const wz = 2*Math.PI*fz;
    mag   *= Math.sqrt(1 + (w/wz)**2);
    phase += Math.atan2(w, wz);
  }

  // Extra feedback pole
  if (p.fp2) {
    const wp2 = 2*Math.PI*p.fp2;
    mag   /= Math.sqrt(1 + (w/wp2)**2);
    phase -= Math.atan2(w, wp2);
  }

  return { mag, phase };
}

function findGainCrossover(p) {
  let lo = 1e2, hi = p.gbw * 10;
  // check if mag ever goes above 1
  if (evalLoop(lo, p).mag < 1) return { fc: lo, pm: 180 + (180/Math.PI)*evalLoop(lo, p).phase };
  for (let i = 0; i < 60; i++) {
    const mid = Math.sqrt(lo*hi);
    if (evalLoop(mid, p).mag > 1) lo = mid; else hi = mid;
  }
  const fc = Math.sqrt(lo*hi);
  const pm = 180 + (180/Math.PI)*evalLoop(fc, p).phase;
  return { fc, pm };
}

// 2nd-order step response (approximate using PM → ζ)
function stepResponse(pm, fn, tArr) {
  // ζ from PM approximation
  const zeta = Math.max(0.02, Math.min(5, pm / 100));
  const wn = 2*Math.PI*fn;
  if (zeta >= 1) {
    // overdamped
    const s1 = -zeta*wn + wn*Math.sqrt(zeta*zeta-1);
    const s2 = -zeta*wn - wn*Math.sqrt(zeta*zeta-1);
    return tArr.map(t => t < 0 ? 0 : 1 - (s2*Math.exp(s1*t) - s1*Math.exp(s2*t))/(s2-s1));
  }
  const wd = wn*Math.sqrt(1-zeta*zeta);
  return tArr.map(t => {
    if (t < 0) return 0;
    const env = Math.exp(-zeta*wn*t);
    return 1 - env*(Math.cos(wd*t) + (zeta/Math.sqrt(1-zeta*zeta))*Math.sin(wd*t));
  });
}

// Oscillating case: use undamped with slight gain-above-1 to show growing oscillation
function growingStep(fn, tArr) {
  const wn = 2*Math.PI*fn;
  const growthRate = 0.12; // show ~growing
  return tArr.map(t => {
    if (t < 0) return 0;
    const env = Math.exp(growthRate * wn * t / (2*Math.PI));
    return Math.min(3, Math.max(-3, 0.5*env*Math.sin(wn*t)));
  });
}

function getColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    text: s.getPropertyValue('--text').trim(), text2: s.getPropertyValue('--text2').trim(),
    grid: s.getPropertyValue('--grid').trim(), accent: s.getPropertyValue('--accent').trim(),
    green: s.getPropertyValue('--green').trim(), orange: s.getPropertyValue('--orange').trim(),
    red: s.getPropertyValue('--red').trim(), ring: s.getPropertyValue('--ring').trim(),
    bg: s.getPropertyValue('--bg').trim(), panel: s.getPropertyValue('--panel').trim(),
  };
}

function drawStep(canvas, pm, fn, C, isOscillating) {
  const W = canvas.offsetWidth * devicePixelRatio;
  const H = canvas.offsetHeight * devicePixelRatio;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const PAD = { l: 50*devicePixelRatio, r: 20*devicePixelRatio, t: 20*devicePixelRatio, b: 30*devicePixelRatio };
  const pW = W - PAD.l - PAD.r, pH = H - PAD.t - PAD.b;

  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

  // time range: 5 cycles of ring frequency
  const tMax = isOscillating ? 8/fn : Math.max(10/fn, 5e-7);
  const tArr = [];
  const N = 600;
  for (let i = 0; i <= N; i++) tArr.push(-tMax*0.05 + (tMax*1.05)*i/N);

  let yArr;
  if (isOscillating) {
    yArr = growingStep(fn, tArr);
  } else {
    yArr = stepResponse(pm, fn, tArr);
  }

  const yMin = -0.5, yMax = 1.8;
  function xScale(t) { return PAD.l + pW*(t - tArr[0])/(tArr[tArr.length-1] - tArr[0]); }
  function yScale(y) { return PAD.t + pH*(1-(y-yMin)/(yMax-yMin)); }

  // grid
  [0, 0.5, 1.0, 1.5].forEach(y => {
    ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(PAD.l, yScale(y)); ctx.lineTo(W-PAD.r, yScale(y)); ctx.stroke();
    ctx.fillStyle = C.text2; ctx.font = `${9*devicePixelRatio}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(y.toFixed(1), PAD.l-3, yScale(y)+3);
  });

  // zero line
  ctx.strokeStyle = C.text2; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.l, yScale(0)); ctx.lineTo(W-PAD.r, yScale(0)); ctx.stroke();
  // target line
  ctx.strokeStyle = C.green; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(PAD.l, yScale(1)); ctx.lineTo(W-PAD.r, yScale(1)); ctx.stroke();
  ctx.setLineDash([]);

  // ±2% band
  ctx.fillStyle = C.green + '22';
  const y1 = yScale(1.02), y2 = yScale(0.98);
  ctx.fillRect(PAD.l, Math.min(y1,y2), pW, Math.abs(y1-y2));

  // Overshoot annotation
  if (!isOscillating) {
    const maxY = Math.max(...yArr);
    const os = Math.max(0, (maxY-1)*100);
    const osIdx = yArr.indexOf(maxY);
    if (osIdx >= 0) {
      const xOs = xScale(tArr[osIdx]);
      ctx.strokeStyle = C.orange; ctx.lineWidth = 1.5*devicePixelRatio;
      ctx.beginPath(); ctx.moveTo(xOs, yScale(1)); ctx.lineTo(xOs, yScale(maxY)); ctx.stroke();
      ctx.fillStyle = C.orange; ctx.font = `bold ${9*devicePixelRatio}px sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(`OS=${os.toFixed(1)}%`, xOs+3, (yScale(1)+yScale(maxY))/2);
    }
  }

  // Response curve
  const color = isOscillating ? C.red : (pm >= 45 ? C.green : pm >= 25 ? C.orange : C.red);
  ctx.strokeStyle = color; ctx.lineWidth = 2*devicePixelRatio;
  ctx.beginPath();
  let first = true;
  yArr.forEach((y, i) => {
    const x = xScale(tArr[i]), yp = yScale(y);
    if (yp < 0 || yp > H) { first = true; return; }
    if (first) { ctx.moveTo(x, yp); first = false; } else ctx.lineTo(x, yp);
  });
  ctx.stroke();

  // Time axis labels
  ctx.fillStyle = C.text2; ctx.font = `${8*devicePixelRatio}px monospace`; ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    const t = tMax*i/5;
    const x = xScale(t);
    let label;
    if (tMax < 1e-6) label = (t*1e9).toFixed(0)+'ns';
    else if (tMax < 1e-3) label = (t*1e6).toFixed(1)+'µs';
    else label = (t*1e3).toFixed(2)+'ms';
    ctx.fillText(label, x, H-PAD.b+12*devicePixelRatio);
  }

  // PM label
  ctx.fillStyle = C.text; ctx.font = `bold ${10*devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'left';
  if (isOscillating) {
    ctx.fillStyle = C.red;
    ctx.fillText('OSCILLATING (PM ≤ 0°)', PAD.l+4, PAD.t+14*devicePixelRatio);
  } else {
    ctx.fillStyle = pm>=45?C.green:pm>=25?C.orange:C.red;
    ctx.fillText(`PM = ${pm.toFixed(1)}°  ζ ≈ ${Math.min(pm/100,1).toFixed(2)}`, PAD.l+4, PAD.t+14*devicePixelRatio);
  }
}

function drawBode(canvas, p, pm, C) {
  const W = canvas.offsetWidth * devicePixelRatio;
  const H = canvas.offsetHeight * devicePixelRatio;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const PAD = { l: 55*devicePixelRatio, r: 20*devicePixelRatio, t: 10*devicePixelRatio, b: 10*devicePixelRatio };
  const pW = W - PAD.l - PAD.r;
  const midY = H/2;
  const magH = midY - PAD.t, phaH = H - midY - PAD.b;

  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(PAD.l, midY); ctx.lineTo(W-PAD.r, midY); ctx.stroke();

  const magMax = 80, magMin = -80;
  function magY(db) { return PAD.t + magH*(1-(db-magMin)/(magMax-magMin)); }
  const fLo = 1e3, fHi = p.gbw * 20;
  function freqX(f) { return PAD.l + pW*(Math.log10(f)-Math.log10(fLo))/(Math.log10(fHi)-Math.log10(fLo)); }

  // grid mag
  [-60,-40,-20,0,20,40,60].forEach(db => {
    const y = magY(db);
    if (y >= PAD.t && y <= midY) {
      ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W-PAD.r, y); ctx.stroke();
      ctx.fillStyle = C.text2; ctx.font = `${9*devicePixelRatio}px monospace`; ctx.textAlign = 'right';
      ctx.fillText(db+'dB', PAD.l-4, y+3);
    }
  });

  // freq grid
  for (let d = Math.ceil(Math.log10(fLo)); d <= Math.floor(Math.log10(fHi)); d++) {
    const x = freqX(Math.pow(10, d));
    if (x < PAD.l || x > W-PAD.r) continue;
    ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, H-PAD.b); ctx.stroke();
    const f = Math.pow(10, d);
    const lbl = f >= 1e6 ? (f/1e6).toFixed(0)+'M' : f >= 1e3 ? (f/1e3).toFixed(0)+'k' : f+'';
    ctx.fillStyle = C.text2; ctx.font = `${8*devicePixelRatio}px monospace`; ctx.textAlign = 'center';
    ctx.fillText(lbl+'Hz', x, H-PAD.b+10*devicePixelRatio);
  }

  // 0 dB line
  ctx.strokeStyle = C.text2; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(PAD.l, magY(0)); ctx.lineTo(W-PAD.r, magY(0)); ctx.stroke();
  ctx.setLineDash([]);

  // Magnitude
  ctx.strokeStyle = C.accent; ctx.lineWidth = 2*devicePixelRatio;
  ctx.beginPath(); let first = true;
  for (let i = 0; i <= 600; i++) {
    const f = Math.pow(10, Math.log10(fLo) + (Math.log10(fHi)-Math.log10(fLo))*i/600);
    const {mag} = evalLoop(f, p);
    const db = 20*Math.log10(Math.max(mag, 1e-10));
    const x = freqX(f), y = magY(db);
    if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Phase plot
  const phMax = 0, phMin = -360;
  function phaseY(deg) { return midY + phaH*(1-(deg-phMin)/(phMax-phMin)); }

  [-360,-270,-180,-90,0].forEach(deg => {
    const y = phaseY(deg);
    if (y >= midY && y <= H-PAD.b) {
      ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W-PAD.r, y); ctx.stroke();
      ctx.fillStyle = C.text2; ctx.font = `${9*devicePixelRatio}px monospace`; ctx.textAlign = 'right';
      ctx.fillText(deg+'°', PAD.l-4, y+3);
    }
  });

  // -180 line
  const y180 = phaseY(-180);
  ctx.strokeStyle = C.red; ctx.lineWidth = 1.5; ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(PAD.l, y180); ctx.lineTo(W-PAD.r, y180); ctx.stroke();
  ctx.setLineDash([]);

  // Phase curve
  ctx.strokeStyle = C.ring; ctx.lineWidth = 2*devicePixelRatio;
  ctx.beginPath(); first = true;
  for (let i = 0; i <= 600; i++) {
    const f = Math.pow(10, Math.log10(fLo) + (Math.log10(fHi)-Math.log10(fLo))*i/600);
    const {phase} = evalLoop(f, p);
    const deg = phase * 180/Math.PI;
    const x = freqX(f), y = phaseY(deg);
    if (y < midY-2 || y > H-PAD.b+2) { first = true; continue; }
    if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Annotate crossover + PM
  const { fc } = findGainCrossover(p);
  if (fc >= fLo && fc <= fHi) {
    const xc = freqX(fc);
    const phDeg = evalLoop(fc, p).phase * 180/Math.PI;
    ctx.strokeStyle = C.orange; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(xc, PAD.t); ctx.lineTo(xc, H-PAD.b); ctx.stroke();
    ctx.setLineDash([]);
    // PM arrow
    const yPh = phaseY(phDeg);
    if (yPh >= midY && yPh <= H-PAD.b) {
      ctx.strokeStyle = C.orange; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(xc, Math.min(yPh, y180)); ctx.lineTo(xc, Math.max(yPh, y180)); ctx.stroke();
      ctx.fillStyle = C.orange; ctx.font = `bold ${9*devicePixelRatio}px sans-serif`; ctx.textAlign = 'left';
      ctx.fillText(`PM=${pm.toFixed(1)}°`, xc+3, (yPh+y180)/2+3);
    }
    ctx.fillStyle = C.orange;
    ctx.beginPath(); ctx.arc(xc, magY(0), 4*devicePixelRatio, 0, 2*Math.PI); ctx.fill();
  }
}

function updateLabels() {
  const gbw  = +document.getElementById('sl-gbw').value;
  const gain = +document.getElementById('sl-gain').value;
  const rout = +document.getElementById('sl-rout').value;
  const cl   = +document.getElementById('sl-cl').value;
  const rs   = +document.getElementById('sl-rs').value;
  const fp2v = +document.getElementById('sl-fp2').value;
  document.getElementById('val-gbw').textContent  = gbw+'MHz';
  document.getElementById('val-gain').textContent = gain+'×';
  document.getElementById('val-rout').textContent = rout+'Ω';
  document.getElementById('val-cl').textContent   = cl >= 1000 ? (cl/1000).toFixed(1)+'nF' : cl+'pF';
  document.getElementById('val-rs').textContent   = rs+'Ω';
  document.getElementById('val-fp2').textContent  = fp2v > 0 ? fp2v+'MHz' : 'OFF';
}

function redraw() {
  updateLabels();
  const p = getParams();
  const C = getColors();
  const { fc, pm } = findGainCrossover(p);
  const fp_load = 1/(2*Math.PI*(p.rout+p.rs)*p.cl);
  const fz = p.rs > 0 ? 1/(2*Math.PI*p.rs*p.cl) : null;
  const zeta = Math.max(0.01, pm/100);
  const fn = fc / (2*Math.PI); // approximate ringing at crossover
  const wd = fn * Math.sqrt(Math.max(0, 1-zeta*zeta));
  const os = pm > 0 ? Math.exp(-Math.PI*zeta/Math.sqrt(Math.max(0.001,1-zeta*zeta)))*100 : 100;

  function fmtF(f) {
    if (!f || !isFinite(f)) return '—';
    if (f >= 1e6) return (f/1e6).toFixed(2)+'MHz';
    if (f >= 1e3) return (f/1e3).toFixed(1)+'kHz';
    return f.toFixed(0)+'Hz';
  }

  document.getElementById('ro-pm').textContent = pm.toFixed(1)+'°';
  document.getElementById('ro-pm').className = 'value ' + (pm>=45?'ok':pm>=25?'warn':'bad');
  document.getElementById('ro-zeta').textContent = zeta.toFixed(3);
  document.getElementById('ro-os').textContent = pm <= 0 ? '∞ (osc)' : os.toFixed(1)+'%';
  document.getElementById('ro-fpl').textContent = fmtF(fp_load);
  document.getElementById('ro-fz').textContent = fz ? fmtF(fz) : 'NONE';
  document.getElementById('ro-fring').textContent = fmtF(wd);

  const vbox = document.getElementById('verdict-box');
  if (pm <= 0) {
    vbox.className = 'verdict unstable'; vbox.textContent = 'OSCILLATING — Loop gain ≥ 1 at -180°';
  } else if (pm < 30) {
    vbox.className = 'verdict marginal'; vbox.textContent = `RINGING — PM = ${pm.toFixed(1)}° (target ≥45°)`;
  } else {
    vbox.className = 'verdict stable'; vbox.textContent = `STABLE — PM = ${pm.toFixed(1)}°`;
  }

  const isOsc = pm <= 2;
  drawStep(document.getElementById('step-canvas'), pm, Math.max(fc/(2*Math.PI), 1000), C, isOsc);
  drawBode(document.getElementById('bode-canvas'), p, pm, C);
}

const PRESETS = {
  stable:    { gbw:10, gain:1, rout:75, cl:10,   rs:0,   fp2:0 },
  ringing:   { gbw:10, gain:1, rout:75, cl:500,  rs:0,   fp2:0 },
  marginal:  { gbw:10, gain:1, rout:75, cl:2000, rs:0,   fp2:0 },
  oscillate: { gbw:10, gain:1, rout:75, cl:5000, rs:0,   fp2:0 },
  fixedload: { gbw:10, gain:1, rout:75, cl:2000, rs:150, fp2:0 },
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const pr = PRESETS[btn.dataset.preset];
    document.getElementById('sl-gbw').value  = pr.gbw;
    document.getElementById('sl-gain').value = pr.gain;
    document.getElementById('sl-rout').value = pr.rout;
    document.getElementById('sl-cl').value   = pr.cl;
    document.getElementById('sl-rs').value   = pr.rs;
    document.getElementById('sl-fp2').value  = pr.fp2;
    redraw();
  });
});

['sl-gbw','sl-gain','sl-rout','sl-cl','sl-rs','sl-fp2'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    redraw();
  });
});

const ro = new ResizeObserver(redraw);
ro.observe(document.getElementById('step-canvas').parentElement);
ro.observe(document.getElementById('bode-canvas').parentElement);
redraw();
</script>
</body>
</html>
