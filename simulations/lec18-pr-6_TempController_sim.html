<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lec18 Pr6 — Temperature Controller</title>
<style>
  :root{--bg:#f8f8f8;--fg:#222;--accent:#4a90d9;}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--fg:#e0e0e0;--accent:#7ab4f5;}}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;padding:10px;}
  h3{margin:6px 0;color:var(--accent);}
  canvas{border:1px solid #555;border-radius:4px;display:block;width:100%;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;font-size:13px;}
  input[type=range]{width:130px;accent-color:var(--accent);}
  .vals{background:#0002;border-radius:4px;padding:8px;font-size:13px;margin:6px 0;}
  .vals span{color:var(--accent);font-weight:bold;}
</style>
</head>
<body>
<h3>Problem 6 — NTC + Schmitt Comparator Temperature Controller</h3>
<div class="controls">
  <label>Setpoint (°C): <input type="range" id="setpt" min="0" max="90" value="25" step="1"> <b id="setptV">25</b></label>
  <label>Hysteresis (°C): <input type="range" id="hyst" min="0.5" max="10" value="2" step="0.5"> <b id="hystV">2.0</b></label>
  <label>R_fixed (kΩ): <input type="range" id="Rfx" min="1" max="50" value="10" step="1"> <b id="RfxV">10</b></label>
  <label>V_supply (V): <input type="range" id="Vsup" min="5" max="15" value="12" step="0.5"> <b id="VsupV">12</b></label>
</div>
<canvas id="cv"></canvas>
<div class="vals" id="info"></div>
<script>
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function resizeCanvas(){const w=cv.parentElement.getBoundingClientRect().width||480;cv.width=Math.round(w);cv.height=Math.round(w*0.55);}
function ntcR(T,R25=10000,beta=3977){return R25*Math.exp(beta*(1/(T+273.15)-1/298.15));}
function draw(){
  resizeCanvas();
  const W=cv.width,H=cv.height;
  const setpt=+document.getElementById('setpt').value;
  const hyst=+document.getElementById('hyst').value;
  const Rfx=+document.getElementById('Rfx').value*1e3;
  const Vsup=+document.getElementById('Vsup').value;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  ctx.fillStyle=isDark?'#1a1a2e':'#f8f8f8';ctx.fillRect(0,0,W,H);
  const padL=65,padR=20,padT=35,padB=50;
  const gW=W-padL-padR,gH=H-padT-padB;
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+gH);ctx.lineTo(padL+gW,padT+gH);ctx.stroke();
  const Tmin=0,Tmax=100;
  function xp(t){return padL+(t-Tmin)/(Tmax-Tmin)*gW;}
  function yp(v){return padT+gH-(v/Vsup)*gH;}
  ctx.strokeStyle='#3334';ctx.lineWidth=0.5;
  for(let t=0;t<=100;t+=10){ctx.beginPath();ctx.moveTo(xp(t),padT);ctx.lineTo(xp(t),padT+gH);ctx.stroke();}
  for(let v=0;v<=Vsup;v+=Vsup/6){ctx.beginPath();ctx.moveTo(padL,yp(v));ctx.lineTo(padL+gW,yp(v));ctx.stroke();}
  const fg=isDark?'#aaa':'#555';ctx.fillStyle=fg;ctx.font='10px Arial';
  for(let t=0;t<=100;t+=10)ctx.fillText(t,xp(t)-8,padT+gH+13);
  for(let v=0;v<=Vsup;v+=Vsup/6)ctx.fillText(v.toFixed(1)+'V',padL-32,yp(v)+4);
  ctx.fillStyle=isDark?'#ccc':'#333';ctx.font='11px Arial';
  ctx.fillText('Temperature (°C)',padL+gW/2-45,H-5);
  ctx.save();ctx.translate(12,padT+gH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Voltage (V)',0,0);ctx.restore();
  // NTC divider curve V_sense vs T
  ctx.strokeStyle='#4a90d9';ctx.lineWidth=2.5;ctx.beginPath();let first=true;
  for(let T=Tmin;T<=Tmax;T+=0.5){
    const Rntc=ntcR(T);const Vs=Vsup*Rntc/(Rfx+Rntc);
    if(first){ctx.moveTo(xp(T),yp(Vs));first=false;}else ctx.lineTo(xp(T),yp(Vs));
  }ctx.stroke();
  // Setpoint and hysteresis band
  const Ton=setpt-hyst/2,Toff=setpt+hyst/2;
  const Vref_on=Vsup*ntcR(Ton)/(Rfx+ntcR(Ton));
  const Vref_off=Vsup*ntcR(Toff)/(Rfx+ntcR(Toff));
  const Vref_center=(Vref_on+Vref_off)/2;
  // Draw reference band
  ctx.fillStyle='rgba(255,152,0,0.15)';
  ctx.fillRect(xp(Ton),yp(Vref_on),xp(Toff)-xp(Ton),yp(Vref_off)-yp(Vref_on));
  ctx.strokeStyle='#ff9800';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(padL,yp(Vref_center));ctx.lineTo(padL+gW,yp(Vref_center));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ff9800';ctx.font='10px Arial';ctx.fillText('V_ref = '+Vref_center.toFixed(2)+'V',padL+4,yp(Vref_center)-4);
  // Hysteresis band on T axis
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(xp(Ton),padT+gH+22);ctx.lineTo(xp(Toff),padT+gH+22);ctx.stroke();
  ctx.fillStyle='#e53935';ctx.font='10px Arial';
  ctx.fillText('ON@'+Ton.toFixed(1)+'°C',xp(Ton),padT+gH+33);
  ctx.fillText('OFF@'+Toff.toFixed(1)+'°C',xp(Toff)-40,padT+gH+33);
  // Legend
  ctx.fillStyle='#4a90d9';ctx.font='11px Arial';ctx.fillText('V_sense (NTC divider)',xp(50),yp(Vsup*ntcR(50)/(Rfx+ntcR(50)))-8);
  ctx.fillStyle=isDark?'#e0e0e0':'#222';ctx.font='bold 11px Arial';ctx.fillText('NTC Divider + Schmitt Comparator Controller',padL+2,padT-8);
  document.getElementById('info').innerHTML=
    `R_NTC(25°C)=10kΩ | V_sense(${Ton.toFixed(1)}°C)=<span>${Vref_on.toFixed(3)}V</span> | V_sense(${Toff.toFixed(1)}°C)=<span>${Vref_off.toFixed(3)}V</span><br>`+
    `ΔV_hyst = <span>${(Math.abs(Vref_on-Vref_off)*1000).toFixed(0)}mV</span> | V_ref_center = <span>${Vref_center.toFixed(3)}V</span> | Heater: ON below ${Toff.toFixed(1)}°C`;
}
['setpt','hyst','Rfx','Vsup'].forEach(id=>{
  const el=document.getElementById(id);const vl=document.getElementById(id+'V');
  el.addEventListener('input',()=>{vl.textContent=id==='hyst'||id==='Vsup'?parseFloat(el.value).toFixed(1):el.value;draw();});
});
window.addEventListener('resize',draw);resizeCanvas();draw();
</script>
</body></html>
