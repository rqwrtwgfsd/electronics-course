<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-MS-5.3.2 — Phase Shift Accumulation</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:250px; min-width:230px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:15px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; color:var(--text2); line-height:1.5; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-MS-5.3.2</div>
  <h1>Multi-Stage — Phase Shift Accumulation</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="340"></canvas>
    <div class="readouts">
      <div class="readout"><label>Phase from fp1 at fc</label><span class="val" id="r-ph1">—</span></div>
      <div class="readout"><label>Phase from fp2 at fc</label><span class="val" id="r-ph2">—</span></div>
      <div class="readout"><label>Total Phase at fc</label><span class="val" id="r-phtot">—</span></div>
      <div class="readout"><label>Phase Margin</label><span class="val" id="r-pm">—</span></div>
    </div>
    <div class="insight" id="ins">Adjust the crossover frequency slider to see how phase accumulates.</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Pole Frequencies</div>
    <div class="ctrl">
      <label>fp1 (kHz) <span id="lbl-fp1">500</span></label>
      <input type="range" id="sl-fp1" min="10" max="5000" value="500" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp2 (MHz) <span id="lbl-fp2">15</span></label>
      <input type="range" id="sl-fp2" min="1" max="200" value="15" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp3 (MHz) [0=off] <span id="lbl-fp3">0</span></label>
      <input type="range" id="sl-fp3" min="0" max="500" value="0" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">RHP Zero</div>
    <div class="ctrl">
      <label>fz_RHP (MHz) [0=off] <span id="lbl-fz">0</span></label>
      <input type="range" id="sl-fz" min="0" max="500" value="0" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Crossover</div>
    <div class="ctrl">
      <label>fc (MHz) <span id="lbl-fc">5</span></label>
      <input type="range" id="sl-fc" min="0.1" max="100" step="0.1" value="5" oninput="update()">
    </div>
    <div class="readout" style="margin-top:10px">
      <label>Phase Budget Used</label>
      <span class="val" id="r-budget">—</span>
    </div>
  </div>
</div>
<script>
function update() {
  const fp1 = parseFloat(document.getElementById('sl-fp1').value)*1e3;
  const fp2 = parseFloat(document.getElementById('sl-fp2').value)*1e6;
  const fp3_mhz = parseFloat(document.getElementById('sl-fp3').value);
  const fp3 = fp3_mhz>0 ? fp3_mhz*1e6 : 0;
  const fz_mhz = parseFloat(document.getElementById('sl-fz').value);
  const fz = fz_mhz>0 ? fz_mhz*1e6 : 0;
  const fc = parseFloat(document.getElementById('sl-fc').value)*1e6;

  document.getElementById('lbl-fp1').textContent = Math.round(fp1/1e3);
  document.getElementById('lbl-fp2').textContent = (fp2/1e6).toFixed(0);
  document.getElementById('lbl-fp3').textContent = fp3_mhz;
  document.getElementById('lbl-fz').textContent  = fz_mhz;
  document.getElementById('lbl-fc').textContent  = (fc/1e6).toFixed(1);

  const ph1 = Math.atan(fc/fp1)*180/Math.PI;
  const ph2 = Math.atan(fc/fp2)*180/Math.PI;
  const ph3 = fp3>0 ? Math.atan(fc/fp3)*180/Math.PI : 0;
  const phz = fz>0 ? Math.atan(fc/fz)*180/Math.PI : 0; // RHP zero = additional lag
  const phTotal = -(ph1+ph2+ph3+phz);
  const pm = 180+phTotal;

  document.getElementById('r-ph1').textContent = '-'+ph1.toFixed(1)+'°';
  document.getElementById('r-ph2').textContent = '-'+ph2.toFixed(1)+'°';
  document.getElementById('r-phtot').textContent = phTotal.toFixed(1)+'°';
  const pmEl = document.getElementById('r-pm');
  pmEl.textContent = pm.toFixed(1)+'°';
  pmEl.style.color = pm>=60?'var(--green)':pm>=45?'#cc8800':'var(--warn)';

  const budgetPct = ((ph1+ph2+ph3+phz)/180*100).toFixed(0);
  document.getElementById('r-budget').textContent = budgetPct+'% of 180°';

  let ins = `At fc=${(fc/1e6).toFixed(1)}MHz: fp1 contributes ${ph1.toFixed(1)}°, fp2 contributes ${ph2.toFixed(1)}°`;
  if(fp3>0) ins += `, fp3 contributes ${ph3.toFixed(1)}°`;
  if(fz>0) ins += `, RHP zero adds ${phz.toFixed(1)}°`;
  ins += `. Total = ${(-phTotal).toFixed(1)}°. PM = ${pm.toFixed(1)}°.`;
  if(pm<45) ins += ' UNSTABLE — reduce fc or add compensation.';
  document.getElementById('ins').textContent = ins;

  draw(fp1,fp2,fp3,fz,fc,pm);
}

function phaseAt(f,fp1,fp2,fp3,fz) {
  let p = -Math.atan(f/fp1)-Math.atan(f/fp2);
  if(fp3>0) p -= Math.atan(f/fp3);
  if(fz>0)  p -= Math.atan(f/fz);
  return p*180/Math.PI;
}

function draw(fp1,fp2,fp3,fz,fc,pm) {
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500; canvas.width=W; canvas.height=340;
  const ctx=canvas.getContext('2d');
  const pad={l:52,r:15,t:20,b:35};
  const pw=W-pad.l-pad.r, ph=340-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)'; ctx.fillRect(0,0,W,340);

  const fMin=1e4, fMax=1e9;
  const lMin=Math.log10(fMin), lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(f)-lMin)/(lMax-lMin)*pw;
  const phMin=-270, phMax=0;
  const pToY=p=>pad.t+ph-(p-phMin)/(phMax-phMin)*ph;

  // Grid
  ctx.strokeStyle='var(--border)'; ctx.lineWidth=0.8;
  for(let p=-270;p<=0;p+=45) {
    const y=pToY(p);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
    ctx.fillStyle='var(--text)';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(p+'°',pad.l-3,y+3);
  }
  for(let lf=4;lf<=9;lf++) {
    const x=fToX(Math.pow(10,lf));
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+ph);ctx.stroke();
    const labels=['10k','100k','1M','10M','100M','1G'];
    ctx.fillStyle='var(--text)';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText(labels[lf-4],x,pad.t+ph+14);
  }

  // -45°, -90°, -135°, -180° references
  [[-45,'#888'],[-90,'#888'],[-135,'#888'],[-180,'#cc4400']].forEach(([p,c])=>{
    ctx.strokeStyle=c; ctx.lineWidth=p===-180?1.5:0.8; ctx.setLineDash(p===-180?[5,3]:[3,3]);
    const y=pToY(p);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();
    ctx.setLineDash([]);
    if(p===-180){ctx.fillStyle='#cc4400';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('-180°',pad.l+2,y-3);}
  });

  // Individual pole phase curves (dashed)
  const poles=[{f:fp1,c:'#4499dd'},{f:fp2,c:'#44bb88'}];
  if(fp3>0) poles.push({f:fp3,c:'#dd8844'});
  if(fz>0)  poles.push({f:fz,c:'#dd4488'});
  poles.forEach(p=>{
    ctx.strokeStyle=p.c; ctx.lineWidth=1.2; ctx.setLineDash([4,3]);
    ctx.beginPath(); let first=true;
    for(let i=0;i<=300;i++){
      const f=Math.pow(10,lMin+i/300*(lMax-lMin));
      let ph_val = -Math.atan(f/p.f)*180/Math.PI;
      const x=fToX(f); const y=pToY(Math.max(phMin,ph_val));
      first?ctx.moveTo(x,y):ctx.lineTo(x,y); first=false;
    }
    ctx.stroke(); ctx.setLineDash([]);
  });

  // Total phase (solid)
  ctx.strokeStyle='#0066cc'; ctx.lineWidth=2.5;
  ctx.beginPath(); let first=true;
  for(let i=0;i<=400;i++){
    const f=Math.pow(10,lMin+i/400*(lMax-lMin));
    const ph_val=phaseAt(f,fp1,fp2,fp3,fz);
    const x=fToX(f); const y=pToY(Math.max(phMin,ph_val));
    first?ctx.moveTo(x,y):ctx.lineTo(x,y); first=false;
  }
  ctx.stroke();

  // fc vertical line
  if(fc>=fMin && fc<=fMax){
    const xcf=fToX(fc);
    ctx.strokeStyle='#cc4400'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(xcf,pad.t);ctx.lineTo(xcf,pad.t+ph);ctx.stroke();
    ctx.setLineDash([]);
    const phAtFc=phaseAt(fc,fp1,fp2,fp3,fz);
    const ycf=pToY(Math.max(phMin,phAtFc));
    ctx.fillStyle='#cc4400'; ctx.beginPath();ctx.arc(xcf,ycf,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc4400'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
    ctx.fillText('fc PM='+pm.toFixed(0)+'°',xcf+6,ycf-5);
  }

  // Legend
  ctx.font='10px monospace'; ctx.textAlign='left';
  const legItems=[
    {c:'#4499dd',l:'fp1 alone'},
    {c:'#44bb88',l:'fp2 alone'},
    {c:'#0066cc',l:'Total phase'}
  ];
  if(fp3>0) legItems.splice(2,0,{c:'#dd8844',l:'fp3 alone'});
  if(fz>0)  legItems.splice(legItems.length-1,0,{c:'#dd4488',l:'RHP zero'});
  legItems.forEach((it,i)=>{
    ctx.fillStyle=it.c; ctx.fillRect(pad.l+4,pad.t+5+i*14,14,9);
    ctx.fillStyle='var(--text)'; ctx.fillText(it.l,pad.l+22,pad.t+13+i*14);
  });

  ctx.fillStyle='var(--text)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Phase Accumulation vs Frequency',pad.l+pw/2,pad.t+ph+28);
}
update();
</script>
</body>
</html>
