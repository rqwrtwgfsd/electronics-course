<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solenoid Peak-and-Hold Drive</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 16</div>
  <h1>Solenoid Drive: τ vs PWM Period &amp; Peak-and-Hold</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Coil L (mH) <span class="ctrl-value" id="lbl-l">500 mH</span></div>
      <input type="range" id="sl-l" min="10" max="1000" value="500" step="10">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Coil R (Ω) <span class="ctrl-value" id="lbl-r">50 Ω</span></div>
      <input type="range" id="sl-r" min="5" max="200" value="50" step="5">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">PWM Freq (Hz) <span class="ctrl-value" id="lbl-f">100 Hz</span></div>
      <input type="range" id="sl-f" min="1" max="500" value="100" step="1">
    </div>
    <div class="result-box" id="result">Adjust to see current buildup</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slL=document.getElementById('sl-l'),slR=document.getElementById('sl-r'),slF=document.getElementById('sl-f');
const lblL=document.getElementById('lbl-l'),lblR=document.getElementById('lbl-r'),lblF=document.getElementById('lbl-f');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const L=parseFloat(slL.value)*1e-3;
  const R=parseFloat(slR.value);
  const fpwm=parseFloat(slF.value);
  lblL.textContent=slL.value+' mH';
  lblR.textContent=R+' Ω';
  lblF.textContent=fpwm+' Hz';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  const V=12,tau=L/R,Imax=V/R;
  const tPWM=1/fpwm;
  const tON=tPWM*0.5; // 50% duty
  const tTotal=Math.min(5*tPWM,0.2); // show 5 PWM cycles or 200ms
  // Current buildup with PWM 50% duty
  const vMin=0,vMax=Imax*1.1;
  function yPx(i){return pad+plotH*(1-(i-vMin)/(vMax-vMin))}
  // Grid
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  [0,Imax*0.25,Imax*0.5,Imax*0.75,Imax].forEach(i=>{ctx.beginPath();ctx.moveTo(pad,yPx(i));ctx.lineTo(W-pad,yPx(i));ctx.stroke()});
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // DC (no PWM) current buildup for reference
  ctx.strokeStyle='rgba(100,200,100,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const i=Imax*(1-Math.exp(-t/tau));
    px===0?ctx.moveTo(pad+px,yPx(i)):ctx.lineTo(pad+px,yPx(i));
  }ctx.stroke();ctx.setLineDash([]);
  // PWM current (50% duty cycle)
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.beginPath();
  let iCur=0;
  const dt=tTotal/plotW;
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const tPhase=t%tPWM;
    const isON=tPhase<tON;
    if(isON)iCur+=((Imax-iCur)*dt/tau);
    else iCur+=((-iCur)*dt/tau);
    iCur=Math.max(0,Math.min(vMax,iCur));
    px===0?ctx.moveTo(pad+px,yPx(iCur)):ctx.lineTo(pad+px,yPx(iCur));
  }ctx.stroke();
  // Imax line
  ctx.setLineDash([4,3]);ctx.strokeStyle='#2e7d32';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,yPx(Imax));ctx.lineTo(W-pad,yPx(Imax));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#2e7d32';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('I_max = '+Imax.toFixed(0)+'mA',pad+4,yPx(Imax)-4);
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  [0,Imax*0.25,Imax*0.5,Imax*0.75,Imax].forEach(i=>ctx.fillText((i*1000).toFixed(0)+'mA',pad-4,yPx(i)+3));
  ctx.textAlign='center';ctx.fillStyle='#888';
  [0,tTotal*0.25,tTotal*0.5,tTotal*0.75,tTotal].forEach(t=>ctx.fillText((t*1000).toFixed(0)+'ms',pad+(t/tTotal)*plotW,H-pad+14));
  ctx.textAlign='left';ctx.font='11px system-ui';
  ctx.fillStyle='rgba(100,200,100,0.8)';ctx.fillText('DC continuous (reference)',pad+8,pad+16);
  ctx.fillStyle='#e53935';ctx.fillText('50% PWM @ '+fpwm+'Hz',pad+8,pad+30);
  const ratio=tON/tau;
  const Iavg=Imax*(1-Math.exp(-ratio))/(1+Math.exp(-ratio)*0.5);
  result.innerHTML='<b>τ = L/R = '+(tau*1000).toFixed(0)+'ms</b><br>PWM ON time: '+(tON*1000).toFixed(1)+'ms<br>ON time / τ = <b>'+ratio.toFixed(2)+'</b><br>'+( ratio<1?'⚠️ ON time < τ — current never reaches max!':'✅ ON time ≥ τ — good current buildup')+'<br><b>Rule: ON time must be ≥ 5τ for full current</b><br>Optimal PWM freq: f < '+(1/(5*tau)).toFixed(0)+'Hz';
}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slL,slR,slF].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
