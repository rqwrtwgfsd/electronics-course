<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-FC-6.7.1 — Debug Stability</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:270px; min-width:240px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  select { width:100%; padding:5px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:4px; }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; color:var(--text2); line-height:1.5; }
  .fault-label { font-size:11px; padding:3px 8px; border-radius:3px; display:inline-block; margin-top:4px; }
  .fault-none { background:#e8f5e9; color:#1b5e20; }
  .fault-bad  { background:#ffebee; color:#b71c1c; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-FC-6.7.1</div>
  <h1>Frequency Compensation — Debug: Stability Problems</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="330"></canvas>
    <div class="readouts">
      <div class="readout"><label>GBW</label><span class="val" id="r-gbw">—</span></div>
      <div class="readout"><label>fp2 (non-dom)</label><span class="val" id="r-fp2">—</span></div>
      <div class="readout"><label>Phase Margin</label><span class="val" id="r-pm">—</span></div>
      <div class="readout"><label>RHP Zero</label><span class="val" id="r-fz">—</span></div>
      <div class="readout"><label>fc (crossover)</label><span class="val" id="r-fc">—</span></div>
      <div class="readout"><label>Gain Margin</label><span class="val" id="r-gm">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Inject Fault</div>
    <div class="ctrl">
      <select id="sel-fault" onchange="update()">
        <option value="none">No fault — nominal design</option>
        <option value="rhp">RHP zero (no nulling Rs)</option>
        <option value="load">Excess load capacitance (580 pF)</option>
        <option value="ff">FF corner (gm1 +20%)</option>
        <option value="temp">High temp (gm2 −25%)</option>
        <option value="parasitic">PCB parasitic pole at fp3</option>
      </select>
      <div id="fault-status" class="fault-label fault-none" style="margin-top:6px">No fault</div>
    </div>
    <div class="section-title" style="margin-top:4px">Base Amplifier</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.5</span></label>
      <input type="range" id="sl-gm1" min="0.3" max="5" step="0.1" value="1.5" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm2 (mA/V) <span id="lbl-gm2">6.0</span></label>
      <input type="range" id="sl-gm2" min="1" max="20" step="0.5" value="6.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>Cc (pF) <span id="lbl-cc">4.0</span></label>
      <input type="range" id="sl-cc" min="0.5" max="20" step="0.5" value="4.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp2 nominal (MHz) <span id="lbl-fp2n">80</span></label>
      <input type="range" id="sl-fp2n" min="5" max="500" step="5" value="80" oninput="update()">
    </div>
    <div class="ctrl">
      <label>CL nominal (pF) <span id="lbl-cl">10</span></label>
      <input type="range" id="sl-cl" min="1" max="100" step="1" value="10" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:4px">Fix Options</div>
    <div class="ctrl">
      <label style="align-items:center">Enable nulling Rs
        <input type="checkbox" id="chk-rs" onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
    <div class="ctrl">
      <label style="align-items:center">Add output isolation R (50Ω)
        <input type="checkbox" id="chk-riso" onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
    <div class="ctrl">
      <label>Increase Cc factor <span id="lbl-ccx">1.0×</span></label>
      <input type="range" id="sl-ccx" min="0.5" max="5" step="0.1" value="1.0" oninput="update()">
    </div>
  </div>
</div>
<script>
function fmt(f){return f>=1e9?(f/1e9).toFixed(2)+'GHz':f>=1e6?(f/1e6).toFixed(2)+'MHz':f>=1e3?(f/1e3).toFixed(1)+'kHz':f.toFixed(0)+'Hz';}
function magFull(f,a0,fp1,fp2,fp3,fz_rhp,useRs){
  let m=a0/Math.sqrt(1+(f/fp1)**2)/Math.sqrt(1+(f/fp2)**2);
  if(fp3<1e18) m/=Math.sqrt(1+(f/fp3)**2);
  if(!useRs&&fz_rhp<1e18) m*=Math.sqrt(1+(f/fz_rhp)**2);
  return m;
}
function phaseFull(f,fp1,fp2,fp3,fz_rhp,useRs){
  let p=-(Math.atan(f/fp1)+Math.atan(f/fp2));
  if(fp3<1e18) p-=Math.atan(f/fp3);
  if(!useRs&&fz_rhp<1e18) p-=Math.atan(f/fz_rhp);
  return p*180/Math.PI;
}
function findCrossF(a0,fp1,fp2,fp3,fz,useRs){
  let lo=1e3,hi=1e13;
  for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);magFull(m,a0,fp1,fp2,fp3,fz,useRs)>1?lo=m:hi=m;}
  return Math.sqrt(lo*hi);
}
function find180(fp1,fp2,fp3,fz,useRs){
  let lo=1e3,hi=1e13;
  // find freq where phase = -180
  for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);const p=phaseFull(m,fp1,fp2,fp3,fz,useRs);p>-180?lo=m:hi=m;}
  return Math.sqrt(lo*hi);
}

function update(){
  const fault=document.getElementById('sel-fault').value;
  let gm1=parseFloat(document.getElementById('sl-gm1').value)/1000;
  let gm2=parseFloat(document.getElementById('sl-gm2').value)/1000;
  const cc_base=parseFloat(document.getElementById('sl-cc').value)*1e-12;
  const fp2_nom=parseFloat(document.getElementById('sl-fp2n').value)*1e6;
  const cl_nom=parseFloat(document.getElementById('sl-cl').value)*1e-12;
  const useRs=document.getElementById('chk-rs').checked;
  const useRiso=document.getElementById('chk-riso').checked;
  const ccx=parseFloat(document.getElementById('sl-ccx').value);
  const cc=cc_base*ccx;

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-gm2').textContent=(gm2*1000).toFixed(1);
  document.getElementById('lbl-cc').textContent=(cc_base*1e12).toFixed(1);
  document.getElementById('lbl-fp2n').textContent=(fp2_nom/1e6).toFixed(0);
  document.getElementById('lbl-cl').textContent=(cl_nom*1e12).toFixed(0);
  document.getElementById('lbl-ccx').textContent=ccx.toFixed(1)+'×';

  // Apply fault
  let fp3=1e30, fz_rhp=1e30, cl=cl_nom;
  let faultDesc='No fault — nominal design.';
  let faultBad=false;

  if(fault==='rhp'){gm2=gm2;faultDesc='RHP zero injected (no nulling Rs). Zero at gm2/(2πCc).';faultBad=true;fz_rhp=gm2/(2*Math.PI*cc);}
  if(fault==='load'){cl=580e-12;faultDesc='Excess load: 580 pF (real PCB decoupling). Output pole drops dramatically.';faultBad=true;}
  if(fault==='ff'){gm1*=1.2;faultDesc='FF corner: gm1 +20% → GBW +20%, fp2 unchanged → PM reduced.';faultBad=true;}
  if(fault==='temp'){gm2*=0.75;faultDesc='High temp: gm2 −25% → fp2 drops, RHP zero moves lower if no Rs.';faultBad=true;fz_rhp=useRs?1e30:gm2/(2*Math.PI*cc);}
  if(fault==='parasitic'){fp3=50e6;faultDesc='PCB parasitic pole at 50 MHz. Phase accumulates fast near GBW.';faultBad=true;}
  if(fault==='none'&&!useRs){fz_rhp=gm2/(2*Math.PI*cc);}

  const faultEl=document.getElementById('fault-status');
  faultEl.textContent=fault==='none'?'No fault — nominal':faultDesc.split('.')[0];
  faultEl.className='fault-label '+(faultBad?'fault-bad':'fault-none');

  const a0=10000;
  const GBW=gm1/(2*Math.PI*cc);
  const fp1=GBW/a0;

  // fp2: if load is large and isolation R present, modify
  let fp2=fp2_nom;
  if(fault==='load'){
    if(useRiso){
      // Isolation R=50Ω splits the load pole: pole1 from Riso+load, pole2 from amp Rout+Riso
      const Riso=50;
      fp2=Math.min(fp2_nom,1/(2*Math.PI*Riso*cl)); // dominant load-side pole
      fp3=Math.max(fp2_nom,1e9); // amp output pole stays high
    } else {
      // Load pole drops
      const gm3_approx=10e-3;
      fp2=gm3_approx/(2*Math.PI*cl);
    }
  }

  const fc=findCrossF(a0,fp1,fp2,fp3,fz_rhp,useRs||(fault!=='rhp'&&fault!=='temp'&&fault!=='none'));
  const useRs_eff=useRs||(fault!=='rhp'&&fault!=='temp'&&fault!=='none'&&fz_rhp>1e20);
  const fc2=findCrossF(a0,fp1,fp2,fp3,fz_rhp,useRs);
  const pm=180+phaseFull(fc2,fp1,fp2,fp3,fz_rhp,useRs);

  // Gain margin
  const f180=find180(fp1,fp2,fp3,fz_rhp,useRs);
  const gm_db=-20*Math.log10(Math.max(magFull(f180,a0,fp1,fp2,fp3,fz_rhp,useRs),1e-9));

  const colorPM=pm=>pm>=60?'var(--green)':pm>=45?'#cc8800':'var(--warn)';
  document.getElementById('r-gbw').textContent=fmt(GBW);
  document.getElementById('r-fp2').textContent=fmt(fp2);
  const pmEl=document.getElementById('r-pm');pmEl.textContent=pm.toFixed(1)+'°';pmEl.style.color=colorPM(pm);
  document.getElementById('r-fz').textContent=fz_rhp<1e18?fmt(fz_rhp):'∞ (none)';
  document.getElementById('r-fc').textContent=fmt(fc2);
  const gmEl=document.getElementById('r-gm');gmEl.textContent=gm_db.toFixed(1)+'dB';gmEl.style.color=gm_db>=6?'var(--green)':gm_db>=3?'#cc8800':'var(--warn)';

  let ins=`GBW=${fmt(GBW)}, fc=${fmt(fc2)}, PM=${pm.toFixed(1)}°, GM=${gm_db.toFixed(1)}dB. `;
  if(fault!=='none') ins+=faultDesc+' ';
  if(pm<45) ins+='UNSTABLE — apply fix. ';
  if(useRs&&fz_rhp<1e18) ins+='Nulling Rs converts RHP→no zero. ';
  if(useRiso&&fault==='load') ins+='Isolation R splits load pole. ';
  if(ccx>1) ins+=`Cc increased ${ccx.toFixed(1)}× → GBW reduced to ${fmt(GBW)}.`;
  document.getElementById('ins').textContent=ins;

  draw(a0,fp1,fp2,fp3,fz_rhp,fc2,pm,GBW,useRs,f180,gm_db);
}

function draw(a0,fp1,fp2,fp3,fz_rhp,fc,pm,GBW,useRs,f180,gm_db){
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500;canvas.width=W;canvas.height=330;
  const ctx=canvas.getContext('2d');
  const pad={l:52,r:15,t:20,b:35};
  const pw=W-pad.l-pad.r,ph=330-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)';ctx.fillRect(0,0,W,330);

  const magH=ph*0.47,phH=ph*0.47;
  const magTop=pad.t,phTop=pad.t+magH+5;
  const fMin=1e4,fMax=1e11;
  const lMin=Math.log10(fMin),lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(Math.max(f,fMin))-lMin)/(lMax-lMin)*pw;
  const mToY=(m,top,h)=>top+h-((m+20)/120)*h;
  const pToY=(p,top,h)=>top+h-((p+270)/270)*h;

  ctx.strokeStyle='var(--border)';ctx.lineWidth=0.7;
  [-20,0,20,40,60,80].forEach(m=>{const y=mToY(m,magTop,magH);if(y<magTop-2||y>magTop+magH+2)return;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(m+'dB',pad.l-3,y+3);});
  [-270,-180,-90,0].forEach(p=>{const y=pToY(p,phTop,phH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p+'°',pad.l-3,y+3);});

  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  const y0=mToY(0,magTop,magH);ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+pw,y0);ctx.stroke();
  const y180=pToY(-180,phTop,phH);ctx.strokeStyle='rgba(204,68,0,0.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.l,y180);ctx.lineTo(pad.l+pw,y180);ctx.stroke();ctx.setLineDash([]);

  const col_mag=pm>=60?'#0066cc':pm>=45?'#cc8800':'#cc4400';
  ctx.strokeStyle=col_mag;ctx.lineWidth=2;ctx.beginPath();let first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const m=20*Math.log10(Math.max(magFull(f,a0,fp1,fp2,fp3,fz_rhp,useRs),1e-9));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-10||y>magTop+magH+10){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}ctx.stroke();

  ctx.strokeStyle='#00994d';ctx.lineWidth=2;ctx.beginPath();first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const p=phaseFull(f,fp1,fp2,fp3,fz_rhp,useRs);const x=fToX(f);const y=pToY(Math.max(-270,p),phTop,phH);first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}ctx.stroke();

  // fc marker
  if(fc>=fMin&&fc<=fMax){
    const x=fToX(fc);ctx.strokeStyle='#cc440088';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,magTop);ctx.lineTo(x,phTop+phH);ctx.stroke();ctx.setLineDash([]);
    const ycf=pToY(phaseFull(fc,fp1,fp2,fp3,fz_rhp,useRs),phTop,phH);
    ctx.fillStyle=pm>=60?'#00994d':pm>=45?'#cc8800':'#cc4400';
    ctx.beginPath();ctx.arc(x,ycf,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='var(--text)';ctx.font='bold 9px monospace';ctx.textAlign='left';
    ctx.fillText('PM='+pm.toFixed(0)+'°',x+5,ycf-3);
  }

  // f180 (gain margin marker)
  if(f180>=fMin&&f180<=fMax&&gm_db>0){
    const x=fToX(f180);const gm_lin=magFull(f180,a0,fp1,fp2,fp3,fz_rhp,useRs);
    const ygm=mToY(20*Math.log10(gm_lin),magTop,magH);
    ctx.strokeStyle='#aa00aa88';ctx.lineWidth=1;ctx.setLineDash([2,2]);
    ctx.beginPath();ctx.moveTo(x,y180);ctx.lineTo(x,ygm);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#aa00aa';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('GM='+gm_db.toFixed(0)+'dB',x,ygm-4);
  }

  // Pole/zero markers on mag top
  [[fp1,'fp1','#0066cc'],[fp2,'fp2','#0044aa'],[fp3<1e18?fp3:null,'fp3','#6600cc'],[fz_rhp<1e18?fz_rhp:null,'fz','#cc4400']].forEach(([f,label,col])=>{
    if(!f||f<fMin||f>fMax)return;
    const x=fToX(f);ctx.fillStyle=col;ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(label,x,magTop+8);
    ctx.strokeStyle=col+'44';ctx.lineWidth=1;ctx.setLineDash([1,2]);ctx.beginPath();ctx.moveTo(x,magTop+10);ctx.lineTo(x,magTop+magH);ctx.stroke();ctx.setLineDash([]);
  });

  ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='center';
  ['100k','1M','10M','100M','1G','10G'].forEach((l,i)=>ctx.fillText(l,fToX(Math.pow(10,5+i)),phTop+phH+14));
}
update();
</script>
</body>
</html>
