<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-MS-5.4.1 — Multi-Stage Debug: Oscillation</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:260px; min-width:240px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:15px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:10px 12px; margin-top:10px; font-size:12px; line-height:1.6; }
  .fix-btn { width:100%; padding:8px; background:var(--green); color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:700; font-size:13px; margin-top:8px; }
  .fix-btn:hover { opacity:0.85; }
  .fault-active { background:var(--warn); color:#fff; border:none; border-radius:4px; padding:3px 8px; font-size:11px; margin-left:6px; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-MS-5.4.1</div>
  <h1>Multi-Stage Debug — Oscillation</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="300"></canvas>
    <div class="readouts">
      <div class="readout"><label>Unity-Gain fc</label><span class="val" id="r-fc">—</span></div>
      <div class="readout"><label>Phase Margin</label><span class="val" id="r-pm">—</span></div>
      <div class="readout"><label>Osc. Frequency (est.)</label><span class="val" id="r-fosc">—</span></div>
      <div class="readout"><label>Status</label><span class="val" id="r-status">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Op-Amp Parameters</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.5</span></label>
      <input type="range" id="sl-gm1" min="0.5" max="10" step="0.1" value="1.5" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm2 (mA/V) <span id="lbl-gm2">5.0</span></label>
      <input type="range" id="sl-gm2" min="1" max="20" step="0.5" value="5.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp2 (MHz) <span id="lbl-fp2">40</span></label>
      <input type="range" id="sl-fp2" min="5" max="500" value="40" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Compensation</div>
    <div class="ctrl">
      <label>Cc (pF) <span id="lbl-cc">2</span></label>
      <input type="range" id="sl-cc" min="0.2" max="20" step="0.1" value="2" oninput="update()">
    </div>
    <div class="ctrl">
      <label style="align-items:center">
        Nulling Rs <span id="lbl-rs">OFF</span>
        <input type="checkbox" id="chk-rs" onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
    <div class="section-title" style="margin-top:8px">Fault Injector</div>
    <div class="ctrl">
      <label>Load Cap CL (pF) [0=none] <span id="lbl-cl">0</span></label>
      <input type="range" id="sl-cl" min="0" max="100" step="1" value="0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>Output Rout (kΩ) <span id="lbl-rout">5</span></label>
      <input type="range" id="sl-rout" min="0.1" max="20" step="0.1" value="5" oninput="update()">
    </div>
    <button class="fix-btn" onclick="applyFix()">Apply Recommended Fix</button>
  </div>
</div>
<script>
function phaseAt(f,fp1_hz,fp2,fp3_hz,fz_rhp) {
  let p = -Math.atan(f/fp1_hz)-Math.atan(f/fp2);
  if(fp3_hz>0) p -= Math.atan(f/fp3_hz);
  if(fz_rhp>0) p -= Math.atan(f/fz_rhp);
  return p*180/Math.PI;
}
function magAt(f,a0_lin,fp1_hz,fp2,fp3_hz) {
  let m=a0_lin/Math.sqrt(1+(f/fp1_hz)**2)/Math.sqrt(1+(f/fp2)**2);
  if(fp3_hz>0) m/=Math.sqrt(1+(f/fp3_hz)**2);
  return m;
}
function findCross(a0_lin,fp1_hz,fp2,fp3_hz) {
  let lo=1,hi=1e12;
  for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);magAt(m,a0_lin,fp1_hz,fp2,fp3_hz)>1?lo=m:hi=m;}
  return Math.sqrt(lo*hi);
}

function update() {
  const gm1 = parseFloat(document.getElementById('sl-gm1').value)/1000;
  const gm2 = parseFloat(document.getElementById('sl-gm2').value)/1000;
  const fp2  = parseFloat(document.getElementById('sl-fp2').value)*1e6;
  const cc   = parseFloat(document.getElementById('sl-cc').value)*1e-12;
  const useRs= document.getElementById('chk-rs').checked;
  const cl   = parseFloat(document.getElementById('sl-cl').value)*1e-12;
  const rout = parseFloat(document.getElementById('sl-rout').value)*1e3;

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-gm2').textContent=(gm2*1000).toFixed(1);
  document.getElementById('lbl-fp2').textContent=(fp2/1e6).toFixed(0);
  document.getElementById('lbl-cc').textContent=(cc*1e12).toFixed(1);
  document.getElementById('lbl-rs').textContent=useRs?`${(1/gm2*1000).toFixed(0)}Ω`:'OFF';
  document.getElementById('lbl-cl').textContent=(cl*1e12).toFixed(0);
  document.getElementById('lbl-rout').textContent=(rout/1e3).toFixed(1);

  const gbw = gm1/(2*Math.PI*cc);
  const fp1_hz = gbw/10000; // dominant pole far below (assume A0=10000)
  const fz_rhp = useRs ? 0 : gm2/(2*Math.PI*cc);
  const fp3_load = cl>0 ? 1/(2*Math.PI*rout*cl) : 0;

  const a0_lin = 10000;
  const fc = findCross(a0_lin, fp1_hz, fp2, fp3_load);
  const pm = 180+phaseAt(fc, fp1_hz, fp2, fp3_load, fz_rhp);

  document.getElementById('r-fc').textContent=fc<1e6?(fc/1e3).toFixed(1)+'kHz':(fc/1e6).toFixed(2)+'MHz';
  const pmEl=document.getElementById('r-pm');
  pmEl.textContent=pm.toFixed(1)+'°';
  pmEl.style.color=pm>=60?'var(--green)':pm>=45?'#cc8800':'var(--warn)';

  let fosc_text='—', status='';
  if(pm<0){
    // estimate osc freq
    let lo=1e3,hi=1e11;
    for(let i=0;i<60;i++){const m=Math.sqrt(lo*hi);phaseAt(m,fp1_hz,fp2,fp3_load,fz_rhp)<-180?hi=m:lo=m;}
    const fosc=Math.sqrt(lo*hi);
    fosc_text=fosc<1e6?(fosc/1e3).toFixed(1)+'kHz':(fosc/1e6).toFixed(1)+'MHz';
    status='OSCILLATING';
  } else if(pm<45){ status='POOR PM'; } else if(pm<60){ status='MARGINAL'; } else { status='STABLE'; }
  document.getElementById('r-fosc').textContent=fosc_text;
  const stEl=document.getElementById('r-status');
  stEl.textContent=status;
  stEl.style.color=pm>=60?'var(--green)':pm>=45?'#cc8800':'var(--warn)';

  let ins=`GBW=${(gbw/1e6).toFixed(1)}MHz. fc=${fc<1e6?(fc/1e3).toFixed(0)+'kHz':(fc/1e6).toFixed(1)+'MHz'}. PM=${pm.toFixed(1)}°. `;
  if(!useRs&&fz_rhp>0) ins+=`RHP zero at ${(fz_rhp/1e6).toFixed(0)}MHz costs ${(-phaseAt(fc,fp1_hz,fp2,fp3_load,fz_rhp)-(90+Math.atan(fc/fp2)*180/Math.PI+(fp3_load>0?Math.atan(fc/fp3_load)*180/Math.PI:0))).toFixed(0)}°. `;
  if(fp3_load>0) ins+=`Load pole at ${(fp3_load/1e6).toFixed(1)}MHz. `;
  if(pm<0) ins+='OSCILLATING. Fix: increase Cc and/or add nulling Rs.';
  else if(pm<45) ins+='Poor margin. Increase Cc or reduce load.';
  else if(pm<60) ins+='Marginal. Check FF corner.';
  else ins+='Stable. Verify at FF corner (gm +25%).';
  document.getElementById('ins').textContent=ins;

  draw(fp1_hz,fp2,fp3_load,fz_rhp,a0_lin,fc,pm);
}

function applyFix() {
  // Increase Cc and enable Rs
  const cc_cur=parseFloat(document.getElementById('sl-cc').value);
  document.getElementById('sl-cc').value=Math.min(20,cc_cur*2.5);
  document.getElementById('chk-rs').checked=true;
  document.getElementById('sl-cl').value=0;
  update();
}

function draw(fp1_hz,fp2,fp3_load,fz_rhp,a0_lin,fc,pm) {
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500; canvas.width=W; canvas.height=300;
  const ctx=canvas.getContext('2d');
  const pad={l:50,r:15,t:15,b:35};
  const pw=W-pad.l-pad.r,ph=300-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)';ctx.fillRect(0,0,W,300);
  const magH=ph*0.5,phH=ph*0.5;
  const magTop=pad.t, phTop=pad.t+magH+4;
  const fMin=1e4,fMax=1e10;
  const lMin=Math.log10(fMin),lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(f)-lMin)/(lMax-lMin)*pw;
  const mToY=(m,top,h)=>top+h-((m+40)/(120))*h;
  const pToY=(p,top,h)=>top+h-((p+270)/270)*h;

  // Axes grid mag
  ctx.strokeStyle='var(--border)';ctx.lineWidth=0.7;
  for(let m=-40;m<=80;m+=40){const y=mToY(m,magTop,magH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(m+'dB',pad.l-3,y+3);}
  // 0dB
  const y0=mToY(0,magTop,magH);ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+pw,y0);ctx.stroke();ctx.setLineDash([]);
  // phase grid
  for(let p=-270;p<=0;p+=90){const y=pToY(p,phTop,phH);ctx.strokeStyle='var(--border)';ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p+'°',pad.l-3,y+3);}
  // -180 line
  const y180=pToY(-180,phTop,phH);ctx.strokeStyle='#cc4400';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(pad.l,y180);ctx.lineTo(pad.l+pw,y180);ctx.stroke();ctx.setLineDash([]);

  // Magnitude curve
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2;ctx.beginPath();let first=true;
  for(let i=0;i<=300;i++){const f=Math.pow(10,lMin+i/300*(lMax-lMin));const m=20*Math.log10(Math.max(magAt(f,a0_lin,fp1_hz,fp2,fp3_load),1e-9));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-5||y>magTop+magH+5){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  // Phase curve
  ctx.strokeStyle='#00994d';ctx.lineWidth=2;ctx.beginPath();first=true;
  for(let i=0;i<=300;i++){const f=Math.pow(10,lMin+i/300*(lMax-lMin));const p=phaseAt(f,fp1_hz,fp2,fp3_load,fz_rhp);const x=fToX(f);const y=pToY(Math.max(-270,p),phTop,phH);first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}
  ctx.stroke();

  // fc line
  if(fc>=fMin&&fc<=fMax){const xcf=fToX(fc);ctx.strokeStyle='#cc4400';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(xcf,magTop);ctx.lineTo(xcf,phTop+phH);ctx.stroke();ctx.setLineDash([]);const ycf=pToY(phaseAt(fc,fp1_hz,fp2,fp3_load,fz_rhp),phTop,phH);ctx.fillStyle='#cc4400';ctx.beginPath();ctx.arc(xcf,ycf,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#cc4400';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('PM='+pm.toFixed(0)+'°',xcf+5,ycf-3);}

  // x labels
  ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='center';
  ['10k','100k','1M','10M','100M','1G'].forEach((l,i)=>{ctx.fillText(l,fToX(Math.pow(10,4+i)),phTop+phH+14);});
  ctx.fillStyle='#0066cc';ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.fillText('|T|',pad.l+3,magTop+11);
  ctx.fillStyle='#00994d';ctx.fillText('∠T',pad.l+3,phTop+11);
}
update();
</script>
</body>
</html>
