<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4B-OTA-7.5.1 — Gain Boosting</title>
<style>
  :root { --bg:#ffffff; --bg2:#f5f5f5; --text:#1a1a1a; --text2:#555; --border:#ddd; --accent:#0066cc; --green:#00994d; --canvas-bg:#fafafa; --warn:#cc4400; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#242424; --text:#e8e8e8; --text2:#aaa; --border:#444; --canvas-bg:#1f1f1f; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:var(--bg2); border-bottom:2px solid var(--accent); padding:12px 20px; }
  header .id { font-family:monospace; font-size:12px; color:var(--accent); font-weight:700; }
  header h1 { font-size:16px; margin-top:2px; }
  .container { display:flex; gap:16px; padding:16px; flex-wrap:wrap; }
  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:14px; }
  .sim-panel { flex:1; min-width:380px; }
  .ctrl-panel { width:270px; min-width:240px; }
  canvas { background:var(--canvas-bg); border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .readouts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .readout { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
  .readout label { font-size:11px; color:var(--text2); display:block; }
  .readout .val { font-family:monospace; font-size:14px; font-weight:700; color:var(--accent); }
  .ctrl { margin-bottom:12px; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .ctrl label span { font-family:monospace; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin-bottom:8px; }
  .insight { background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:8px 12px; margin-top:10px; font-size:12px; color:var(--text2); line-height:1.5; }
</style>
</head>
<body>
<header>
  <div class="id">M4B-OTA-7.5.1</div>
  <h1>OTA — Gain Boosting</h1>
</header>
<div class="container">
  <div class="panel sim-panel">
    <canvas id="cv" height="340"></canvas>
    <div class="readouts">
      <div class="readout"><label>Rout (no boost)</label><span class="val" id="r-ro0">—</span></div>
      <div class="readout"><label>Rout (boosted)</label><span class="val" id="r-rob">—</span></div>
      <div class="readout"><label>Av (no boost)</label><span class="val" id="r-av0">—</span></div>
      <div class="readout"><label>Av (boosted)</label><span class="val" id="r-avb">—</span></div>
      <div class="readout"><label>GBW</label><span class="val" id="r-gbw">—</span></div>
      <div class="readout"><label>Power overhead</label><span class="val" id="r-pwr">—</span></div>
    </div>
    <div class="insight" id="ins">—</div>
  </div>
  <div class="panel ctrl-panel">
    <div class="section-title">Main OTA</div>
    <div class="ctrl">
      <label>gm1 (mA/V) <span id="lbl-gm1">1.0</span></label>
      <input type="range" id="sl-gm1" min="0.1" max="5" step="0.1" value="1.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>gm_c (mA/V) <span id="lbl-gmc">1.0</span></label>
      <input type="range" id="sl-gmc" min="0.1" max="5" step="0.1" value="1.0" oninput="update()">
    </div>
    <div class="ctrl">
      <label>ro (MΩ) <span id="lbl-ro">0.13</span></label>
      <input type="range" id="sl-ro" min="0.02" max="2" step="0.01" value="0.13" oninput="update()">
    </div>
    <div class="ctrl">
      <label>CL (pF) <span id="lbl-cl">1.0</span></label>
      <input type="range" id="sl-cl" min="0.1" max="10" step="0.1" value="1.0" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:8px">Gain Boost Amplifier</div>
    <div class="ctrl">
      <label>A_boost <span id="lbl-ab">30</span></label>
      <input type="range" id="sl-ab" min="1" max="100" step="1" value="30" oninput="update()">
    </div>
    <div class="ctrl">
      <label>fp_boost (MHz) <span id="lbl-fpb">500</span></label>
      <input type="range" id="sl-fpb" min="10" max="2000" step="10" value="500" oninput="update()">
    </div>
    <div class="ctrl">
      <label>IDD_boost (µA) <span id="lbl-idb">60</span></label>
      <input type="range" id="sl-idb" min="5" max="200" step="5" value="60" oninput="update()">
    </div>
    <div class="ctrl">
      <label>IDD_main (µA) <span id="lbl-idm">200</span></label>
      <input type="range" id="sl-idm" min="50" max="1000" step="10" value="200" oninput="update()">
    </div>
    <div class="section-title" style="margin-top:4px">Display</div>
    <div class="ctrl">
      <label style="align-items:center">Show unboosted curve
        <input type="checkbox" id="chk-unb" checked onchange="update()" style="width:auto;margin-left:8px">
      </label>
    </div>
  </div>
</div>
<script>
function fmt(f){return f>=1e9?(f/1e9).toFixed(2)+'GHz':f>=1e6?(f/1e6).toFixed(2)+'MHz':f>=1e3?(f/1e3).toFixed(1)+'kHz':f.toFixed(0)+'Hz';}

function update(){
  const gm1=parseFloat(document.getElementById('sl-gm1').value)/1000;
  const gmc=parseFloat(document.getElementById('sl-gmc').value)/1000;
  const ro=parseFloat(document.getElementById('sl-ro').value)*1e6;
  const cl=parseFloat(document.getElementById('sl-cl').value)*1e-12;
  const ab=parseFloat(document.getElementById('sl-ab').value);
  const fpb=parseFloat(document.getElementById('sl-fpb').value)*1e6;
  const idb=parseFloat(document.getElementById('sl-idb').value)*1e-6;
  const idm=parseFloat(document.getElementById('sl-idm').value)*1e-6;
  const showUnb=document.getElementById('chk-unb').checked;

  document.getElementById('lbl-gm1').textContent=(gm1*1000).toFixed(1);
  document.getElementById('lbl-gmc').textContent=(gmc*1000).toFixed(1);
  document.getElementById('lbl-ro').textContent=(ro/1e6).toFixed(2);
  document.getElementById('lbl-cl').textContent=(cl*1e12).toFixed(1);
  document.getElementById('lbl-ab').textContent=ab;
  document.getElementById('lbl-fpb').textContent=(fpb/1e6).toFixed(0);
  document.getElementById('lbl-idb').textContent=(idb*1e6).toFixed(0);
  document.getElementById('lbl-idm').textContent=(idm*1e6).toFixed(0);

  const rout0=gmc*ro*ro/2; // parallel NMOS+PMOS
  const rout_b=ab*rout0;
  const av0=gm1*rout0;
  const avb=gm1*rout_b;
  const gbw=gm1/(2*Math.PI*cl);
  const pwr_overhead=idb/(idm+idb)*100;

  document.getElementById('r-ro0').textContent=(rout0/1e6).toFixed(1)+'MΩ';
  document.getElementById('r-rob').textContent=(rout_b/1e6).toFixed(0)+'MΩ';
  const av0El=document.getElementById('r-av0');av0El.textContent=(20*Math.log10(av0)).toFixed(0)+'dB';av0El.style.color=av0>=1000?'var(--green)':'#cc8800';
  const avbEl=document.getElementById('r-avb');avbEl.textContent=(20*Math.log10(avb)).toFixed(0)+'dB';avbEl.style.color=avb>=100000?'var(--green)':avb>=10000?'#cc8800':'var(--warn)';
  document.getElementById('r-gbw').textContent=fmt(gbw);
  document.getElementById('r-pwr').textContent=pwr_overhead.toFixed(0)+'%';

  document.getElementById('ins').textContent=
    `Without boost: Rout=gm_c·ro²/2=${(rout0/1e6).toFixed(1)}MΩ, Av=${(20*Math.log10(av0)).toFixed(0)}dB. ` +
    `With A_boost=${ab}: Rout_b=${(rout_b/1e6).toFixed(0)}MΩ (${ab}× higher), Av_b=${(20*Math.log10(avb)).toFixed(0)}dB. ` +
    `Boost bandwidth fp_boost=${fmt(fpb)} — effective above GBW=${fmt(gbw)}. ` +
    `Power overhead: ${pwr_overhead.toFixed(0)}% for boost amplifiers.`;

  draw(gm1,gmc,ro,cl,ab,fpb,rout0,rout_b,av0,avb,gbw,showUnb);
}

function draw(gm1,gmc,ro,cl,ab,fpb,rout0,rout_b,av0,avb,gbw,showUnb){
  const canvas=document.getElementById('cv');
  const W=canvas.offsetWidth||500;canvas.width=W;canvas.height=340;
  const ctx=canvas.getContext('2d');
  const pad={l:52,r:15,t:20,b:35};
  const pw=W-pad.l-pad.r,ph=340-pad.t-pad.b;
  ctx.fillStyle='var(--canvas-bg)';ctx.fillRect(0,0,W,340);

  const magH=ph*0.47,phH=ph*0.47;
  const magTop=pad.t,phTop=pad.t+magH+5;
  const fMin=1e2,fMax=Math.max(1e11,gbw*1000);
  const lMin=Math.log10(fMin),lMax=Math.log10(fMax);
  const fToX=f=>pad.l+(Math.log10(Math.max(f,fMin))-lMin)/(lMax-lMin)*pw;
  const avMax_dB=Math.max(120,(20*Math.log10(avb))+10);
  const mToY=(m,top,h)=>top+h-(m/(avMax_dB+10))*h;
  const pToY=(p,top,h)=>top+h-((p+180)/180)*h;

  // Grid
  ctx.strokeStyle='var(--border)';ctx.lineWidth=0.7;
  [0,20,40,60,80,100,120].filter(m=>m<=avMax_dB).forEach(m=>{const y=mToY(m,magTop,magH);if(y<magTop-2||y>magTop+magH+2)return;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(m+'dB',pad.l-3,y+3);});
  [-180,-90,0].forEach(p=>{const y=pToY(p,phTop,phH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p+'°',pad.l-3,y+3);});

  const y0=mToY(0,magTop,magH);ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pad.l,y0);ctx.lineTo(pad.l+pw,y0);ctx.stroke();ctx.setLineDash([]);

  // Boosted gain model: at low frequency fp1_b = GBW/av_b
  // The boost effect: Rout_b valid up to fp_boost/ab; above that Rout falls back to Rout0
  const fp1_unb=gbw/av0;
  const fp1_b=gbw/avb;
  const fp_boost_rolloff=fpb/ab; // frequency where boost starts to lose effect

  const mag_boosted=f=>{
    // Simplified: boosted below fp_boost_rolloff, transitions to unboosted above
    const av_eff=av0+(avb-av0)/(1+(f/fp_boost_rolloff)**2);
    const fp1_eff=gbw/av_eff;
    return av_eff/Math.sqrt(1+(f/fp1_eff)**2)/Math.sqrt(1+(f/gbw)**2);
  };
  const phase_boosted=f=>-(Math.atan(f/(gbw/avb))+Math.atan(f/gbw))*180/Math.PI;
  const mag_unb=f=>av0/Math.sqrt(1+(f/fp1_unb)**2)/Math.sqrt(1+(f/gbw)**2);
  const phase_unb=f=>-(Math.atan(f/fp1_unb)+Math.atan(f/gbw))*180/Math.PI;

  if(showUnb){
    ctx.strokeStyle='rgba(150,150,150,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();let first=true;
    for(let i=0;i<=300;i++){const f=Math.pow(10,lMin+i/300*(lMax-lMin));const m=20*Math.log10(Math.max(mag_unb(f),1e-9));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-10||y>magTop+magH+10){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}ctx.stroke();ctx.setLineDash([]);
  }

  ctx.strokeStyle='#0066cc';ctx.lineWidth=2;ctx.beginPath();let first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const m=20*Math.log10(Math.max(mag_boosted(f),1e-9));const x=fToX(f);const y=mToY(m,magTop,magH);if(y<magTop-10||y>magTop+magH+10){first=true;continue;}first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}ctx.stroke();

  ctx.strokeStyle='#00994d';ctx.lineWidth=2;ctx.beginPath();first=true;
  for(let i=0;i<=400;i++){const f=Math.pow(10,lMin+i/400*(lMax-lMin));const p=phase_boosted(f);const x=fToX(f);const y=pToY(p,phTop,phH);first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}ctx.stroke();

  // Key frequency markers
  [[fp1_b,'fp1(boost)','#0066cc'],[fp1_unb,'fp1(unb)','#888'],[gbw,'GBW','#cc4400'],[fp_boost_rolloff,'fp_boost/Ab','#cc8800']].forEach(([f,label,col])=>{
    if(f<fMin||f>fMax)return;const x=fToX(f);ctx.strokeStyle=col+'55';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(x,magTop);ctx.lineTo(x,magTop+magH);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=col;ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(label,x,magTop+8);
  });

  ctx.fillStyle='#0066cc';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('|T| boosted',pad.l+3,magTop+9);
  if(showUnb){ctx.fillStyle='#888';ctx.fillText('unboosted (gray dashed)',pad.l+3,magTop+19);}
  ctx.fillStyle='#00994d';ctx.fillText('∠T',pad.l+3,phTop+9);
  ctx.fillStyle='var(--text)';ctx.font='8px monospace';ctx.textAlign='center';
  const ticks=[];let ft=fMin;while(ft<=fMax){ticks.push(ft);ft*=10;}
  ticks.forEach(f=>{const x=fToX(f);const l=f>=1e9?(f/1e9).toFixed(0)+'G':f>=1e6?(f/1e6).toFixed(0)+'M':f>=1e3?(f/1e3).toFixed(0)+'k':f.toFixed(0);ctx.fillText(l,x,phTop+phH+14);});
}
update();
</script>
</body>
</html>
