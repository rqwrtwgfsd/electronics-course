<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sim: PCB Transmission Line Reflections</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:12px;}
canvas{display:block;border:1px solid #444;border-radius:6px;background:#0d0d1a;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:12px;}
label{color:#aaa;}
input[type=range]{width:140px;}
.vals{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#ccc;margin:6px 0;}
.val-item{background:#222;border-radius:4px;padding:4px 8px;}
h3{font-size:13px;color:#90caf9;margin-bottom:6px;}
@media(prefers-color-scheme:light){body{background:#f5f5f5;color:#111;}canvas{background:#fff;border-color:#ccc;}.val-item{background:#eee;color:#222;}label{color:#555;}h3{color:#005a9c;}}
</style>
</head>
<body>
<h3>Problem 4 — PCB Transmission Line: Voltage at Load vs Time</h3>
<p style="font-size:11px;color:#aaa;margin-bottom:8px;">Open-circuit CMOS load reflects full wave. Adjust series termination to eliminate re-reflections.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>Trace length (cm)</label><input type="range" id="len" min="1" max="100" value="50" step="1"><span id="lenV">50</span></div>
  <div class="ctrl"><label>Z0 (Ohm)</label><input type="range" id="z0" min="20" max="200" value="146" step="1"><span id="z0V">146</span></div>
  <div class="ctrl"><label>Z_source (Ohm)</label><input type="range" id="zs" min="1" max="150" value="50" step="1"><span id="zsV">50</span></div>
  <div class="ctrl"><label>R_series term (Ohm)</label><input type="range" id="rt" min="0" max="150" value="0" step="1"><span id="rtV">0</span></div>
</div>
<div class="vals">
  <div class="val-item">t_delay: <strong id="td">-</strong></div>
  <div class="val-item">Gamma_s: <strong id="gs">-</strong></div>
  <div class="val-item">V_peak at load: <strong id="vpeak">-</strong></div>
  <div class="val-item">lambda/10 @ 50MHz: <strong id="lambda10">-</strong></div>
</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resizeCanvas(){
  const w=cv.parentElement.getBoundingClientRect().width;
  cv.width=Math.min(w-24,700);
  cv.height=Math.round(cv.width*0.45);
}
function get(id){return parseFloat(document.getElementById(id).value);}
function draw(){
  const W=cv.width,H=cv.height;
  const len_m=get('len')/100,Z0=get('z0'),Zs_raw=get('zs'),Rt=get('rt'),Zs=Zs_raw+Rt;
  document.getElementById('lenV').textContent=get('len');
  document.getElementById('z0V').textContent=get('z0');
  document.getElementById('zsV').textContent=get('zs');
  document.getElementById('rtV').textContent=get('rt');
  const v_prop=1.43e8;
  const td=len_m/v_prop;
  const gamma_s=(Zs-Z0)/(Zs+Z0);
  const gamma_L=1.0;
  document.getElementById('td').textContent=(td*1e9).toFixed(1)+'ns';
  document.getElementById('gs').textContent=gamma_s.toFixed(3);
  const V_launch=1.0*Z0/(Zs+Z0);
  const t_total=10*td;
  const N_pts=2000;
  const V_at_load=new Array(N_pts).fill(0);
  const events=[];
  let Vinc=V_launch;
  for(let k=0;k<7;k++){
    const t_arr=(2*k+1)*td;
    events.push({t:t_arr,dV:Vinc*(1+gamma_L)});
    Vinc=Vinc*gamma_L*gamma_s;
  }
  for(let i=0;i<N_pts;i++){
    const t=t_total*i/N_pts;
    let v=0;
    events.forEach(e=>{if(t>=e.t)v+=e.dV;});
    V_at_load[i]=v;
  }
  const V_peak=Math.max(...V_at_load);
  document.getElementById('vpeak').textContent=V_peak.toFixed(3)+'V';
  const lambda10_cm=(v_prop/50e6)/10*100;
  document.getElementById('lambda10').textContent=lambda10_cm.toFixed(1)+'cm';
  ctx.clearRect(0,0,W,H);
  const pad={l:52,r:20,t:28,b:38};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const v_min=-0.2,v_max=Math.max(2.3,V_peak+0.3);
  function tx(t){return pad.l+t/t_total*pw;}
  function vy(v){return H-pad.b-(v-v_min)/(v_max-v_min)*ph;}
  ctx.strokeStyle='#1e2a3a';ctx.lineWidth=0.5;
  [0,0.5,1.0,1.5,2.0].forEach(v=>{
    if(v>=v_min&&v<=v_max){
      ctx.beginPath();ctx.moveTo(pad.l,vy(v));ctx.lineTo(W-pad.r,vy(v));ctx.stroke();
      ctx.fillStyle='#555';ctx.font='10px Arial';ctx.fillText(v.toFixed(1),2,vy(v)+4);
    }
  });
  ctx.strokeStyle='#336633';ctx.lineWidth=0.8;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(pad.l,vy(1.0));ctx.lineTo(W-pad.r,vy(1.0));ctx.stroke();
  ctx.fillStyle='#55aa55';ctx.font='9px Arial';ctx.fillText('1.0V expected',pad.l+4,vy(1.0)-4);
  ctx.strokeStyle='#ff4444';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(pad.l,vy(1.8));ctx.lineTo(W-pad.r,vy(1.8));ctx.stroke();
  ctx.fillStyle='#ff6666';ctx.font='9px Arial';ctx.fillText('VDD+0.5 danger',pad.l+4,vy(1.8)+12);
  ctx.setLineDash([]);
  ctx.beginPath();ctx.strokeStyle='#55aaff';ctx.lineWidth=2;
  for(let i=0;i<N_pts;i++){
    const t=t_total*i/N_pts;
    if(i===0)ctx.moveTo(tx(t),vy(V_at_load[i]));else ctx.lineTo(tx(t),vy(V_at_load[i]));
  }
  ctx.stroke();
  ctx.strokeStyle='#666';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  for(let k=1;k<=9;k++){
    const t=k*td;
    if(t<t_total){
      const x=tx(t);
      ctx.strokeStyle='#333';ctx.lineWidth=0.5;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#555';ctx.font='9px Arial';ctx.fillText(k+'td',x-10,H-pad.b+13);
    }
  }
  ctx.fillStyle='#aaa';ctx.font='10px Arial';ctx.fillText('Time at CMOS load',W/2-40,H-5);
  ctx.fillStyle='#90caf9';ctx.font='bold 11px Arial';
  ctx.fillText('Z0='+Z0+'O  Zs_eff='+Zs+'O  Rt='+Rt+'O  Gs='+gamma_s.toFixed(2),pad.l+5,pad.t-8);
  if(V_peak>1.15){
    ctx.fillStyle='rgba(255,50,50,0.12)';
    ctx.fillRect(pad.l,pad.t,pw,vy(1.05)-pad.t);
    ctx.fillStyle='#ff7777';ctx.font='10px Arial';
    ctx.fillText('Overshoot: '+V_peak.toFixed(2)+'V — CMOS may latch up!',pad.l+8,pad.t+18);
  }
}
['len','z0','zs','rt'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>{resizeCanvas();draw();});
resizeCanvas();draw();
</script>
</body>
</html>
