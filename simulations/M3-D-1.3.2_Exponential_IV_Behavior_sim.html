<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3-D-1.3.2 Exponential I-V Behavior</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#0066cc;--accent2:#58a6ff;--text:#e6edf3;--subtext:#8b949e;--green:#3fb950;--red:#f85149;--orange:#d29922;}
  @media(prefers-color-scheme:light){:root{--bg:#fff;--surface:#f6f8fa;--border:#d0d7de;--accent:#0066cc;--accent2:#0969da;--text:#24292f;--subtext:#57606a;--green:#1a7f37;--red:#d1242f;--orange:#9a6700;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:20px;}
  h1{color:var(--accent2);font-size:1.3rem;margin-bottom:4px;}
  .sub{color:var(--subtext);font-size:0.85rem;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:700px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;}
  h2{font-size:0.95rem;color:var(--accent2);margin-bottom:10px;}
  canvas{display:block;width:100%;}
  .ctrl{display:flex;flex-direction:column;gap:10px;}
  label{font-size:0.82rem;color:var(--subtext);}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .ro-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font-family:monospace;font-size:0.82rem;margin-top:10px;}
  .ro{display:flex;justify-content:space-between;margin-bottom:4px;}
  .ro b{color:var(--accent2);}
  .hl{color:var(--green);font-weight:bold;}
  button{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.8rem;margin-right:4px;}
  button.on{background:var(--green);}
</style>
</head>
<body>
<h1>M3-D-1.3.2 — Exponential I-V Behavior</h1>
<p class="sub">Log-scale Shockley equation with ideality factor n</p>
<div class="grid">
  <div class="card"><h2>Simulation</h2><canvas id="c" height="260"></canvas></div>
  <div class="card"><h2>Controls</h2>
    <div class="ctrl"><div style="margin-bottom:8px"><button id="btnLog" class="on" onclick="setScale(true)">Log Scale</button><button id="btnLin" onclick="setScale(false)">Linear</button></div>
<div><label>Ideality factor n: <b id="nL">1.00</b></label><input type="range" id="nS" min="1" max="2" value="1" step="0.05" oninput="document.getElementById('nL').textContent=parseFloat(this.value).toFixed(2)"></div>
<div><label>I_s (x10^-12 A): <b id="isL">1.00</b></label><input type="range" id="isS" min="0.01" max="100" value="1" step="0.01" oninput="document.getElementById('isL').textContent=parseFloat(this.value).toFixed(2)"></div>
<div><label>Temperature T (K): <b id="tL">300</b></label><input type="range" id="tS" min="250" max="400" value="300" step="5" oninput="document.getElementById('tL').textContent=this.value"></div></div>
    <div class="ro-box"><div class="ro"><span>Ideality n</span><b id="ro_n" class="hl">—</b></div>
<div class="ro"><span>V_T</span><b id="ro_vt">—</b></div>
<div class="ro"><span>I at 0.5V</span><b id="ro_i05">—</b></div>
<div class="ro"><span>I at 0.6V</span><b id="ro_i06">—</b></div>
<div class="ro"><span>I at 0.7V</span><b id="ro_i07" class="hl">—</b></div></div>
  </div>
</div>
<script>

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function resize(){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(W,H,pad,xl,yl){
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  ctx.strokeStyle=isDark()?'#333':'#ddd';ctx.lineWidth=1;ctx.strokeRect(pad.l,pad.t,pw,ph);
  for(let i=1;i<5;i++){
    ctx.beginPath();ctx.moveTo(pad.l+pw*i/5,pad.t);ctx.lineTo(pad.l+pw*i/5,pad.t+ph);
    ctx.strokeStyle=isDark()?'#222':'#eee';ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.l,pad.t+ph*i/5);ctx.lineTo(pad.l+pw,pad.t+ph*i/5);ctx.stroke();
  }
  ctx.fillStyle=isDark()?'#666':'#888';ctx.font='10px system-ui';
  ctx.textAlign='center';ctx.fillText(xl,pad.l+pw/2,H-3);
  ctx.save();ctx.translate(12,pad.t+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}


let logSc=true;
function setScale(s){logSc=s;document.getElementById('btnLog').className=s?'on':'';document.getElementById('btnLin').className=!s?'on':'';draw();}
function draw(){
  const n=gs('nS'),Is=gs('isS')*1e-12,T=gs('tS');
  const VT=1.381e-23*T/1.602e-19;
  const W=cv.width/devicePixelRatio,H=260;
  ctx.clearRect(0,0,W,H);
  const pad={l:55,r:15,t:18,b:32};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const Vmax=0.9;
  if(logSc){
    drawAxes(W,H,pad,'V_F (V)','log I (A)');
    ctx.strokeStyle='#0066cc';ctx.lineWidth=2.5;ctx.beginPath();
    let first=true;
    for(let px=0;px<=pw;px++){
      const V=Vmax*px/pw;
      const I=Math.max(Is*(Math.exp(V/(n*VT))-1),1e-30);
      const logI=Math.log10(I);
      if(logI<-16)continue;
      const y=pad.t+ph*(1-(logI+16)/16);
      if(y<pad.t||y>pad.t+ph){first=true;continue;}
      if(first){ctx.moveTo(pad.l+px,y);first=false;}else ctx.lineTo(pad.l+px,y);
    }
    ctx.stroke();
    ctx.fillStyle=isDark()?'#888':'#666';ctx.font='10px monospace';
    ctx.textAlign='right';ctx.fillText('1A',pad.l-3,pad.t+6);ctx.fillText('0.1pA',pad.l-3,pad.t+ph-2);
    ctx.textAlign='center';ctx.fillText('0',pad.l,pad.t+ph+12);ctx.fillText('0.9V',pad.l+pw,pad.t+ph+12);
    const decadeMV=(n*VT*Math.log(10)*1000);
    ctx.fillStyle='#f85149';ctx.fillText('1 decade = '+decadeMV.toFixed(1)+'mV',pad.l+pw/2,pad.t+14);
  } else {
    drawAxes(W,H,pad,'V_F (V)','I (A)');
    const Imax=0.1;
    ctx.strokeStyle='#0066cc';ctx.lineWidth=2.5;ctx.beginPath();
    let first=true;
    for(let px=0;px<=pw;px++){
      const V=Vmax*px/pw;
      const I=Math.min(Math.max(Is*(Math.exp(V/(n*VT))-1),0),Imax);
      const y=pad.t+ph*(1-I/Imax);
      if(first){ctx.moveTo(pad.l+px,y);first=false;}else ctx.lineTo(pad.l+px,y);
    }
    ctx.stroke();
    ctx.fillStyle=isDark()?'#888':'#666';ctx.font='10px monospace';
    ctx.textAlign='right';ctx.fillText('100mA',pad.l-3,pad.t+6);
    ctx.textAlign='center';ctx.fillText('0',pad.l,pad.t+ph+12);ctx.fillText('0.9V',pad.l+pw,pad.t+ph+12);
  }
  function fc(I){if(I>=1)return I.toFixed(2)+'A';if(I>=1e-3)return(I*1e3).toFixed(2)+'mA';if(I>=1e-6)return(I*1e6).toFixed(2)+'uA';if(I>=1e-9)return(I*1e9).toFixed(2)+'nA';return(I*1e12).toFixed(2)+'pA';}
  document.getElementById('ro_n').textContent=n.toFixed(2);
  document.getElementById('ro_vt').textContent=(VT*1000).toFixed(2)+' mV';
  document.getElementById('ro_i05').textContent=fc(Is*(Math.exp(0.5/(n*VT))-1));
  document.getElementById('ro_i06').textContent=fc(Is*(Math.exp(0.6/(n*VT))-1));
  document.getElementById('ro_i07').textContent=fc(Is*(Math.exp(0.7/(n*VT))-1));
}

document.querySelectorAll('input[type=range]').forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
