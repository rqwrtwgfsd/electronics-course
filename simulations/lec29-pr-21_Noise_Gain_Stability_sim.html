<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lec29 Pr21 — Noise Gain vs Stability (Decompensated Op-Amp)</title>
<style>
  body{margin:0;padding:10px;font-family:sans-serif;background:#1a1a2e;color:#e0e0e0;}
  canvas{display:block;border:1px solid #444;border-radius:6px;background:#0f0f1e;}
  .ctrl{margin:7px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  label{min-width:200px;font-size:0.85em;}
  input[type=range]{flex:1;min-width:120px;}
  .val{min-width:70px;font-size:0.85em;color:#7ec8e3;}
  .result-box{background:#162032;border:1px solid #2a4a6a;border-radius:6px;padding:10px;margin-top:8px;font-size:0.85em;}
  h3{color:#7ec8e3;margin:4px 0 10px;}
</style>
</head>
<body>
<h3>Problem 21 — Noise Gain vs Signal Gain: Conditional Stability</h3>
<canvas id="cv"></canvas>
<div class="ctrl">
  <label>Signal gain (inverting):</label>
  <input type="range" id="gain" min="1" max="200" value="100" step="1">
  <span class="val" id="gain_v">100×</span>
</div>
<div class="ctrl">
  <label>GBW (MHz):</label>
  <input type="range" id="gbw" min="10" max="500" value="100" step="5">
  <span class="val" id="gbw_v">100 MHz</span>
</div>
<div class="ctrl">
  <label>Bump freq f_bump (× GBW/noise_gain):</label>
  <input type="range" id="fbump" min="0.3" max="3" value="1" step="0.05">
  <span class="val" id="fbump_v">1.0×</span>
</div>
<div class="result-box" id="result">Results</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resizeCanvas(){
  const w=cv.parentElement.getBoundingClientRect().width-20;
  cv.width=Math.max(300,w); cv.height=Math.round(cv.width*0.5);
}
function getVals(){
  return {
    gain:parseFloat(document.getElementById('gain').value),
    gbw:parseFloat(document.getElementById('gbw').value)*1e6,
    fbump:parseFloat(document.getElementById('fbump').value)
  };
}
function updateLabels(){
  document.getElementById('gain_v').textContent=parseFloat(document.getElementById('gain').value).toFixed(0)+'×';
  document.getElementById('gbw_v').textContent=parseFloat(document.getElementById('gbw').value).toFixed(0)+' MHz';
  document.getElementById('fbump_v').textContent=parseFloat(document.getElementById('fbump').value).toFixed(2)+'×';
}
function draw(){
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  const {gain, gbw, fbump}=getVals();

  const noiseGain=1+gain; // inverting amp: noise gain = 1 + |Rf/Rin|
  const fCL_BW=gbw/noiseGain; // closed-loop bandwidth
  const fBump=fCL_BW*fbump; // where the A_OL has a bump

  const mx=60,my=15,bx=W-15,by=H-30;
  const pw=bx-mx,ph=by-my;
  const fMin=1e4, fMax=Math.max(gbw*3,1e9);
  const fRange=Math.log10(fMax/fMin);
  const ADC=100000; // 100dB
  const ADC_dB=100;
  const gainMin_dB=-5, gainMax_dB=ADC_dB+5;

  ctx.strokeStyle='#444'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx,by); ctx.lineTo(bx,by); ctx.stroke();

  // Grid
  for(let exp=4;exp<=10;exp++){
    const f=Math.pow(10,exp);
    if(f>fMax) break;
    const x=mx+(Math.log10(f/fMin)/fRange)*pw;
    ctx.strokeStyle='#252540'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(x,my); ctx.lineTo(x,by); ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='9px sans-serif';
    const lbl=exp>=9?'1GHz':exp>=8?'100M':exp>=7?'10M':exp>=6?'1M':exp>=5?'100k':'10k';
    ctx.fillText(lbl, x-12, by+14);
  }
  for(let g=0;g<=ADC_dB;g+=20){
    const y=by-(g-gainMin_dB)/(gainMax_dB-gainMin_dB)*ph;
    if(y<my||y>by) continue;
    ctx.strokeStyle='#252540'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(mx,y); ctx.lineTo(bx,y); ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='9px sans-serif';
    ctx.fillText(g+'dB', mx-40, y+4);
  }

  // A_OL with bump (decompensated op-amp)
  function A_OL(f){
    const fp1=gbw/ADC;
    const fp2=gbw*0.6; // non-dominant pole
    const fz=gbw*0.5; // zero causing peaking
    const w=2*Math.PI*f;
    let mag=ADC;
    mag/=Math.sqrt(1+(w/(2*Math.PI*fp1))**2);
    mag/=Math.sqrt(1+(w/(2*Math.PI*fp2))**2);
    mag*=Math.sqrt(1+(w/(2*Math.PI*fz))**2);
    return mag;
  }
  // A_OL phase
  function A_OL_phase(f){
    const fp1=gbw/ADC;
    const fp2=gbw*0.6;
    const fz=gbw*0.5;
    const w=2*Math.PI*f;
    return -Math.atan(w/(2*Math.PI*fp1))*180/Math.PI
           -Math.atan(w/(2*Math.PI*fp2))*180/Math.PI
           +Math.atan(w/(2*Math.PI*fz))*180/Math.PI;
  }

  // Plot A_OL
  ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=2;
  ctx.beginPath(); let first=true;
  for(let i=0;i<=500;i++){
    const f=fMin*Math.pow(fMax/fMin,i/500);
    const mag_dB=20*Math.log10(Math.max(A_OL(f),1e-4));
    const x=mx+(Math.log10(f/fMin)/fRange)*pw;
    const y=by-(mag_dB-gainMin_dB)/(gainMax_dB-gainMin_dB)*ph;
    if(first){ctx.moveTo(x,Math.max(my,Math.min(by,y)));first=false;}
    else ctx.lineTo(x,Math.max(my,Math.min(by,y)));
  }
  ctx.stroke();
  ctx.fillStyle='#4fc3f7'; ctx.font='10px sans-serif';
  ctx.fillText('A_OL (decompensated)', mx+10, my+14);

  // Noise gain horizontal line
  const noiseGain_dB=20*Math.log10(noiseGain);
  const yNG=by-(noiseGain_dB-gainMin_dB)/(gainMax_dB-gainMin_dB)*ph;
  ctx.strokeStyle='#ff7043'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(mx,yNG); ctx.lineTo(bx,yNG); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#ff7043'; ctx.font='10px sans-serif';
  ctx.fillText('Noise gain='+noiseGain_dB.toFixed(0)+'dB (1+'+gain+')', mx+5, yNG-4);

  // Intersection: where A_OL = noise gain → phase margin at that point
  let pmVal=null, crossoverF=null;
  for(let i=0;i<=10000;i++){
    const f=fMin*Math.pow(fMax/fMin,i/10000);
    if(A_OL(f)<=noiseGain){
      crossoverF=f;
      pmVal=180+A_OL_phase(f);
      break;
    }
  }

  // Mark crossover
  if(crossoverF && crossoverF>fMin && crossoverF<fMax){
    const xcross=mx+(Math.log10(crossoverF/fMin)/fRange)*pw;
    ctx.strokeStyle='#ffb74d'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(xcross,my); ctx.lineTo(xcross,by); ctx.stroke();
    ctx.fillStyle='#ffb74d'; ctx.font='9px sans-serif';
    const fLabel=crossoverF>=1e6?(crossoverF/1e6).toFixed(0)+'MHz':crossoverF>=1e3?(crossoverF/1e3).toFixed(0)+'kHz':crossoverF.toFixed(0)+'Hz';
    ctx.fillText('f_cross='+fLabel, Math.min(xcross+3,bx-80), my+26);
  }

  const pm_ok=pmVal!==null && pmVal>45;
  document.getElementById('result').innerHTML=
    `<b>Noise Gain Analysis:</b><br>
    Signal gain = ${gain}× | Noise gain = ${noiseGain}× = ${noiseGain_dB.toFixed(0)} dB<br>
    A_OL crosses noise gain at: ${crossoverF?(crossoverF>=1e6?(crossoverF/1e6).toFixed(1)+'MHz':(crossoverF/1e3).toFixed(0)+'kHz'):'N/A'}<br>
    Phase margin at crossover: ${pmVal!==null?pmVal.toFixed(0)+'°':'N/A'} ${pm_ok?'✓ Stable':'⚠ UNSTABLE — conditional stability!'}<br>
    Insight: Stability = where A_OL curve crosses noise gain line (not signal gain).`;
}

['gain','gbw','fbump'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{updateLabels();draw();}));
resizeCanvas(); updateLabels(); draw();
window.addEventListener('resize',()=>{resizeCanvas();draw();});
</script>
</body>
</html>
