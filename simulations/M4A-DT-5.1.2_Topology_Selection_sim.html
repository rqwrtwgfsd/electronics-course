<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4A-DT-5.1.2 — Topology Selection</title>
<style>
:root{--bg:#f5f5f5;--panel:#fff;--border:#d0d0d0;--text:#1a1a1a;--text2:#555;--accent:#1a6fc4;--green:#2a9d2a;--orange:#e07b00;--red:#c42a2a;--grid:#e0e0e0;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--panel:#252525;--border:#404040;--text:#e8e8e8;--text2:#aaa;--accent:#4a9fe8;--green:#4acd4a;--orange:#f0a030;--red:#e85050;--grid:#333;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;}
h1{font-size:1.1rem;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--border);}
h1 span{color:var(--text2);font-weight:normal;font-size:.85rem;}
.main{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 44px);}
.left{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px;}
.right{display:grid;grid-template-rows:1fr 1fr;overflow:hidden;}
.plot-wrap{position:relative;background:var(--bg);border-bottom:1px solid var(--border);}
.plot-wrap:last-child{border-bottom:none;}
canvas{display:block;width:100%;height:100%;}
.section{margin-bottom:14px;}
.section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.ctrl{margin-bottom:8px;}
.ctrl label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px;}
.ctrl label span{color:var(--accent);font-weight:600;font-family:monospace;}
input[type=range]{width:100%;accent-color:var(--accent);}
.top-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;}
.topo-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px;font-size:.75rem;cursor:pointer;text-align:center;line-height:1.3;}
.topo-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.prop-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:4px;}
.prop-table th{background:var(--grid);padding:4px 6px;text-align:left;font-size:.72rem;}
.prop-table td{padding:4px 6px;border-bottom:1px solid var(--border);}
.prop-table td.val{font-family:monospace;font-weight:600;}
.prop-table td.good{color:var(--green);}
.prop-table td.warn{color:var(--orange);}
.prop-table td.bad{color:var(--red);}
.plot-label{position:absolute;top:6px;left:10px;font-size:.75rem;color:var(--text2);pointer-events:none;}
.legend{display:flex;flex-wrap:wrap;gap:8px;font-size:.72rem;margin-top:6px;}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-dot{width:12px;height:3px;border-radius:2px;}
</style>
</head>
<body>
<h1>M4A-DT-5.1.2 — Topology Selection <span>| Comparative Performance vs. Requirements</span></h1>
<div class="main">
  <div class="left">

    <div class="section">
      <div class="section-title">Select Topology</div>
      <div class="top-btns">
        <button class="topo-btn active" data-topo="inv">Inverting VFA</button>
        <button class="topo-btn" data-topo="ninv">Non-Inverting VFA</button>
        <button class="topo-btn" data-topo="ina">3-Op-Amp INA</button>
        <button class="topo-btn" data-topo="cfa">CFA</button>
        <button class="topo-btn" data-topo="tia">TIA (Photodiode)</button>
        <button class="topo-btn" data-topo="chop">Chopper-Stabilized</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Application Requirements</div>
      <div class="ctrl">
        <label>Source Impedance Rs <span id="val-rs">1 kΩ</span></label>
        <input type="range" id="sl-rs" min="1" max="10000000" step="10" value="1000">
      </div>
      <div class="ctrl">
        <label>Required Gain <span id="val-gain">10×</span></label>
        <input type="range" id="sl-gain" min="1" max="1000" step="1" value="10">
      </div>
      <div class="ctrl">
        <label>Required BW <span id="val-bw">100 kHz</span></label>
        <input type="range" id="sl-bw" min="100" max="100000000" step="100" value="100000">
      </div>
      <div class="ctrl">
        <label>Required CMRR <span id="val-cmrr">60 dB</span></label>
        <input type="range" id="sl-cmrr" min="20" max="140" step="5" value="60">
      </div>
      <div class="ctrl">
        <label>Required Vos <span id="val-vos">0.1 mV</span></label>
        <input type="range" id="sl-vos" min="0.0001" max="10" step="0.0001" value="0.1">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Topology Performance</div>
      <table class="prop-table">
        <tr><th>Property</th><th>Topology</th><th>Req.</th><th>Meet?</th></tr>
        <tbody id="prop-tbody"></tbody>
      </table>
    </div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div><span>Inverting</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div><span>Non-Inv.</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div><span>INA</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div><span>CFA</span></div>
    </div>

  </div>

  <div class="right">
    <div class="plot-wrap">
      <div class="plot-label">Bandwidth vs. Gain — 4 Topologies (GBW = 100 MHz)</div>
      <canvas id="bw-canvas"></canvas>
    </div>
    <div class="plot-wrap">
      <div class="plot-label">Input Impedance vs. Rs — Effective Loading</div>
      <canvas id="zin-canvas"></canvas>
    </div>
  </div>
</div>

<script>
let topo = 'inv';
const GBW = 100e6; // representative GBW

const TOPOLOGIES = {
  inv:  { name:'Inverting VFA',        inputZ:'R1',  cmrr:60,   vos:0.1,  chopper:false, differential:false },
  ninv: { name:'Non-Inverting VFA',    inputZ:'∞',   cmrr:80,   vos:0.05, chopper:false, differential:false },
  ina:  { name:'3-Op-Amp INA',         inputZ:'∞',   cmrr:100,  vos:0.05, chopper:false, differential:true  },
  cfa:  { name:'Current Feedback Amp', inputZ:'med', cmrr:65,   vos:0.2,  chopper:false, differential:false },
  tia:  { name:'Transimpedance Amp',   inputZ:'vgnd',cmrr:60,   vos:0.1,  chopper:false, differential:false },
  chop: { name:'Chopper-Stabilized',   inputZ:'∞',   cmrr:120,  vos:0.001,chopper:true,  differential:false },
};

function getParams(){
  return{
    rs:   +document.getElementById('sl-rs').value,
    gain: +document.getElementById('sl-gain').value,
    bw:   +document.getElementById('sl-bw').value,
    cmrr: +document.getElementById('sl-cmrr').value,
    vos:  +document.getElementById('sl-vos').value,
  };
}

function topoInputZ(t, gain, rs){
  if(t==='inv')  return Math.max(100, rs/gain); // R1 = source loading
  if(t==='ninv') return GBW/(gain*2*Math.PI*100)*1e6; // very high
  if(t==='ina')  return 1e12; // essentially infinite
  if(t==='cfa')  return 50;   // typically 50 Ω for CFA's +input
  if(t==='tia')  return 0;    // virtual ground
  if(t==='chop') return 1e9;  // very high
  return 1e6;
}

function topoBW(t, gain){
  if(t==='inv')  return GBW/(gain+1);
  if(t==='ninv') return GBW/(gain+1);
  if(t==='ina')  return GBW/(gain+1)*0.8;
  if(t==='cfa')  return 500e6; // nearly gain-independent for CFA
  if(t==='tia')  return GBW*0.5/(gain+1);
  if(t==='chop') return Math.min(2e6, GBW/(gain+1)*0.3); // chopper limits BW
  return GBW/(gain+1);
}

function getColors(){
  const s=getComputedStyle(document.documentElement);
  return['--bg','--text','--text2','--grid','--accent','--green','--orange','--red','--border']
    .reduce((o,k)=>{o[k.slice(2)]=s.getPropertyValue(k).trim();return o;},{});
}

function updatePropsTable(){
  const p=getParams();
  const t=TOPOLOGIES[topo];
  const bw=topoBW(topo,p.gain);
  const zin=topoInputZ(topo,p.gain,p.rs);
  const props=[
    {name:'BW', tVal:bw>=1e6?(bw/1e6).toFixed(1)+'MHz':(bw/1e3).toFixed(1)+'kHz',
     req:p.bw>=1e6?(p.bw/1e6).toFixed(0)+'MHz':(p.bw/1e3).toFixed(0)+'kHz', ok:bw>=p.bw},
    {name:'CMRR', tVal:t.cmrr+'dB', req:p.cmrr+'dB', ok:t.cmrr>=p.cmrr},
    {name:'Vos', tVal:t.vos+'mV', req:p.vos.toFixed(3)+'mV', ok:t.vos<=p.vos},
    {name:'Zin', tVal:zin>=1e9?'∞':zin>=1e6?(zin/1e6).toFixed(1)+'MΩ':zin>=1e3?(zin/1e3).toFixed(0)+'kΩ':zin.toFixed(0)+'Ω',
     req:p.rs+'Ω src', ok:zin===0||zin>10*p.rs},
    {name:'Differential', tVal:t.differential?'YES':'NO', req:'—', ok:null},
    {name:'Chopper', tVal:t.chopper?'YES':'NO', req:'—', ok:null},
  ];
  const tbody=document.getElementById('prop-tbody');
  tbody.innerHTML='';
  props.forEach(({name,tVal,req,ok})=>{
    const cls=ok===null?'':(ok?'good':'bad');
    const badge=ok===null?'—':(ok?'✓ PASS':'✗ FAIL');
    const badgeClass=ok===null?'':(ok?'good':'bad');
    tbody.innerHTML+=`<tr><td>${name}</td><td class="val ${cls}">${tVal}</td><td>${req}</td><td class="val ${badgeClass}">${badge}</td></tr>`;
  });
}

function drawBW(canvas){
  const W=canvas.offsetWidth*devicePixelRatio,H=canvas.offsetHeight*devicePixelRatio;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const C=getColors();
  const p=getParams();
  const PAD={l:60*devicePixelRatio,r:25*devicePixelRatio,t:15*devicePixelRatio,b:30*devicePixelRatio};
  const pW=W-PAD.l-PAD.r,pH=H-PAD.t-PAD.b;
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);

  const gLo=1,gHi=1000;
  function gX(g){return PAD.l+pW*(Math.log10(g)-Math.log10(gLo))/(Math.log10(gHi)-Math.log10(gLo));}
  const bwLo=1e3,bwHi=GBW;
  function bwY(bw){return PAD.t+pH*(1-(Math.log10(bw)-Math.log10(bwLo))/(Math.log10(bwHi)-Math.log10(bwLo)));}

  [1,2,5,10,20,50,100,200,500,1000].forEach(g=>{
    const x=gX(g);
    ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,H-PAD.b);ctx.stroke();
    ctx.fillStyle=C.text2;ctx.font=`${8*devicePixelRatio}px monospace`;ctx.textAlign='center';
    ctx.fillText(g,x,H-PAD.b+12*devicePixelRatio);
  });
  [1e3,10e3,100e3,1e6,10e6,100e6].forEach(bw=>{
    const y=bwY(bw);
    if(y<PAD.t||y>H-PAD.b)return;
    ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle=C.text2;ctx.font=`${9*devicePixelRatio}px monospace`;ctx.textAlign='right';
    const lbl=bw>=1e6?(bw/1e6).toFixed(0)+'M':(bw/1e3).toFixed(0)+'k';
    ctx.fillText(lbl+'Hz',PAD.l-4,y+3);
  });

  const curves=[
    {t:'inv',  color:C.accent, label:'Inv VFA'},
    {t:'ninv', color:C.green,  label:'Non-Inv'},
    {t:'ina',  color:C.orange, label:'INA'},
    {t:'cfa',  color:C.red,    label:'CFA'},
  ];
  curves.forEach(({t,color,label})=>{
    ctx.strokeStyle=color;ctx.lineWidth=2*devicePixelRatio;
    if(t===topo) ctx.lineWidth=3*devicePixelRatio;
    ctx.beginPath();let first=true;
    for(let i=0;i<=300;i++){
      const g=Math.pow(10,Math.log10(gLo)+(Math.log10(gHi)-Math.log10(gLo))*i/300);
      const bw=topoBW(t,g);
      const x=gX(g),y=bwY(bw);
      if(y<PAD.t-4||y>H-PAD.b+4){first=true;continue;}
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // label
    const gMid=10;
    const bwMid=topoBW(t,gMid);
    if(bwMid>=bwLo&&bwMid<=bwHi){
      ctx.fillStyle=color;ctx.font=`${8*devicePixelRatio}px sans-serif`;ctx.textAlign='left';
      ctx.fillText(label,gX(gMid)+4,bwY(bwMid)-3);
    }
  });

  // Required BW line
  const yReq=bwY(p.bw);
  if(yReq>=PAD.t&&yReq<=H-PAD.b){
    ctx.strokeStyle=C.red;ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(PAD.l,yReq);ctx.lineTo(W-PAD.r,yReq);ctx.stroke();ctx.setLineDash([]);
  }

  // Operating point
  const curBW=topoBW(topo,p.gain);
  if(curBW>=bwLo&&curBW<=bwHi){
    ctx.fillStyle=C.accent;ctx.beginPath();ctx.arc(gX(p.gain),bwY(curBW),6*devicePixelRatio,0,2*Math.PI);ctx.fill();
  }
}

function drawZin(canvas){
  const W=canvas.offsetWidth*devicePixelRatio,H=canvas.offsetHeight*devicePixelRatio;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const C=getColors();
  const p=getParams();
  const PAD={l:60*devicePixelRatio,r:25*devicePixelRatio,t:15*devicePixelRatio,b:30*devicePixelRatio};
  const pW=W-PAD.l-PAD.r,pH=H-PAD.t-PAD.b;
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);

  // Bar chart: input impedance of each topology
  const topos=['inv','ninv','ina','cfa','tia','chop'];
  const colors=[C.accent,C.green,C.orange,C.red,'#9a2ac4','#555'];
  const zins=topos.map(t=>topoInputZ(t,p.gain,p.rs));
  const zMax=1e10;

  function zY(z){return PAD.t+pH*(1-Math.log10(Math.max(z,1))/Math.log10(zMax));}
  [1,100,10e3,1e6,1e9].forEach(z=>{
    const y=zY(z);
    ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle=C.text2;ctx.font=`${9*devicePixelRatio}px monospace`;ctx.textAlign='right';
    const lbl=z>=1e9?'1GΩ':z>=1e6?(z/1e6)+'MΩ':z>=1e3?(z/1e3)+'kΩ':z+'Ω';
    ctx.fillText(lbl,PAD.l-4,y+3);
  });

  // Rs line
  const yRs=zY(p.rs);
  ctx.strokeStyle=C.orange;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(PAD.l,yRs);ctx.lineTo(W-PAD.r,yRs);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=C.orange;ctx.font=`${8*devicePixelRatio}px sans-serif`;ctx.textAlign='left';
  ctx.fillText('Rs (source)',PAD.l+4,yRs-3);

  const barW=pW/(topos.length+1);
  topos.forEach((t,i)=>{
    const z=zins[i];
    const x=PAD.l+barW*(i+0.7);
    const bW=barW*0.6;
    const yTop=zY(Math.min(z,zMax*0.99)),yBot=zY(1);
    const col=colors[i];
    const isSelected=(t===topo);
    ctx.fillStyle=col+(isSelected?'ff':'88');
    ctx.fillRect(x-bW/2,yTop,bW,yBot-yTop);
    if(isSelected){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(x-bW/2,yTop,bW,yBot-yTop);}

    const name=TOPOLOGIES[t].name.split(' ')[0];
    ctx.fillStyle=C.text2;ctx.font=`${8*devicePixelRatio}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(name,x,H-PAD.b+12*devicePixelRatio);
    // Loading verdict
    const ok=z===0||z>10*p.rs;
    ctx.fillStyle=ok?C.green:C.red;ctx.font=`${8*devicePixelRatio}px monospace`;
    ctx.fillText(ok?'OK':'LOAD',x,yTop-4*devicePixelRatio);
  });
}

function updateLabels(){
  const p=getParams();
  function fmtOhm(r){return r>=1e6?(r/1e6).toFixed(1)+'MΩ':r>=1e3?(r/1e3).toFixed(0)+'kΩ':r+'Ω';}
  function fmtHz(f){return f>=1e6?(f/1e6).toFixed(0)+'MHz':f>=1e3?(f/1e3).toFixed(0)+'kHz':f+'Hz';}
  document.getElementById('val-rs').textContent=fmtOhm(p.rs);
  document.getElementById('val-gain').textContent=p.gain+'×';
  document.getElementById('val-bw').textContent=fmtHz(p.bw);
  document.getElementById('val-cmrr').textContent=p.cmrr+'dB';
  document.getElementById('val-vos').textContent=p.vos.toFixed(4)+'mV';
}

function redraw(){
  updateLabels();
  updatePropsTable();
  drawBW(document.getElementById('bw-canvas'));
  drawZin(document.getElementById('zin-canvas'));
}

document.querySelectorAll('[data-topo]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-topo]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    topo=btn.dataset.topo;
    redraw();
  });
});

['sl-rs','sl-gain','sl-bw','sl-cmrr','sl-vos'].forEach(id=>{
  document.getElementById(id).addEventListener('input',redraw);
});

const ro=new ResizeObserver(redraw);
ro.observe(document.getElementById('bw-canvas').parentElement);
ro.observe(document.getElementById('zin-canvas').parentElement);
redraw();
</script>
</body>
</html>
