<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2-FO-3.3.2 — Settling Time</title>
<style>
  :root { --accent: #0066cc; --bg: #1a1a1a; --panel: #242424; --border: #333; --text: #e0e0e0; --muted: #888; }
  @media (prefers-color-scheme: light) { :root { --bg: #f4f4f4; --panel: #fff; --border: #ccc; --text: #1a1a1a; --muted: #555; } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  h1 { font-size: 1.1rem; color: var(--accent); padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .subtitle { font-size: 0.8rem; color: var(--muted); padding: 0 16px 8px; }
  .layout { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; min-width: 230px; flex: 0 0 230px; }
  .ctrl-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input[type=range], select { width: 100%; accent-color: var(--accent); background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px; }
  .val { font-weight: bold; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
  th, td { border: 1px solid var(--border); padding: 4px 6px; text-align: right; }
  th { background: var(--bg); color: var(--muted); }
  tr.highlight td { color: var(--accent); font-weight: bold; }
  canvas { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: block; }
  .canvas-wrap { flex: 1; min-width: 300px; }
</style>
</head>
<body>
<h1>P2-FO-3.3.2 — Settling Time Calculator</h1>
<p class="subtitle">t_s = −τ·ln(ε/100) &nbsp;|&nbsp; n-bit ADC: t_s = 0.693n·τ</p>
<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <label>Time constant τ (µs): <span class="val" id="vTau">10.0</span></label>
      <input type="range" id="sTau" min="1" max="100" step="1" value="10">
    </div>
    <div class="ctrl-group">
      <label>Error band ε (%): <span class="val" id="vEps">1.0</span></label>
      <input type="range" id="sEps" min="0.01" max="5" step="0.01" value="1">
    </div>
    <div class="ctrl-group">
      <label>ADC resolution (bits): <span class="val" id="vBits">12</span></label>
      <input type="range" id="sBits" min="8" max="24" step="1" value="12">
    </div>
    <table id="tbl">
      <tr><th>ε (%)</th><th>t_s</th><th>n×τ</th></tr>
    </table>
  </div>
  <div class="canvas-wrap">
    <canvas id="cv" width="540" height="420"></canvas>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function draw() {
  const tau = parseFloat(document.getElementById('sTau').value);
  const eps = parseFloat(document.getElementById('sEps').value);
  const bits = parseInt(document.getElementById('sBits').value);
  document.getElementById('vTau').textContent = tau.toFixed(1);
  document.getElementById('vEps').textContent = eps.toFixed(2);
  document.getElementById('vBits').textContent = bits;

  const ts = -Math.log(eps / 100) * tau;
  const tsADC = 0.693 * bits * tau;

  // Build table
  const epsList = [5, 2, 1, 0.5, 0.1, 0.01];
  let html = '<tr><th>ε (%)</th><th>t_s (µs)</th><th>÷τ</th></tr>';
  epsList.forEach(e => {
    const t = -Math.log(e / 100) * tau;
    const hl = Math.abs(e - eps) < 0.5 ? ' class="highlight"' : '';
    html += `<tr${hl}><td>${e}</td><td>${t.toFixed(1)}</td><td>${(-Math.log(e/100)).toFixed(2)}</td></tr>`;
  });
  html += `<tr class="highlight"><td>${bits}-bit ADC</td><td>${tsADC.toFixed(1)}</td><td>${(tsADC/tau).toFixed(2)}</td></tr>`;
  document.getElementById('tbl').innerHTML = html;

  const W = cv.width, H = cv.height;
  const padL = 65, padR = 20, padT = 30, padB = 50;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const tMax = Math.max(ts * 1.5, 5 * tau);
  const yMax = 1.1;

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.fillStyle = isDark ? '#242424' : '#fff'; ctx.fillRect(0, 0, W, H);
  const gridC = isDark ? '#2e2e2e' : '#e8e8e8';
  const mutC = isDark ? '#888' : '#555';

  const tx = t => padL + (t / tMax) * plotW;
  const ty = y => padT + (1 - y / yMax) * plotH;

  ctx.strokeStyle = gridC; ctx.lineWidth = 1;
  for (let i = 0; i <= 6; i++) { ctx.beginPath(); ctx.moveTo(tx(i * tMax / 6), padT); ctx.lineTo(tx(i * tMax / 6), padT + plotH); ctx.stroke(); }
  for (let i = 0; i <= 5; i++) { ctx.beginPath(); ctx.moveTo(padL, padT + i * plotH / 5); ctx.lineTo(padL + plotW, padT + i * plotH / 5); ctx.stroke(); }

  ctx.strokeStyle = mutC; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH); ctx.lineTo(padL + plotW, padT + plotH); ctx.stroke();

  // Error band shading
  const bandH = eps / 100;
  ctx.fillStyle = isDark ? 'rgba(0,102,204,0.12)' : 'rgba(0,102,204,0.08)';
  ctx.fillRect(padL, ty(1 + bandH), plotW, ty(1 - bandH) - ty(1 + bandH));

  // y=1 line
  ctx.setLineDash([5, 4]); ctx.strokeStyle = '#0066cc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padL, ty(1)); ctx.lineTo(padL + plotW, ty(1)); ctx.stroke();

  // band edges
  ctx.strokeStyle = '#88bbff'; ctx.lineWidth = 0.8;
  [1 + bandH, 1 - bandH].forEach(yv => {
    ctx.beginPath(); ctx.moveTo(padL, ty(yv)); ctx.lineTo(padL + plotW, ty(yv)); ctx.stroke();
  });

  // ts vertical
  ctx.strokeStyle = '#ff8844'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(tx(ts), padT); ctx.lineTo(tx(ts), padT + plotH); ctx.stroke();
  ctx.setLineDash([]);

  // Curve
  ctx.strokeStyle = '#0066cc'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const t = i / 500 * tMax;
    const y = 1 - Math.exp(-t / tau);
    if (i === 0) ctx.moveTo(tx(t), ty(y)); else ctx.lineTo(tx(t), ty(y));
  }
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#ff8844'; ctx.font = '11px sans-serif';
  ctx.fillText(`t_s(${eps.toFixed(2)}%) = ${ts.toFixed(1)} µs`, tx(ts) + 4, padT + 18);
  ctx.fillStyle = '#0066cc';
  ctx.fillText(`±${eps.toFixed(2)}% band`, padL + plotW - 90, ty(1 + bandH) - 5);

  ctx.fillStyle = mutC; ctx.font = '10px sans-serif';
  for (let i = 0; i <= 6; i++) ctx.fillText((i * tMax / 6).toFixed(0), tx(i * tMax / 6) - 10, padT + plotH + 18);
  ctx.fillText('t (µs)', padL + plotW / 2 - 15, padT + plotH + 36);
  for (let i = 0; i <= 5; i++) ctx.fillText((i / 5).toFixed(1), 2, ty(i / 5) + 4);
}

['sTau','sEps','sBits'].forEach(id => document.getElementById(id).addEventListener('input', draw));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
draw();
</script>
</body>
</html>
