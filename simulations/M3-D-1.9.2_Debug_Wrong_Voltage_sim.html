<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-D-1.9.2 — Debug: Wrong Output Voltage</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#0066cc;--accent2:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
@media(prefers-color-scheme:light){:root{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#24292f;--text2:#656d76;--accent:#0066cc;--accent2:#0969da;--green:#2da44e;--red:#cf222e;--yellow:#9a6700}}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;padding:16px}
h2{color:var(--accent2);font-size:16px;margin-bottom:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
canvas{width:100%;border-radius:6px;background:var(--bg);display:block}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.ctrl{flex:1;min-width:180px}
label{display:block;color:var(--text2);font-size:12px;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--accent)}
.readout{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ro{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;font-family:monospace}
.ro span{color:var(--accent2);font-weight:bold}
.note{color:var(--text2);font-size:12px;margin-top:8px;line-height:1.5}
</style></head>
<body>
<h2>M3-D-1.9.2 — Debug: Wrong Output Voltage</h2>
<div class="panel">
<canvas id="cv" height="260"></canvas>
<div class="controls">
  <div class="ctrl"><label>V_rms (V): <b id="lVrms">18</b></label>
    <input type="range" id="Vrms" min="5" max="50" step="0.5" value="18"></div>
  <div class="ctrl"><label>Topology</label>
    <select id="Topo" style="width:100%;padding:4px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
      <option value="hw_si">Half-wave (Silicon)</option>
      <option value="fw_si">Full-wave/Bridge (Silicon)</option>
      <option value="fw_sch">Full-wave/Bridge (Schottky)</option>
      <option value="hw_ideal">Half-wave (Ideal)</option>
    </select></div>
  <div class="ctrl"><label>"Design" V_DC formula</label>
    <select id="Formula" style="width:100%;padding:4px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
      <option value="fw">Full-wave: 0.636×(Vpk−1.4)</option>
      <option value="hw">Half-wave: 0.318×(Vpk−0.7)</option>
      <option value="wrong">WRONG: using Vpk directly</option>
    </select></div>
</div>
<div class="readout">
  <div class="ro">V_peak: <span id="r1">0.00</span> V</div>
  <div class="ro">Actual V_DC: <span id="r2">0.00</span> V</div>
  <div class="ro">Calculated V_DC: <span id="r3">0.00</span> V</div>
  <div class="ro">Error: <span id="r4">0.00</span> V</div>
</div>
<p class="note">Common cause of wrong output: using the wrong formula or the wrong topology formula. Actual vs expected calculation shows the discrepancy.</p>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;cv.getContext('2d').scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillStyle=color;ctx.font='11px system-ui';
  ctx.fillText(yl,pad+4,pad+12);ctx.fillText(xl,W-pad-2,H-pad-4);
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function draw(){
  const vrms=gs('Vrms');
  document.getElementById('lVrms').textContent=vrms.toFixed(1);
  const topo=document.getElementById('Topo').value;
  const formula=document.getElementById('Formula').value;
  const vpk=vrms*Math.SQRT2;
  let actual=0;
  if(topo==='hw_si')actual=0.318*(vpk-0.7);
  else if(topo==='fw_si')actual=0.636*(vpk-1.4);
  else if(topo==='fw_sch')actual=0.636*(vpk-0.7);
  else actual=0.318*vpk;
  actual=Math.max(0,actual);
  let calc=0;
  if(formula==='fw')calc=0.636*(vpk-1.4);
  else if(formula==='hw')calc=0.318*(vpk-0.7);
  else calc=vpk;
  const err=calc-actual;
  sv('r1',vpk.toFixed(2));sv('r2',actual.toFixed(2));sv('r3',calc.toFixed(2));
  sv('r4',(err>0?'+':'')+err.toFixed(2));

  const W=cv.offsetWidth,H=260,pad=40;
  const bg=isDark()?'#0d1117':'#fff',fg=isDark()?'#8b949e':'#656d76';
  ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Bar chart: V_peak, actual V_DC, calculated V_DC
  const vals=[['V_peak',vpk,'#58a6ff'],['Actual V_DC',actual,'#3fb950'],['Calculated',calc,Math.abs(err)<0.5?'#3fb950':'#f85149']];
  const bw=(W-2*pad)/vals.length-20;
  const maxV=Math.max(vpk,calc)*1.1;
  vals.forEach(([name,val,color],i)=>{
    const bh=(H-2*pad)*val/maxV;
    const bx=pad+i*(bw+20);
    ctx.fillStyle=color;ctx.fillRect(bx,H-pad-bh,bw,bh);
    ctx.fillStyle=fg;ctx.font='11px system-ui';
    ctx.fillText(name,bx+2,H-pad+14);
    ctx.fillText(val.toFixed(1)+'V',bx+2,H-pad-bh-4);
  });
  ctx.fillStyle=Math.abs(err)<0.5?'#3fb950':'#f85149';ctx.font='12px system-ui';
  ctx.fillText('Error: '+(err>0?'+':'')+err.toFixed(2)+'V ('+(err/actual*100).toFixed(0)+'%)',pad,pad+15);
}
document.querySelectorAll('input[type=range],select').forEach(e=>e.addEventListener('input',draw));
window.addEventListener('resize',()=>resize(cv,draw));
resize(cv,draw);
</script>
</body></html>
