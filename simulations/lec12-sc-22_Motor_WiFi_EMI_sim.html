<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenario 22 — BLDC Motor vs WiFi EMI</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666;}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto;}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px;}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
  h1{font-size:18px;margin:4px 0;}
  .layout{display:grid;grid-template-columns:1fr 280px;gap:16px;}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%;}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;}
  .ctrl-group{margin-bottom:12px;}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:flex;justify-content:space-between;}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace;}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
  .result-box{background:rgba(0,102,204,0.08);border:1px solid rgba(0,102,204,0.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.5;}
  @media(max-width:600px){.layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 22</div>
  <h1>BLDC Motor vs WiFi — Conducted EMI Spectrum</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">PWM Frequency (kHz) <span class="ctrl-value" id="p1-val">20</span></div>
      <input type="range" id="p1" min="5" max="100" value="20">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Pi Filter on Motor <span class="ctrl-value" id="p2-val">No</span></div>
      <input type="range" id="p2" min="0" max="1" step="1" value="0">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Power Isolator <span class="ctrl-value" id="p3-val">No</span></div>
      <input type="range" id="p3" min="0" max="1" step="1" value="0">
    </div>
    <div class="result-box" id="result">Adjust mitigation</div>
  </div>
</div>
<script>
const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;}
function draw(){
  const fpwm=+document.getElementById('p1').value*1e3;
  const piFilter=+document.getElementById('p2').value;
  const isolator=+document.getElementById('p3').value;
  document.getElementById('p1-val').textContent=(fpwm/1e3).toFixed(0)+' kHz';
  document.getElementById('p2-val').textContent=piFilter?'Yes':'No';
  document.getElementById('p3-val').textContent=isolator?'Yes':'No';

  canvas.width=canvas.parentElement.getBoundingClientRect().width||600;
  canvas.height=380;
  const W=canvas.width,H=canvas.height;
  const dark=isDark();
  const bg=dark?'#2a2a2a':'#f5f5f5';
  const fg=dark?'#e8e8e8':'#1a1a1a';
  const ac=dark?'#4499ff':'#0066cc';
  const gr=dark?'#444':'#ddd';
  const red='#e53935',grn='#43a047',orange='#ff9800';

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=fg;ctx.font='bold 13px system-ui';ctx.textAlign='center';
  ctx.fillText('Conducted EMI Spectrum — Motor PWM Harmonics',W/2,22);

  const mx=65,my=40,mw=W-85,mh=H-100;
  const fMin=1e3,fMax=3e9;
  const logMin=Math.log10(fMin),logMax=Math.log10(fMax);
  const dBMin=-100,dBMax=0;

  ctx.strokeStyle=gr;ctx.lineWidth=1;
  [-20,-40,-60,-80,-100].forEach(db=>{
    const y=my+mh*(1-(db-dBMin)/(dBMax-dBMin));
    ctx.beginPath();ctx.moveTo(mx,y);ctx.lineTo(mx+mw,y);ctx.stroke();
    ctx.fillStyle=fg;ctx.font='10px system-ui';ctx.textAlign='right';
    ctx.fillText(db+'dB',mx-3,y+4);
  });
  [1e3,10e3,100e3,1e6,10e6,100e6,1e9,3e9].forEach(f=>{
    const x=mx+mw*(Math.log10(f)-logMin)/(logMax-logMin);
    ctx.beginPath();ctx.moveTo(x,my);ctx.lineTo(x,my+mh);ctx.stroke();
    ctx.fillStyle=fg;ctx.font='9px system-ui';ctx.textAlign='center';
    const l=f>=1e9?(f/1e9).toFixed(0)+'G':f>=1e6?(f/1e6).toFixed(0)+'M':f>=1e3?(f/1e3).toFixed(0)+'k':'';
    ctx.fillText(l+'Hz',x,my+mh+14);
  });

  // WiFi at 2.4GHz
  const xWifi=mx+mw*(Math.log10(2.4e9)-logMin)/(logMax-logMin);
  ctx.strokeStyle=ac;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(xWifi,my);ctx.lineTo(xWifi,my+mh);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=ac;ctx.font='10px system-ui';ctx.textAlign='center';
  ctx.fillText('WiFi 2.4GHz',xWifi,my-4);

  // Sensitivity threshold
  const dBsens=-80;
  const ySens=my+mh*(1-(dBsens-dBMin)/(dBMax-dBMin));
  ctx.strokeStyle=red;ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(mx,ySens);ctx.lineTo(mx+mw,ySens);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=red;ctx.font='9px system-ui';ctx.textAlign='right';
  ctx.fillText('WiFi sensitivity',mx+mw,ySens-3);

  // Draw harmonic spikes
  const drawHarmonics=(f0,baseLevel,filterFactor,isoFactor,color)=>{
    // Envelope of harmonics decreasing with frequency
    ctx.fillStyle=color;
    for(let n=1;n<=2000;n++){
      const f=f0*n;
      if(f>fMax)break;
      const logf=Math.log10(f);
      if(logf<logMin||logf>logMax)continue;
      // Harmonic amplitude: decreasing with 20dB/decade
      const envDb=baseLevel-20*Math.log10(n)-filterFactor*20*Math.max(0,(logf-3))-isoFactor*10;
      const db=Math.max(dBMin,Math.min(dBMax,envDb));
      const x=mx+mw*(logf-logMin)/(logMax-logMin);
      const y=my+mh*(1-(db-dBMin)/(dBMax-dBMin));
      const h=my+mh-y;
      if(h>0&&h<mh)ctx.fillRect(Math.max(mx,x-1),y,2,h);
    }
  };

  const filter_factor=piFilter?2:0;
  const iso_factor=isolator?2:0;
  drawHarmonics(fpwm,-5,filter_factor,iso_factor,red);

  ctx.strokeStyle=fg;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx,my+mh);ctx.lineTo(mx+mw,my+mh);ctx.stroke();

  // Check WiFi band interference
  const wifiHarmonic=Math.round(2.4e9/fpwm);
  const envAtWifi=-5-20*Math.log10(wifiHarmonic)-filter_factor*20*Math.max(0,Math.log10(2.4e9/1e3)-3)-iso_factor*10;
  const interferes=envAtWifi>dBsens;

  document.getElementById('result').innerHTML=
    `<b>PWM fundamental: ${(fpwm/1e3).toFixed(0)} kHz</b><br>`+
    `Harmonic near 2.4GHz: N=${wifiHarmonic}<br>`+
    `Level at WiFi band: ${envAtWifi.toFixed(0)} dB<br>`+
    `WiFi sensitivity: ${dBsens} dB<br>`+
    (interferes?`<span style="color:red">⚠ WiFi interference likely — add Pi filter + power isolator</span>`:
     `<span style="color:green">✓ WiFi band clean</span>`);
}
['p1','p2','p3'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>draw());
draw();
</script>
</body>
</html>
