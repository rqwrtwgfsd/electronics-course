<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2-SO-4.3.1 — Underdamped Response</title>
<style>
  :root { --accent: #0066cc; --bg: #1a1a1a; --panel: #242424; --border: #333; --text: #e0e0e0; --muted: #888; }
  @media (prefers-color-scheme: light) { :root { --bg: #f4f4f4; --panel: #fff; --border: #ccc; --text: #1a1a1a; --muted: #555; } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  h1 { font-size: 1.1rem; color: var(--accent); padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .subtitle { font-size: 0.8rem; color: var(--muted); padding: 0 16px 8px; }
  .layout { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; min-width: 230px; flex: 0 0 230px; }
  .ctrl-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .val { font-weight: bold; color: var(--accent); }
  .readout { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 7px; }
  .card-label { font-size: 0.68rem; color: var(--muted); }
  .card-val { font-size: 0.88rem; font-weight: bold; color: var(--accent); }
  canvas { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: block; }
  .canvas-wrap { flex: 1; min-width: 300px; }
</style>
</head>
<body>
<h1>P2-SO-4.3.1 — Underdamped Step Response</h1>
<p class="subtitle">OS% = 100·e^(−πζ/√(1−ζ²)) &nbsp;|&nbsp; t_p = π/ω_d &nbsp;|&nbsp; ζ: 0.05 – 0.99</p>
<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <label>Damping ratio ζ: <span class="val" id="vZeta">0.30</span></label>
      <input type="range" id="sZeta" min="0.05" max="0.99" step="0.01" value="0.3">
    </div>
    <div class="ctrl-group">
      <label>Natural frequency ω₀ (Mrad/s): <span class="val" id="vO0">10.0</span></label>
      <input type="range" id="sO0" min="1" max="100" step="1" value="10">
    </div>
    <div class="readout">
      <div class="card"><div class="card-label">Overshoot OS%</div><div class="card-val" id="rOS">37.2%</div></div>
      <div class="card"><div class="card-label">Peak time t_p</div><div class="card-val" id="rTp">328 ns</div></div>
      <div class="card"><div class="card-label">ω_d (Mrad/s)</div><div class="card-val" id="rOd">9.54</div></div>
      <div class="card"><div class="card-label">α = ζω₀</div><div class="card-val" id="rAlpha">3.0 Mrad/s</div></div>
      <div class="card"><div class="card-label">Peak value</div><div class="card-val" id="rPeak">1.372</div></div>
      <div class="card"><div class="card-label">τ_decay</div><div class="card-val" id="rTd">333 ns</div></div>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas id="cv" width="560" height="440"></canvas>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');

function draw() {
  const zeta=parseFloat(document.getElementById('sZeta').value);
  const omega0=parseFloat(document.getElementById('sO0').value)*1e6;
  document.getElementById('vZeta').textContent=zeta.toFixed(2);
  document.getElementById('vO0').textContent=(omega0/1e6).toFixed(1);

  const alpha=zeta*omega0;
  const od=omega0*Math.sqrt(1-zeta*zeta);
  const OS=100*Math.exp(-Math.PI*zeta/Math.sqrt(1-zeta*zeta));
  const tp=Math.PI/od;
  const peak=1+OS/100;
  const td=1/alpha;

  document.getElementById('rOS').textContent=OS.toFixed(1)+'%';
  document.getElementById('rTp').textContent=(tp*1e9).toFixed(0)+' ns';
  document.getElementById('rOd').textContent=(od/1e6).toFixed(2);
  document.getElementById('rAlpha').textContent=(alpha/1e6).toFixed(2)+' Mrad/s';
  document.getElementById('rPeak').textContent=peak.toFixed(3);
  document.getElementById('rTd').textContent=(td*1e9).toFixed(0)+' ns';

  const W=cv.width,H=cv.height,padL=60,padR=20,padT=35,padB=55,plotW=W-padL-padR,plotH=H-padT-padB;
  const tMax=Math.max(5*tp,5*td);
  const yMax=peak*1.05;

  const isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.fillStyle=isDark?'#242424':'#fff';ctx.fillRect(0,0,W,H);
  const gridC=isDark?'#2e2e2e':'#e8e8e8';
  const mutC=isDark?'#888':'#555';
  const tx=t=>padL+(t/tMax)*plotW;
  const ty=y=>padT+(1-y/yMax)*plotH;

  ctx.strokeStyle=gridC;ctx.lineWidth=1;
  for(let i=0;i<=6;i++){ctx.beginPath();ctx.moveTo(tx(i*tMax/6),padT);ctx.lineTo(tx(i*tMax/6),padT+plotH);ctx.stroke();}
  for(let i=0;i<=5;i++){ctx.beginPath();ctx.moveTo(padL,padT+i*plotH/5);ctx.lineTo(padL+plotW,padT+i*plotH/5);ctx.stroke();}

  // y(∞) line
  ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(100,150,255,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,ty(1));ctx.lineTo(padL+plotW,ty(1));ctx.stroke();ctx.setLineDash([]);

  // Exponential envelope (upper)
  ctx.strokeStyle='rgba(255,136,68,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();
  for(let i=0;i<=300;i++){const t=i/300*tMax;const e=1+Math.exp(-alpha*t)/Math.sqrt(1-zeta*zeta);if(i===0)ctx.moveTo(tx(t),ty(e));else ctx.lineTo(tx(t),ty(e));}
  ctx.stroke();
  ctx.beginPath();
  for(let i=0;i<=300;i++){const t=i/300*tMax;const e=1-Math.exp(-alpha*t)/Math.sqrt(1-zeta*zeta);if(i===0)ctx.moveTo(tx(t),ty(e));else ctx.lineTo(tx(t),ty(e));}
  ctx.stroke();ctx.setLineDash([]);

  // Main curve
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2.5;ctx.beginPath();
  for(let i=0;i<=600;i++){
    const t=i/600*tMax;
    const y=1-Math.exp(-alpha*t)*(Math.cos(od*t)+(alpha/od)*Math.sin(od*t));
    if(i===0)ctx.moveTo(tx(t),ty(y));else ctx.lineTo(tx(t),ty(y));
  }
  ctx.stroke();

  // Peak dot and annotation
  ctx.fillStyle='#ff8844';ctx.beginPath();ctx.arc(tx(tp),ty(peak),6,0,Math.PI*2);ctx.fill();
  ctx.setLineDash([3,3]);ctx.strokeStyle='#ff8844';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(tx(tp),padT);ctx.lineTo(tx(tp),ty(peak));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ff8844';ctx.font='10px sans-serif';
  ctx.fillText(`OS=${OS.toFixed(1)}%`,tx(tp)+4,ty(peak)-5);
  ctx.fillText(`t_p=${(tp*1e9).toFixed(0)}ns`,tx(tp)+4,ty(peak)+10);

  // OS bracket
  ctx.strokeStyle='#ffaa00';ctx.lineWidth=1.5;
  const xB=tx(tp)+50;
  ctx.beginPath();ctx.moveTo(xB,ty(1));ctx.lineTo(xB,ty(peak));ctx.stroke();
  ctx.fillStyle='#ffaa00';ctx.font='10px sans-serif';
  ctx.fillText(`${OS.toFixed(1)}%`,xB+3,ty(1)-(ty(1)-ty(peak))/2);

  ctx.fillStyle='#0066cc';ctx.font='bold 11px sans-serif';
  ctx.fillText(`ζ=${zeta.toFixed(2)}, OS=${OS.toFixed(1)}%`,padL+4,padT-10);

  ctx.fillStyle=mutC;ctx.font='10px sans-serif';
  for(let i=0;i<=6;i++)ctx.fillText((i*tMax/6*1e9).toFixed(0)+'n',tx(i*tMax/6)-12,padT+plotH+18);
  ctx.fillText('t',padL+plotW/2,padT+plotH+36);
  for(let i=0;i<=5;i++)ctx.fillText((i*yMax/5).toFixed(2),4,ty(i*yMax/5)+4);
}

['sZeta','sO0'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',draw);
draw();
</script>
</body>
</html>
