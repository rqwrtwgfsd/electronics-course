<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Button Debounce</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 11 | Scenario 3</div>
  <h1>RC Button Debounce: Contact Bounce Smoothing</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">R (kΩ) <span class="ctrl-value" id="lbl-r">10 kΩ</span></div>
      <input type="range" id="sl-r" min="1" max="100" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">C (µF) <span class="ctrl-value" id="lbl-c">1.0 µF</span></div>
      <input type="range" id="sl-c" min="0.1" max="10" value="1" step="0.1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Bounce Duration (ms) <span class="ctrl-value" id="lbl-b">5 ms</span></div>
      <input type="range" id="sl-b" min="1" max="20" value="5" step="1">
    </div>
    <div class="result-box" id="result">Adjust to see debounce behavior</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slR=document.getElementById('sl-r'),slC=document.getElementById('sl-c'),slB=document.getElementById('sl-b');
const lblR=document.getElementById('lbl-r'),lblC=document.getElementById('lbl-c'),lblB=document.getElementById('lbl-b');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const R=parseFloat(slR.value)*1e3;
  const C=parseFloat(slC.value)*1e-6;
  const bounceDur=parseFloat(slB.value)*1e-3;
  const tau=R*C;
  lblR.textContent=slR.value+' kΩ';
  lblC.textContent=parseFloat(slC.value).toFixed(1)+' µF';
  lblB.textContent=slB.value+' ms';
  ctx.clearRect(0,0,W,H);
  const tTotal=0.06; // 60ms window
  const pad=44,plotW=W-pad*2,plotH=H-pad-60;
  // Two traces: raw bouncing signal (top half) and filtered (bottom half)
  const midY=pad+plotH/2+10;
  const VCC=3.3,thresh=1.65;
  // Draw axes
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,midY-10);ctx.lineTo(W-pad,midY-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad,midY+10);ctx.lineTo(pad,H-30);ctx.lineTo(W-pad,H-30);ctx.stroke();
  // Labels
  ctx.fillStyle='var(--muted,#666)';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('Raw bouncing signal',pad+4,pad+12);
  ctx.fillText('After RC filter (τ='+( tau*1000).toFixed(1)+'ms)',pad+4,midY+22);
  // Generate bounce events
  const bounces=[];
  bounces.push({t:0.005,rising:true});
  // add bounce sub-events
  for(let i=0;i<6;i++)bounces.push({t:0.005+bounceDur*((i+1)/(7)),rising:(i%2===0)?false:true});
  bounces.push({t:0.005+bounceDur*1.1,rising:true}); // final settled HIGH
  // Raw signal
  function rawV(t){
    let state=0;
    for(const b of bounces){if(t>=b.t)state=b.rising?VCC:0;}
    return state;
  }
  // Draw raw
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.beginPath();
  function rawYpx(v){return (midY-10)-((plotH/2-10)*(v/VCC))}
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const v=rawV(t);
    const yp=rawYpx(v);
    px===0?ctx.moveTo(pad+px,yp):ctx.lineTo(pad+px,yp);
  }ctx.stroke();
  // Draw RC filtered
  ctx.strokeStyle='#2e7d32';ctx.lineWidth=2;ctx.beginPath();
  function filtYpx(v){return (H-30)-((H-30-(midY+10))*(v/VCC))}
  let vCap=0;
  const dt=tTotal/plotW;
  for(let px=0;px<=plotW;px++){
    const t=(px/plotW)*tTotal;
    const vIn=rawV(t);
    vCap+=(vIn-vCap)*dt/tau;
    vCap=Math.max(0,Math.min(VCC,vCap));
    const yp=filtYpx(vCap);
    px===0?ctx.moveTo(pad+px,yp):ctx.lineTo(pad+px,yp);
  }ctx.stroke();
  // threshold on filtered
  ctx.setLineDash([4,3]);ctx.strokeStyle='#f57c00';ctx.lineWidth=1;
  const ty=filtYpx(thresh);
  ctx.beginPath();ctx.moveTo(pad,ty);ctx.lineTo(W-pad,ty);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f57c00';ctx.font='10px system-ui';ctx.fillText('Logic thresh 1.65V',W-pad-100,ty-3);
  // time labels
  ctx.fillStyle='#888';ctx.textAlign='center';ctx.font='10px system-ui';
  [0,10,20,30,40,50,60].forEach(ms=>{const xp=pad+(ms/60)*plotW;ctx.fillText(ms+'ms',xp,H-14)});
  const effective=tau>=bounceDur;
  result.innerHTML='<b>τ = RC = '+(tau*1000).toFixed(1)+'ms</b><br>Bounce duration: <b>'+slB.value+'ms</b><br>τ > bounce? <b>'+(effective?'YES ✅':'NO ⚠️')+'</b><br>'+(effective?'Bounces smoothed out — MCU sees clean edge':'τ too short — bounces still visible')+'<br><b>Rule:</b> τ must be 2–5× the bounce duration';
}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slR,slC,slB].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
