<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>P2-OP-7.2.1 Adjust RC Values</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Courier New',monospace;font-size:13px}
h1{color:#0066cc;padding:12px 16px;border-bottom:1px solid #0066cc;font-size:15px}
.top{display:flex;gap:10px;padding:10px}
canvas{background:#0a0a1a;border:1px solid #333}
.panel{background:#12122a;border:1px solid #2a2a4a;border-radius:4px;padding:12px;min-width:230px}
.panel h2{color:#0066cc;font-size:12px;margin-bottom:8px;text-transform:uppercase}
label{display:block;margin-top:8px;color:#aaa;font-size:11px}
input[type=range]{width:100%;accent-color:#0066cc;margin-top:3px}
input[type=number]{width:100%;background:#0a0a1a;border:1px solid #0066cc;color:#e0e0e0;padding:4px;font-family:inherit;margin-top:3px;border-radius:2px}
.readout{color:#00ff88;font-size:12px;margin-top:3px}
.warn{color:#ff4444;font-size:11px;margin-top:4px}
.ok{color:#00ff88;font-size:11px;margin-top:4px}
.e_row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.e_chip{padding:3px 6px;background:#1a1a3a;border:1px solid #334;color:#aaa;font-size:10px;border-radius:2px;cursor:pointer}
.e_chip.sel{background:#003366;border-color:#0066cc;color:#00aaff}
.formula{color:#ffaa00;font-size:11px;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<h1>P2-OP-7.2.1 — E12/E24 Value Selection for Target τ or f_c</h1>
<div class="top">
<canvas id="cv" width="540" height="360"></canvas>
<div class="panel">
<h2>Target</h2>
<label>Target τ (μs)
<input type="number" id="tau_target" value="1000" min="1" max="1000000" step="10">
</label>
<div style="font-size:11px;color:#888;margin-top:4px">→ f_c = <span id="fc_target">—</span></div>
<label>Fix C at (nF)
<input type="number" id="c_fixed" value="100" min="1" max="100000" step="1">
</label>
<button onclick="calculate()" style="margin-top:8px;padding:6px;background:#0066cc;border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:11px;border-radius:3px;width:100%">Find E-Series Values</button>
<h2 style="margin-top:10px">Ideal R</h2>
<div class="readout" id="r_ideal">R_ideal = —</div>
<h2 style="margin-top:6px">E12 Options</h2>
<div class="e_row" id="e12_row"></div>
<h2 style="margin-top:8px">E24 Options</h2>
<div class="e_row" id="e24_row"></div>
<h2 style="margin-top:8px">Selected</h2>
<div class="readout" id="sel_tau">τ = —</div>
<div class="readout" id="sel_err">Error: —</div>
<div id="tol_msg" class="ok"></div>
<div class="formula">R = τ / C<br>E24: max 5% from ideal<br>E12: max 10% from ideal</div>
</div>
</div>
<script>
const E12=[1.0,1.2,1.5,1.8,2.2,2.7,3.3,3.9,4.7,5.6,6.8,8.2];
const E24=[1.0,1.1,1.2,1.3,1.5,1.6,1.8,2.0,2.2,2.4,2.7,3.0,3.3,3.6,3.9,4.3,4.7,5.1,5.6,6.2,6.8,7.5,8.2,9.1];
let sel_R=null,sel_series='',tau_target=1000,c_fixed=100;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const W=540,H=360,PAD={l:60,r:20,t:30,b:40};
const CW=W-PAD.l-PAD.r,CH=H-PAD.t-PAD.b;

function expandSeries(base){
  const vals=[];
  for(let dec=0;dec<=6;dec++){
    base.forEach(v=>vals.push(v*Math.pow(10,dec)));
  }
  return vals;
}

function calculate(){
  tau_target=parseFloat(document.getElementById('tau_target').value)||1000;
  c_fixed=parseFloat(document.getElementById('c_fixed').value)||100;
  const fc=(1e6/(2*Math.PI*tau_target)).toFixed(0);
  document.getElementById('fc_target').textContent=fc+' Hz';
  const r_ideal=tau_target*1000/(c_fixed); // kΩ (τ in μs, C in nF: R = τ[μs]/(C[nF]) = Ω, /1000 = kΩ)
  // Actually: R[Ω] = τ[s]/C[F] = τ[μs]*1e-6 / (C[nF]*1e-9) = τ[μs]/C[nF] * 1000 [Ω] = τ/C kΩ
  const r_ideal_kOhm=tau_target/c_fixed; // kΩ
  document.getElementById('r_ideal').textContent='R_ideal = '+r_ideal_kOhm.toFixed(3)+' kΩ';
  // Find nearest E12 values
  const allE12=expandSeries(E12);const allE24=expandSeries(E24);
  function nearest5(arr,target){
    return arr.map(v=>({v,err:Math.abs(v-target)/target*100})).sort((a,b)=>a.err-b.err).slice(0,5);}
  const near12=nearest5(allE12,r_ideal_kOhm);
  const near24=nearest5(allE24,r_ideal_kOhm);
  const mkChip=(row,items,series)=>{
    const el=document.getElementById(row);el.innerHTML='';
    items.forEach(({v,err})=>{
      const d=document.createElement('span');d.className='e_chip';
      d.textContent=v>=1?v.toFixed(1)+'k':(v*1000).toFixed(0)+'Ω';
      d.title='Error: '+err.toFixed(1)+'%';
      d.onclick=()=>{sel_R=v;sel_series=series;el.querySelectorAll('.e_chip').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');updateSelected();drawComp();};
      el.appendChild(d);
    });
  };
  mkChip('e12_row',near12,'E12');mkChip('e24_row',near24,'E24');
  if(!sel_R){sel_R=near24[0].v;sel_series='E24';}
  updateSelected();drawComp();
}

function updateSelected(){
  if(!sel_R)return;
  const tau_actual=sel_R*c_fixed; // μs
  const err=(tau_actual-tau_target)/tau_target*100;
  document.getElementById('sel_tau').textContent='τ = '+tau_actual.toFixed(2)+' μs (R='+sel_R.toFixed(2)+'kΩ)';
  document.getElementById('sel_err').textContent='Error: '+err.toFixed(2)+'%';
  const m=document.getElementById('tol_msg');
  if(Math.abs(err)<2){m.className='ok';m.textContent='Excellent match (<2%)';}
  else if(Math.abs(err)<5){m.className='ok';m.textContent='Good match (<5%)';}
  else{m.className='warn';m.textContent='>5% error — try adjacent E-series value';}
}

function drawComp(){
  ctx.clearRect(0,0,W,H);
  const tau_nom=tau_target;const tau_sel=sel_R?sel_R*c_fixed:tau_nom;
  const tmax=Math.max(tau_nom,tau_sel)*7;
  const Vin=5;
  function toPx(t,v){return[PAD.l+CW*(t/tmax),PAD.t+CH*(1-v/(Vin*1.1))];}
  ctx.strokeStyle='#1a1a3a';ctx.lineWidth=1;
  for(let i=0;i<=7;i++){const x=PAD.l+CW*(i/7);ctx.beginPath();ctx.moveTo(x,PAD.t);ctx.lineTo(x,PAD.t+CH);ctx.stroke();}
  for(let i=0;i<=5;i++){const y=PAD.t+CH*(i/5);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+CW,y);ctx.stroke();}
  ctx.strokeStyle='#555';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+CH);ctx.moveTo(PAD.l,PAD.t+CH);ctx.lineTo(PAD.l+CW,PAD.t+CH);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='10px Courier New';ctx.textAlign='center';
  for(let i=0;i<=7;i++){const t=tmax*i/7;ctx.fillText(t.toFixed(0)+'μs',PAD.l+CW*(i/7),PAD.t+CH+14);}
  ctx.textAlign='right';
  for(let i=0;i<=5;i++){const v=Vin*1.1*(1-i/5);ctx.fillText(v.toFixed(1)+'V',PAD.l-4,PAD.t+CH*(i/5)+4);}
  // Target
  ctx.strokeStyle='#0066cc';ctx.lineWidth=2;ctx.setLineDash([4,3]);
  ctx.beginPath();for(let i=0;i<=400;i++){const t=tmax*i/400;const v=Vin*(1-Math.exp(-t/tau_nom));const[x,y]=toPx(t,v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#0066cc';ctx.font='11px Courier New';ctx.textAlign='left';ctx.fillText('Target τ='+tau_nom.toFixed(0)+'μs',PAD.l+4,PAD.t+14);
  // Selected
  ctx.strokeStyle='#00ff88';ctx.lineWidth=2.5;
  ctx.beginPath();for(let i=0;i<=400;i++){const t=tmax*i/400;const v=Vin*(1-Math.exp(-t/tau_sel));const[x,y]=toPx(t,v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
  ctx.fillStyle='#00ff88';ctx.font='11px Courier New';ctx.fillText('E-series τ='+tau_sel.toFixed(1)+'μs (R='+sel_R.toFixed(2)+'kΩ)',PAD.l+4,PAD.t+28);
}
calculate();
</script>
</body>
</html>
