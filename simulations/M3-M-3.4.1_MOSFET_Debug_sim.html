<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-M-3.4.1 MOSFET Debug</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-M-3.4.1 — MOSFET Switch Debug: Power Loss Diagnosis</h1>
<p class="note">Diagnose MOSFET overheating. Adjust V_GS (drive) and switching speed to see where loss comes from.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>V_GS drive (V): <span id="vgsv">10</span></label><input type="range" id="vgs" min="1" max="15" value="10" step="0.1" oninput="sv('vgsv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_gate (Ω): <span id="rgv">100</span></label><input type="range" id="rg" min="1" max="10000" value="100" step="1" oninput="sv('rgv',this.value);draw();"></div>
  <div class="ctrl"><label>I_load (A): <span id="ilv">5</span></label><input type="range" id="il" min="0.1" max="20" value="5" step="0.1" oninput="sv('ilv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>f_sw (kHz): <span id="fv">200</span></label><input type="range" id="fsw" min="1" max="2000" value="200" step="1" oninput="sv('fv',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">R_on actual: <span id="ron">0</span> mΩ</div>
  <div class="ro">t_sw: <span id="tsw">0</span> ns</div>
  <div class="ro">P_cond: <span id="pc">0</span> W</div>
  <div class="ro">P_sw: <span id="ps">0</span> W</div>
  <div class="ro">Dominant: <span id="dom">-</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const VDS=24, QG=30e-9, RON_10V=50e-3;
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const VGS=gs('vgs');
  const RG=gs('rg');
  const IL=gs('il');
  const FSW=gs('fsw')*1000;

  // R_on degrades with lower V_GS (rough model: R_on ∝ 1/(VGS-VT)²)
  const VT=2, VGS_ref=10;
  const VT_overdrive_ref=VGS_ref-VT;
  const VT_overdrive_actual=Math.max(0.1,VGS-VT);
  const RON_actual=RON_10V*(VT_overdrive_ref/VT_overdrive_actual)*(VT_overdrive_ref/VT_overdrive_actual);

  const t_sw=2*QG/(VGS/RG); // switching time
  const Pc=IL*IL*RON_actual*0.5; // D=0.5
  const Ps=0.5*VDS*IL*t_sw*FSW;
  const Ptot=Pc+Ps;
  const dom=Pc>Ps?'Conduction':'Switching';

  sv('ron',(RON_actual*1000).toFixed(1));
  sv('tsw',(t_sw*1e9).toFixed(1));
  sv('pc',Pc.toFixed(2));
  sv('ps',Ps.toFixed(2));
  sv('dom',dom);

  // Plot P_cond and P_sw vs frequency
  const fmax=2000e3;
  const xsc=(W-2*pad)/fmax, pmax=Math.max(Ptot*2, 5);
  const ysc=(H-2*pad)/pmax;

  drawAxes(ctx,W,H,pad,'f_sw (kHz)','Loss (W)',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let f=0;f<=fmax;f+=500e3){
    ctx.fillText(f/1000,pad+f*xsc-10,H-pad+13*dpr);
  }
  for(let p=0;p<=pmax;p+=pmax/5){
    ctx.fillText(p.toFixed(1),pad-25*dpr,H-pad-p*ysc+4);
  }

  // P_cond line (constant vs frequency)
  ctx.strokeStyle=acc; ctx.lineWidth=2*dpr;
  ctx.beginPath(); ctx.moveTo(pad,H-pad-Pc*ysc); ctx.lineTo(W-pad,H-pad-Pc*ysc); ctx.stroke();

  // P_sw line (linear vs frequency)
  ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2*dpr; ctx.beginPath();
  for(let f=1e3;f<=fmax;f+=10e3){
    const ps2=0.5*VDS*IL*t_sw*f;
    const x=pad+f*xsc; const y=H-pad-Math.min(ps2,pmax)*ysc;
    if(f===1e3) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Current frequency marker
  const fx=pad+FSW*xsc;
  ctx.strokeStyle='#ffa502'; ctx.lineWidth=1.5*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath(); ctx.moveTo(fx,pad); ctx.lineTo(fx,H-pad); ctx.stroke(); ctx.setLineDash([]);

  ctx.fillStyle=acc; ctx.font=`${9*dpr}px system-ui`;
  ctx.fillText('P_cond',pad+5*dpr,H-pad-Pc*ysc-5*dpr);
  ctx.fillStyle='#ff6b6b';
  ctx.fillText('P_sw',pad+5*dpr,pad+12*dpr);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`R_on=${(RON_actual*1000).toFixed(0)}mΩ  t_sw=${(t_sw*1e9).toFixed(0)}ns  P_cond=${Pc.toFixed(2)}W  P_sw=${Ps.toFixed(2)}W`,pad,pad-8*dpr);
}
draw();
</script></body></html>
