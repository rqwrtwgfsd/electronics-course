<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-M-3.2.1 MOSFET CS Amplifier</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-M-3.2.1 — Common-Source MOSFET Amplifier: Gain vs Bias</h1>
<p class="note">Adjust drain current and RD to change voltage gain. Compare with/without source bypass.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>I_D (mA): <span id="idv">1</span></label><input type="range" id="id" min="0.1" max="10" value="1" step="0.1" oninput="sv('idv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_D (kΩ): <span id="rdv">10</span></label><input type="range" id="rd" min="0.5" max="50" value="10" step="0.5" oninput="sv('rdv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_S (kΩ): <span id="rsv">1</span></label><input type="range" id="rs" min="0" max="5" value="1" step="0.1" oninput="sv('rsv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>V_overdrive (V): <span id="vodv">0.5</span></label><input type="range" id="vod" min="0.1" max="3" value="0.5" step="0.05" oninput="sv('vodv',parseFloat(this.value).toFixed(2));draw();"></div>
</div>
<div class="readouts">
  <div class="ro">g_m: <span id="gm">0</span> mA/V</div>
  <div class="ro">A_v (bypass): <span id="av_by">0</span></div>
  <div class="ro">A_v (no bypass): <span id="av_no">0</span></div>
  <div class="ro">Z_in: <span id="zin">∞</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const VDD=15;
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=50*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const ID=gs('id')/1000; // A
  const RD=gs('rd')*1000;
  const RS=gs('rs')*1000;
  const VOD=gs('vod');

  const gm=2*ID/VOD; // mA/V
  const Av_by=-gm*RD;
  const Av_no=-gm*RD/(1+gm*RS);

  sv('gm',(gm*1000).toFixed(2));
  sv('av_by',Av_by.toFixed(1));
  sv('av_no',Av_no.toFixed(2));
  sv('zin','R1||R2 (MΩ range)');

  // Plot: gain vs I_D for both configurations
  const idmax=10e-3;
  const npts=200;
  const xsc=(W-2*pad)/idmax, avmax=200;
  const ysc=(H-2*pad)/avmax;

  drawAxes(ctx,W,H,pad,'I_D (mA)','|A_v|',fg);
  ctx.font=`${10*dpr}px system-ui`; ctx.fillStyle=fg;
  for(let i=0;i<=10;i+=2){ ctx.fillText(i,pad+i/1000*xsc-5,H-pad+13*dpr); }
  for(let a=0;a<=avmax;a+=50){ ctx.fillText(a,pad-28*dpr,H-pad-a*ysc+4); }

  // A_v bypassed vs I_D
  ctx.strokeStyle=acc; ctx.lineWidth=2*dpr; ctx.beginPath();
  for(let id2=0.01e-3;id2<=idmax;id2+=0.05e-3){
    const gm2=2*id2/VOD;
    const av=gm2*RD;
    const x=pad+id2*xsc; const y=H-pad-Math.min(av,avmax)*ysc;
    if(id2===0.01e-3) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // A_v no bypass vs I_D
  ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2*dpr; ctx.beginPath();
  for(let id2=0.01e-3;id2<=idmax;id2+=0.05e-3){
    const gm2=2*id2/VOD;
    const av=gm2*RD/(1+gm2*RS);
    const x=pad+id2*xsc; const y=H-pad-Math.min(av,avmax)*ysc;
    if(id2===0.01e-3) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Current operating point marker
  const qx=pad+ID*xsc;
  ctx.strokeStyle='#ffa502'; ctx.lineWidth=1.5*dpr; ctx.setLineDash([4*dpr,3*dpr]);
  ctx.beginPath(); ctx.moveTo(qx,pad); ctx.lineTo(qx,H-pad); ctx.stroke(); ctx.setLineDash([]);

  ctx.fillStyle=acc; ctx.font=`${9*dpr}px system-ui`;
  ctx.fillText('A_v (bypassed)',pad+5*dpr,pad+12*dpr);
  ctx.fillStyle='#ff6b6b';
  ctx.fillText('A_v (no bypass)',pad+5*dpr,pad+24*dpr);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`g_m=${(gm*1000).toFixed(2)}mA/V  A_v_bypass=${Av_by.toFixed(1)}  A_v_no_bypass=${Av_no.toFixed(2)}`,pad,pad-8*dpr);
}
draw();
</script></body></html>
