<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sim: Two-Capacitor Charging Transient</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:12px;}
canvas{display:block;border:1px solid #444;border-radius:6px;background:#0d0d1a;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:12px;}
label{color:#aaa;}
input[type=range]{width:140px;}
.vals{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:#ccc;margin:6px 0;}
.val-item{background:#222;border-radius:4px;padding:4px 8px;}
h3{font-size:13px;color:#90caf9;margin-bottom:6px;}
@media(prefers-color-scheme:light){body{background:#f5f5f5;color:#111;}canvas{background:#fff;border-color:#ccc;}.val-item{background:#eee;color:#222;}label{color:#555;}h3{color:#005a9c;}}
</style>
</head>
<body>
<h3>Problem 3 — Two-Capacitor Symmetric Charging Transient</h3>
<p style="font-size:11px;color:#aaa;margin-bottom:8px;">V_A and V_B charge with equal time constant τ = 2/3 × (R × C) to different final values. Ratio V_A/V_B = 2 always.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>R1=R2=R3 (kΩ)</label><input type="range" id="R" min="1" max="100" value="10" step="1"><span id="RV">10</span></div>
  <div class="ctrl"><label>C1=C2 (µF)</label><input type="range" id="C" min="1" max="1000" value="100" step="1"><span id="CV">100</span></div>
  <div class="ctrl"><label>V_supply (V)</label><input type="range" id="Vs" min="1" max="20" value="5" step="0.5"><span id="VsV">5.0</span></div>
  <div class="ctrl"><label>Time span (×τ)</label><input type="range" id="span" min="1" max="6" value="3" step="0.5"><span id="spanV">3.0</span></div>
</div>
<div class="vals">
  <div class="val-item">τ = <strong id="tau">-</strong></div>
  <div class="val-item">V_A(∞) = <strong id="VA_inf">-</strong></div>
  <div class="val-item">V_B(∞) = <strong id="VB_inf">-</strong></div>
  <div class="val-item">I_R2(∞) = <strong id="IR2">-</strong></div>
</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resizeCanvas(){
  const w=cv.parentElement.getBoundingClientRect().width;
  cv.width=Math.min(w-24,700);
  cv.height=Math.round(cv.width*0.45);
}
function get(id){return parseFloat(document.getElementById(id).value);}
function draw(){
  const W=cv.width,H=cv.height;
  const R=get('R')*1e3,C=get('C')*1e-6,Vs=get('Vs'),span=get('span');
  document.getElementById('RV').textContent=get('R');
  document.getElementById('CV').textContent=get('C');
  document.getElementById('VsV').textContent=get('Vs').toFixed(1);
  document.getElementById('spanV').textContent=get('span').toFixed(1);
  // Thevenin R for each cap = R || 2R = 2/3 R
  const Rth=2*R/3;
  const tau=Rth*C;
  // Steady state voltages (R1=R2=R3=R, voltage divider)
  const VA_inf=Vs*2/3;
  const VB_inf=Vs*1/3;
  const IR2_inf=(VA_inf-VB_inf)/R;
  document.getElementById('tau').textContent=tau>=1?(tau).toFixed(2)+'s':tau>=0.001?(tau*1000).toFixed(1)+'ms':(tau*1e6).toFixed(1)+'µs';
  document.getElementById('VA_inf').textContent=VA_inf.toFixed(3)+'V';
  document.getElementById('VB_inf').textContent=VB_inf.toFixed(3)+'V';
  document.getElementById('IR2').textContent=(IR2_inf*1e6).toFixed(1)+'µA';
  ctx.clearRect(0,0,W,H);
  const pad={l:52,r:20,t:28,b:38};
  const pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const t_end=span*tau;
  function tx(t){return pad.l+t/t_end*pw;}
  function vy(v){return H-pad.b-v/Vs*ph;}
  // Grid
  ctx.strokeStyle='#1e2a3a';ctx.lineWidth=0.5;
  [0.25,0.5,0.75,1].forEach(frac=>{
    const y=H-pad.b-frac*ph;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#555';ctx.font='10px Arial';
    ctx.fillText((frac*Vs).toFixed(2)+'V',2,y+4);
  });
  // τ tick marks
  for(let k=1;k<=span;k++){
    const x=tx(k*tau);
    ctx.strokeStyle='#333';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();
    ctx.fillStyle='#555';ctx.font='10px Arial';
    ctx.fillText(k+'τ',x-8,H-pad.b+14);
  }
  // Draw V_A(t)
  const N=400;
  ctx.beginPath();ctx.strokeStyle='#55aaff';ctx.lineWidth=2;
  for(let i=0;i<=N;i++){
    const t=t_end*i/N;
    const VA=VA_inf*(1-Math.exp(-t/tau));
    if(i===0)ctx.moveTo(tx(t),vy(VA));else ctx.lineTo(tx(t),vy(VA));
  }
  ctx.stroke();
  // Draw V_B(t)
  ctx.beginPath();ctx.strokeStyle='#ff9955';ctx.lineWidth=2;
  for(let i=0;i<=N;i++){
    const t=t_end*i/N;
    const VB=VB_inf*(1-Math.exp(-t/tau));
    if(i===0)ctx.moveTo(tx(t),vy(VB));else ctx.lineTo(tx(t),vy(VB));
  }
  ctx.stroke();
  // I_R2 (scaled to top of plot)
  ctx.beginPath();ctx.strokeStyle='#55ffaa';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
  for(let i=0;i<=N;i++){
    const t=t_end*i/N;
    const VA=VA_inf*(1-Math.exp(-t/tau));
    const VB=VB_inf*(1-Math.exp(-t/tau));
    const IR2=(VA-VB)/R;
    const I_frac=IR2/IR2_inf; // normalized
    const y=H-pad.b-I_frac*ph*0.5; // scaled to half height
    if(i===0)ctx.moveTo(tx(t),y);else ctx.lineTo(tx(t),y);
  }
  ctx.stroke();ctx.setLineDash([]);
  // Asymptotes
  ctx.strokeStyle='#335';ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pad.l,vy(VA_inf));ctx.lineTo(W-pad.r,vy(VA_inf));ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l,vy(VB_inf));ctx.lineTo(W-pad.r,vy(VB_inf));ctx.stroke();
  ctx.setLineDash([]);
  // Axes
  ctx.strokeStyle='#666';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  // Labels
  ctx.fillStyle='#55aaff';ctx.font='11px Arial';ctx.fillText('V_A(t)',W-pad.r-50,vy(VA_inf)-4);
  ctx.fillStyle='#ff9955';ctx.font='11px Arial';ctx.fillText('V_B(t)',W-pad.r-50,vy(VB_inf)-4);
  ctx.fillStyle='#55ffaa';ctx.font='10px Arial';ctx.fillText('I_R2(t) ×scaled',pad.l+5,H-pad.b-ph*0.5-5);
  ctx.fillStyle='#aaa';ctx.font='10px Arial';ctx.fillText('Time',W-40,H-pad.b+14);
  ctx.fillStyle='#90caf9';ctx.font='bold 11px Arial';
  ctx.fillText(`R=${(R/1e3).toFixed(0)}kΩ  C=${(C*1e6).toFixed(0)}µF  Vs=${Vs}V  τ=${tau>=1?tau.toFixed(2)+'s':(tau*1000).toFixed(0)+'ms'}`,pad.l+5,pad.t-8);
  // Key insight annotation
  const t05=0.5*tau;
  const VA_05=VA_inf*(1-Math.exp(-0.5));
  const VB_05=VB_inf*(1-Math.exp(-0.5));
  if(tau<t_end){
    ctx.fillStyle='rgba(100,100,255,0.15)';
    ctx.fillRect(tx(t05)-1,vy(VA_05)-1,3,vy(VB_05)-vy(VA_05)+2);
    ctx.fillStyle='#aaa';ctx.font='9px Arial';
    ctx.fillText('ratio=2:1 maintained',tx(t05)+4,vy((VA_05+VB_05)/2));
  }
}
['R','C','Vs','span'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
window.addEventListener('resize',()=>{resizeCanvas();draw();});
resizeCanvas();draw();
</script>
</body>
</html>
