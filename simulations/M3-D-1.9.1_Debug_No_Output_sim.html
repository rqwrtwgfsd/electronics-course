<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-D-1.9.1 — Debug: No Output</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#0066cc;--accent2:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922}
@media(prefers-color-scheme:light){:root{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#24292f;--text2:#656d76;--accent:#0066cc;--accent2:#0969da;--green:#2da44e;--red:#cf222e;--yellow:#9a6700}}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;padding:16px}
h2{color:var(--accent2);font-size:16px;margin-bottom:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
canvas{width:100%;border-radius:6px;background:var(--bg);display:block}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.ctrl{flex:1;min-width:180px}
label{display:block;color:var(--text2);font-size:12px;margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--accent)}
.readout{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ro{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;font-family:monospace}
.ro span{color:var(--accent2);font-weight:bold}
.note{color:var(--text2);font-size:12px;margin-top:8px;line-height:1.5}
</style></head>
<body>
<h2>M3-D-1.9.1 — Debug: Diode Circuit No Output</h2>
<div class="panel">
<canvas id="cv" height="260"></canvas>
<div class="controls">
  <div class="ctrl"><label>Fault type</label>
    <select id="Fault" style="width:100%;padding:4px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
      <option value="0">Normal (no fault)</option>
      <option value="1">Reversed diode</option>
      <option value="2">Open diode</option>
      <option value="3">Input amplitude too small</option>
      <option value="4">Output short to GND</option>
    </select>
  </div>
  <div class="ctrl"><label>V_in amplitude (V): <b id="lVin">5</b></label>
    <input type="range" id="Vin" min="0.1" max="15" step="0.1" value="5"></div>
  <div class="ctrl"><label>V_F (V): <b id="lVf">0.7</b></label>
    <input type="range" id="Vf" min="0.1" max="1" step="0.05" value="0.7"></div>
</div>
<div class="readout">
  <div class="ro">V_out: <span id="r1">0.00</span> V</div>
  <div class="ro">Diagnosis: <span id="r2">—</span></div>
  <div class="ro">V across diode: <span id="r3">0.00</span> V</div>
  <div class="ro">Fix: <span id="r4">—</span></div>
</div>
<p class="note">Systematic debug: check signal present → check V across diode → remove load → test diode out-of-circuit.</p>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){cv.width=cv.offsetWidth*devicePixelRatio;cv.height=260*devicePixelRatio;cv.getContext('2d').scale(devicePixelRatio,devicePixelRatio);draw();}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillStyle=color;ctx.font='11px system-ui';
  ctx.fillText(yl,pad+4,pad+12);ctx.fillText(xl,W-pad-2,H-pad-4);
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const diagnoses=[
  ['OK','Normal operation — diode conducting correctly','V_F','No fault'],
  ['REVERSED','Diode installed backwards — full V_in across diode, V_out = 0','V_in (all blocked)','Reverse diode polarity'],
  ['OPEN','Diode failed open — no conduction in either direction','V_in (all across open)','Replace diode'],
  ['SMALL SIG','Input signal below V_F threshold — diode never conducts','< V_F','Use Schottky or active rectifier'],
  ['OUTPUT SHORT','V_out shorted to GND — load is short circuit','V_F (conducting)','Check/remove load'],
];
function draw(){
  const fault=parseInt(document.getElementById('Fault').value);
  const vin=gs('Vin'),vf=gs('Vf');
  document.getElementById('lVin').textContent=vin.toFixed(1);
  document.getElementById('lVf').textContent=vf.toFixed(2);
  let vout=0,vd=0;
  if(fault===0){vout=Math.max(0,vin-vf);vd=vf;}
  else if(fault===1){vout=0;vd=vin;}
  else if(fault===2){vout=0;vd=vin;}
  else if(fault===3){vout=vin<vf?0:vin-vf;vd=vin<vf?vin:vf;}
  else if(fault===4){vout=0;vd=vf;}
  sv('r1',vout.toFixed(2));sv('r2',diagnoses[fault][0]);
  sv('r3',diagnoses[fault][2]);sv('r4',diagnoses[fault][3]);

  const W=cv.offsetWidth,H=260,pad=40;
  const bg=isDark()?'#0d1117':'#fff',fg=isDark()?'#8b949e':'#656d76';
  ctx.clearRect(0,0,W,H);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawAxes(ctx,W,H,pad,'t →','V ↑',fg);
  const yc=H/2,ysc=(H/2-pad)/Math.max(vin,1);
  ctx.setLineDash([4,4]);ctx.strokeStyle=fg;ctx.globalAlpha=0.3;
  ctx.beginPath();ctx.moveTo(pad,yc);ctx.lineTo(W-pad,yc);ctx.stroke();
  ctx.globalAlpha=1;ctx.setLineDash([]);
  ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.5;ctx.beginPath();
  for(let i=0;i<W-2*pad;i++){const t=i/(W-2*pad)*4*Math.PI;const v=vin*Math.sin(t);const x=pad+i,y=yc-v*ysc;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();
  ctx.strokeStyle=fault===0?'#3fb950':'#f85149';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<W-2*pad;i++){
    const t=i/(W-2*pad)*4*Math.PI;const v=vin*Math.sin(t);
    let vo=0;
    if(fault===0)vo=Math.max(0,v-vf);
    else if(fault===3)vo=v<vf?0:v-vf;
    const x=pad+i,y=yc-vo*ysc;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.fillStyle=fault===0?'#3fb950':'#f85149';ctx.font='13px system-ui';
  ctx.fillText(diagnoses[fault][0]+': '+diagnoses[fault][1],pad,pad+15);
}
document.querySelectorAll('input[type=range],select').forEach(e=>e.addEventListener('input',draw));
window.addEventListener('resize',()=>resize(cv,draw));
resize(cv,draw);
</script>
</body></html>
