<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4A-SD-4.4.2 — Clipping and Crossover Distortion</title>
<style>
:root{--bg:#f5f5f5;--panel:#fff;--border:#d0d0d0;--text:#1a1a1a;--text2:#555;--accent:#1a6fc4;--green:#2a9d2a;--orange:#e07b00;--red:#c42a2a;--grid:#e0e0e0;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--panel:#252525;--border:#404040;--text:#e8e8e8;--text2:#aaa;--accent:#4a9fe8;--green:#4acd4a;--orange:#f0a030;--red:#e85050;--grid:#333;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;}
h1{font-size:1.1rem;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--border);}
h1 span{color:var(--text2);font-weight:normal;font-size:.85rem;}
.layout{display:grid;grid-template-columns:270px 1fr;gap:0;height:calc(100vh - 44px);}
.controls{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px;}
.plots{display:grid;grid-template-rows:1fr 1fr;overflow:hidden;}
.plot-wrap{position:relative;background:var(--bg);border-bottom:1px solid var(--border);}
.plot-wrap:last-child{border-bottom:none;}
canvas{display:block;width:100%;height:100%;}
.section{margin-bottom:14px;}
.section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.ctrl{margin-bottom:8px;}
.ctrl label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px;}
.ctrl label span{color:var(--accent);font-weight:600;font-family:monospace;}
input[type=range]{width:100%;accent-color:var(--accent);}
.tab-row{display:flex;gap:4px;margin-bottom:8px;}
.tab-btn{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px;font-size:.75rem;cursor:pointer;text-align:center;}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.preset-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.preset-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 7px;font-size:.75rem;cursor:pointer;}
.preset-btn.active,.preset-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.readout-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.readout{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 7px;}
.readout .label{font-size:.7rem;color:var(--text2);}
.readout .value{font-size:.85rem;font-weight:700;font-family:monospace;}
.ok{color:var(--green);}.warn{color:var(--orange);}.bad{color:var(--red);}
.plot-label{position:absolute;top:6px;left:10px;font-size:.75rem;color:var(--text2);pointer-events:none;}
</style>
</head>
<body>
<h1>M4A-SD-4.4.2 — Clipping and Crossover Distortion <span>| Waveform &amp; Harmonic Analysis</span></h1>
<div class="layout">
  <div class="controls">

    <div class="section">
      <div class="section-title">Distortion Mode</div>
      <div class="tab-row">
        <button class="tab-btn active" data-mode="clip">Clipping</button>
        <button class="tab-btn" data-mode="xover">Crossover</button>
        <button class="tab-btn" data-mode="both">Both</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Presets</div>
      <div class="preset-row">
        <button class="preset-btn active" data-preset="mild">Mild Clipping</button>
        <button class="preset-btn" data-preset="hard">Hard Clipping</button>
        <button class="preset-btn" data-preset="xover-bad">Crossover Notch</button>
        <button class="preset-btn" data-preset="clean">Clean (no dist.)</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Signal &amp; Supply</div>
      <div class="ctrl">
        <label>Input Amplitude Vpeak <span id="val-vamp">10 V</span></label>
        <input type="range" id="sl-vamp" min="0.1" max="15" step="0.1" value="10">
      </div>
      <div class="ctrl">
        <label>Supply Rail Vcc <span id="val-vcc">12 V</span></label>
        <input type="range" id="sl-vcc" min="1" max="15" step="0.5" value="12">
      </div>
      <div class="ctrl">
        <label>Output Headroom <span id="val-hdr">1.5 V</span></label>
        <input type="range" id="sl-hdr" min="0" max="4" step="0.1" value="1.5">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Crossover Parameters</div>
      <div class="ctrl">
        <label>Quiescent Current Iq <span id="val-iq">5 mA</span></label>
        <input type="range" id="sl-iq" min="0.01" max="100" step="0.1" value="5">
      </div>
      <div class="ctrl">
        <label>Load Resistance RL <span id="val-rl">8 Ω</span></label>
        <input type="range" id="sl-rl" min="1" max="1000" step="1" value="8">
      </div>
      <div class="ctrl">
        <label>Loop Gain (feedback) <span id="val-lg">100×</span></label>
        <input type="range" id="sl-lg" min="1" max="10000" step="1" value="100">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Harmonics</div>
      <div class="readout-grid">
        <div class="readout"><div class="label">THD</div><div class="value" id="ro-thd">—</div></div>
        <div class="readout"><div class="label">2nd (dBc)</div><div class="value" id="ro-h2">—</div></div>
        <div class="readout"><div class="label">3rd (dBc)</div><div class="value" id="ro-h3">—</div></div>
        <div class="readout"><div class="label">5th (dBc)</div><div class="value" id="ro-h5">—</div></div>
        <div class="readout"><div class="label">Clip level</div><div class="value" id="ro-clip">—</div></div>
        <div class="readout"><div class="label">Xover width</div><div class="value" id="ro-xw">—</div></div>
      </div>
    </div>

  </div>

  <div class="plots">
    <div class="plot-wrap">
      <div class="plot-label">Output Waveform</div>
      <canvas id="wave-canvas"></canvas>
    </div>
    <div class="plot-wrap">
      <div class="plot-label">Harmonic Spectrum (DFT)</div>
      <canvas id="spec-canvas"></canvas>
    </div>
  </div>
</div>

<script>
let mode='clip';

function getParams(){
  return{
    vamp:+document.getElementById('sl-vamp').value,
    vcc: +document.getElementById('sl-vcc').value,
    hdr: +document.getElementById('sl-hdr').value,
    iq:  +document.getElementById('sl-iq').value*1e-3,
    rl:  +document.getElementById('sl-rl').value,
    lg:  +document.getElementById('sl-lg').value,
  };
}

function applyDistortion(v, p){
  const vclip=p.vcc-p.hdr;
  // Clipping
  if(mode==='clip'||mode==='both'){
    v=Math.max(-vclip,Math.min(vclip,v));
  }
  // Crossover distortion: dead zone ±Vdead
  if(mode==='xover'||mode==='both'){
    const Vt=0.026;
    const Vdead=Vt*Math.log(Math.max(1,p.vamp/(p.rl*p.iq)));
    // Feedforward crossover model: smooth S-curve with reduced gain near zero
    if(Math.abs(v)>Vdead){
      // outside dead zone: unity gain
    } else {
      // inside dead zone: gain reduced by loop gain
      v=v*(Math.abs(v)/Vdead+1/p.lg);
    }
  }
  return v;
}

// DFT to get harmonic amplitudes
function computeHarmonics(wave){
  const N=wave.length;
  const h=[];
  for(let k=1;k<=10;k++){
    let re=0,im=0;
    for(let n=0;n<N;n++){
      re+=wave[n]*Math.cos(2*Math.PI*k*n/N);
      im-=wave[n]*Math.sin(2*Math.PI*k*n/N);
    }
    h.push(2*Math.sqrt(re*re+im*im)/N);
  }
  return h;
}

function generateWave(p,N=512){
  const ideal=[],dist=[];
  for(let i=0;i<N;i++){
    const v=p.vamp*Math.sin(2*Math.PI*i/N);
    ideal.push(v);
    dist.push(applyDistortion(v,p));
  }
  return{ideal,dist};
}

function getColors(){
  const s=getComputedStyle(document.documentElement);
  return['--bg','--text','--text2','--grid','--accent','--green','--orange','--red']
    .reduce((o,k)=>{o[k.slice(2)]=s.getPropertyValue(k).trim();return o;},{});
}

function drawWave(canvas){
  const W=canvas.offsetWidth*devicePixelRatio,H=canvas.offsetHeight*devicePixelRatio;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const C=getColors();
  const p=getParams();
  const PAD={l:50*devicePixelRatio,r:20*devicePixelRatio,t:20*devicePixelRatio,b:25*devicePixelRatio};
  const pW=W-PAD.l-PAD.r,pH=H-PAD.t-PAD.b;
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);

  const{ideal,dist}=generateWave(p);
  const N=ideal.length;
  const vMax=(p.vcc+0.5);
  function xPos(i){return PAD.l+pW*i/N;}
  function yPos(v){return PAD.t+pH*(1-(v+vMax)/(2*vMax));}

  // Grid
  [-p.vcc,-p.vcc/2,0,p.vcc/2,p.vcc].forEach(v=>{
    const y=yPos(v);
    ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle=C.text2;ctx.font=`${9*devicePixelRatio}px monospace`;ctx.textAlign='right';
    ctx.fillText(v.toFixed(0)+'V',PAD.l-4,y+3);
  });

  // Clip level lines
  const vclip=p.vcc-p.hdr;
  if(mode==='clip'||mode==='both'){
    [vclip,-vclip].forEach(v=>{
      const y=yPos(v);
      ctx.strokeStyle=C.red;ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    });
    ctx.setLineDash([]);
    ctx.fillStyle=C.red;ctx.font=`${8*devicePixelRatio}px sans-serif`;ctx.textAlign='right';
    ctx.fillText(`Clip = ±${vclip.toFixed(1)}V`,W-PAD.r-2,yPos(vclip)-3);
  }

  // Ideal
  ctx.strokeStyle=C.accent+'66';ctx.lineWidth=1.5*devicePixelRatio;ctx.setLineDash([5,4]);
  ctx.beginPath();let first=true;
  ideal.forEach((v,i)=>{
    const x=xPos(i),y=yPos(v);
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.stroke();ctx.setLineDash([]);

  // Distorted
  ctx.strokeStyle=C.red;ctx.lineWidth=2.5*devicePixelRatio;
  ctx.beginPath();first=true;
  dist.forEach((v,i)=>{
    const x=xPos(i),y=yPos(v);
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Difference (error signal)
  ctx.strokeStyle=C.orange+'88';ctx.lineWidth=1*devicePixelRatio;
  ctx.beginPath();first=true;
  ideal.forEach((vi,i)=>{
    const err=(dist[i]-vi);
    const x=xPos(i),y=yPos(err*3); // scale up for visibility
    if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Label
  const h=computeHarmonics(dist);
  const thd=Math.sqrt(h.slice(1).reduce((s,v)=>s+v*v,0))/Math.max(h[0],1e-9)*100;
  ctx.fillStyle=C.text;ctx.font=`bold ${9*devicePixelRatio}px sans-serif`;ctx.textAlign='left';
  ctx.fillText(`THD = ${thd.toFixed(3)}%`,PAD.l+4,PAD.t+13*devicePixelRatio);
  ctx.fillStyle=C.accent+'88';ctx.font=`${8*devicePixelRatio}px sans-serif`;
  ctx.fillText('(dashed = ideal, solid = distorted, dim = error×3)',PAD.l+4,PAD.t+24*devicePixelRatio);
}

function drawSpectrum(canvas){
  const W=canvas.offsetWidth*devicePixelRatio,H=canvas.offsetHeight*devicePixelRatio;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const C=getColors();
  const p=getParams();
  const{dist}=generateWave(p,1024);
  const h=computeHarmonics(dist);
  const fund=Math.max(h[0],1e-9);
  const PAD={l:55*devicePixelRatio,r:20*devicePixelRatio,t:20*devicePixelRatio,b:30*devicePixelRatio};
  const pW=W-PAD.l-PAD.r,pH=H-PAD.t-PAD.b;
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);

  const dbMin=-100,dbMax=5;
  function dbY(db){return PAD.t+pH*(1-(db-dbMin)/(dbMax-dbMin));}

  // Grid
  [-100,-80,-60,-40,-20,0].forEach(db=>{
    const y=dbY(db);
    if(y<PAD.t||y>H-PAD.b)return;
    ctx.strokeStyle=C.grid;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle=C.text2;ctx.font=`${9*devicePixelRatio}px monospace`;ctx.textAlign='right';
    ctx.fillText(db+'dBc',PAD.l-4,y+3);
  });

  const HCOLORS=['--accent','--green','--orange','--red','--accent','--green','--orange','--red','--red','--orange'];
  const barW=pW/12;
  h.forEach((amp,i)=>{
    const db=20*Math.log10(amp/fund);
    const dbc=i===0?0:db;
    const x=PAD.l+barW*(i+1);
    const yTop=dbY(dbc),yBot=dbY(dbMin);
    const colorKey=HCOLORS[i];
    const color=getComputedStyle(document.documentElement).getPropertyValue(colorKey).trim();
    ctx.fillStyle=color+'cc';
    ctx.fillRect(x-barW*0.4,yTop,barW*0.8,yBot-yTop);
    ctx.fillStyle=C.text;ctx.font=`bold ${8*devicePixelRatio}px monospace`;ctx.textAlign='center';
    ctx.fillText(dbc.toFixed(1),x,yTop-4*devicePixelRatio);
    ctx.fillStyle=C.text2;ctx.font=`${8*devicePixelRatio}px monospace`;
    ctx.fillText('H'+(i+1),x,H-PAD.b+12*devicePixelRatio);
  });

  const thd=Math.sqrt(h.slice(1).reduce((s,v)=>s+v*v,0))/fund*100;
  const thdDb=20*Math.log10(Math.max(thd/100,1e-10));
  ctx.fillStyle=C.accent;ctx.font=`bold ${9*devicePixelRatio}px sans-serif`;ctx.textAlign='left';
  ctx.fillText(`THD=${thd.toFixed(3)}% (${thdDb.toFixed(1)} dBc)`,PAD.l+4,PAD.t+13*devicePixelRatio);
}

function updateLabels(){
  const p=getParams();
  document.getElementById('val-vamp').textContent=p.vamp.toFixed(1)+'V';
  document.getElementById('val-vcc').textContent=p.vcc.toFixed(1)+'V';
  document.getElementById('val-hdr').textContent=p.hdr.toFixed(1)+'V';
  document.getElementById('val-iq').textContent=(p.iq*1000).toFixed(1)+'mA';
  document.getElementById('val-rl').textContent=p.rl+'Ω';
  document.getElementById('val-lg').textContent=p.lg+'×';
}

function updateReadouts(){
  const p=getParams();
  const{dist}=generateWave(p,1024);
  const h=computeHarmonics(dist);
  const fund=Math.max(h[0],1e-9);
  function dbc(i){return 20*Math.log10(Math.max(h[i],1e-10)/fund);}
  const thd=Math.sqrt(h.slice(1).reduce((s,v)=>s+v*v,0))/fund*100;
  const vclip=p.vcc-p.hdr;
  const Vt=0.026;
  const Vdead=Vt*Math.log(Math.max(1,p.vamp/(p.rl*p.iq)));

  document.getElementById('ro-thd').textContent=thd.toFixed(3)+'%';
  document.getElementById('ro-thd').className='value '+(thd<0.1?'ok':thd<1?'warn':'bad');
  document.getElementById('ro-h2').textContent=dbc(1).toFixed(1)+'dBc';
  document.getElementById('ro-h3').textContent=dbc(2).toFixed(1)+'dBc';
  document.getElementById('ro-h5').textContent=dbc(4).toFixed(1)+'dBc';
  document.getElementById('ro-clip').textContent='±'+vclip.toFixed(1)+'V';
  document.getElementById('ro-clip').className='value '+(p.vamp<=vclip?'ok':'bad');
  document.getElementById('ro-xw').textContent=(Vdead*1000).toFixed(1)+'mV';
  document.getElementById('ro-xw').className='value '+(Vdead<0.01?'ok':Vdead<0.1?'warn':'bad');
}

function redraw(){
  updateLabels();
  updateReadouts();
  drawWave(document.getElementById('wave-canvas'));
  drawSpectrum(document.getElementById('spec-canvas'));
}

document.querySelectorAll('[data-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode=btn.dataset.mode;
    redraw();
  });
});

const PRESETS={
  mild:     {vamp:10,vcc:12,hdr:1.5,iq:5,rl:8,lg:100},
  hard:     {vamp:14,vcc:12,hdr:1.5,iq:5,rl:8,lg:100},
  'xover-bad':{vamp:0.5,vcc:12,hdr:1.5,iq:0.1,rl:8,lg:10},
  clean:    {vamp:5, vcc:12,hdr:1.5,iq:50,rl:8,lg:1000},
};

document.querySelectorAll('[data-preset]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-preset]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const pr=PRESETS[btn.dataset.preset];
    document.getElementById('sl-vamp').value=pr.vamp;
    document.getElementById('sl-vcc').value=pr.vcc;
    document.getElementById('sl-hdr').value=pr.hdr;
    document.getElementById('sl-iq').value=pr.iq;
    document.getElementById('sl-rl').value=pr.rl;
    document.getElementById('sl-lg').value=pr.lg;
    // Set appropriate mode
    if(pr===PRESETS['xover-bad']){
      document.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-mode=xover]').classList.add('active');
      mode='xover';
    } else if(pr===PRESETS.clean){
      document.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-mode=clip]').classList.add('active');
      mode='clip';
    }
    redraw();
  });
});

['sl-vamp','sl-vcc','sl-hdr','sl-iq','sl-rl','sl-lg'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    document.querySelectorAll('[data-preset]').forEach(b=>b.classList.remove('active'));
    redraw();
  });
});

const ro=new ResizeObserver(redraw);
ro.observe(document.getElementById('wave-canvas').parentElement);
ro.observe(document.getElementById('spec-canvas').parentElement);
redraw();
</script>
</body>
</html>
