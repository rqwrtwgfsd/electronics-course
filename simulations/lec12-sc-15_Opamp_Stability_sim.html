<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Op-Amp Stability — Compensation Capacitor</title>
<style>
  :root{--bg:#fff;--surface:#f5f5f5;--border:#ccc;--text:#1a1a1a;--accent:#0066cc;--muted:#666}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:#444;--text:#e8e8e8;--accent:#4499ff;--muted:#999}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:900px;margin:0 auto}
  header{border-bottom:2px solid var(--accent);padding-bottom:10px;margin-bottom:16px}
  .module-id{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
  h1{font-size:18px;margin:4px 0}
  .layout{display:grid;grid-template-columns:1fr 260px;gap:16px}
  canvas{border:1px solid var(--border);border-radius:4px;display:block;background:var(--surface);width:100%}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px}
  .ctrl-group{margin-bottom:12px}
  .ctrl-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
  .ctrl-value{color:var(--accent);font-size:13px;font-weight:700;font-family:monospace}
  input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
  .result-box{background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);border-radius:4px;padding:10px;margin-top:12px;font-size:12px;line-height:1.6}
  @media(max-width:600px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="module-id">Lecture 12 | Scenario 15</div>
  <h1>Op-Amp Stability: Phase Margin &amp; Compensation</h1>
</header>
<div class="layout">
  <div><canvas id="cv" height="380"></canvas></div>
  <div class="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Gain (V/V) <span class="ctrl-value" id="lbl-g">10</span></div>
      <input type="range" id="sl-g" min="1" max="100" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Comp Cap Cf (pF) <span class="ctrl-value" id="lbl-cf">10 pF</span></div>
      <input type="range" id="sl-cf" min="0" max="100" value="10" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Rf (kΩ) <span class="ctrl-value" id="lbl-rf">9 kΩ</span></div>
      <input type="range" id="sl-rf" min="1" max="100" value="9" step="1">
    </div>
    <div class="result-box" id="result">Adjust to stabilize op-amp</div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const slG=document.getElementById('sl-g'),slCf=document.getElementById('sl-cf'),slRf=document.getElementById('sl-rf');
const lblG=document.getElementById('lbl-g'),lblCf=document.getElementById('lbl-cf'),lblRf=document.getElementById('lbl-rf');
const result=document.getElementById('result');

function draw(){
  const W=cv.width,H=cv.height;
  const gain=parseFloat(slG.value);
  const Cf=parseFloat(slCf.value)*1e-12;
  const Rf=parseFloat(slRf.value)*1e3;
  lblG.textContent=gain;
  lblCf.textContent=slCf.value+' pF';
  lblRf.textContent=slRf.value+' kΩ';
  ctx.clearRect(0,0,W,H);
  const pad=44,plotW=W-pad*2,plotH=H-pad*2;
  const fMin=1e3,fMax=100e6;
  // Op-amp open loop gain ~ GBW=10MHz, single pole at f_a=GBW/A0=10M/1e6=10Hz
  const GBW=10e6;const A0_dB=120;const A0=Math.pow(10,A0_dB/20);
  const fa=GBW/A0;
  function openLoopGain_dB(f){return 20*Math.log10(A0/Math.sqrt(1+Math.pow(f/fa,2)))}
  // Closed loop gain with compensation
  const closed_dB=20*Math.log10(gain);
  // Phase of open loop
  function phase(f){return -Math.atan(f/fa)*180/Math.PI-90*(f>GBW?1:0)}
  // Compensation pole from Cf across Rf
  const fc_comp=Cf>0?1/(2*Math.PI*Rf*Cf):Infinity;
  function gainWithComp_dB(f){
    const g=openLoopGain_dB(f);
    const compAtten=Cf>0?20*Math.log10(1/Math.sqrt(1+Math.pow(f/fc_comp,2))):0;
    return g+compAtten;
  }
  function xPx(f){return pad+plotW*(Math.log10(f)-Math.log10(fMin))/(Math.log10(fMax)-Math.log10(fMin))}
  function yPx(db){return pad+plotH*(1-(db+20)/140)}
  // Grid
  ctx.strokeStyle='rgba(128,128,128,0.15)';ctx.lineWidth=1;
  for(let db=-20;db<=120;db+=20){ctx.beginPath();ctx.moveTo(pad,yPx(db));ctx.lineTo(W-pad,yPx(db));ctx.stroke()}
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  // Open loop gain (no comp)
  ctx.strokeStyle='rgba(200,50,50,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const logF=Math.log10(fMin)+(px/plotW)*(Math.log10(fMax)-Math.log10(fMin));
    const f=Math.pow(10,logF);
    const db=Math.max(-20,Math.min(120,openLoopGain_dB(f)));
    px===0?ctx.moveTo(pad+px,yPx(db)):ctx.lineTo(pad+px,yPx(db));
  }ctx.stroke();ctx.setLineDash([]);
  // Open loop with comp
  ctx.strokeStyle='#e53935';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=plotW;px++){
    const logF=Math.log10(fMin)+(px/plotW)*(Math.log10(fMax)-Math.log10(fMin));
    const f=Math.pow(10,logF);
    const db=Math.max(-20,Math.min(120,gainWithComp_dB(f)));
    px===0?ctx.moveTo(pad+px,yPx(db)):ctx.lineTo(pad+px,yPx(db));
  }ctx.stroke();
  // Closed loop gain line
  ctx.setLineDash([4,3]);ctx.strokeStyle='#0066cc';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad,yPx(closed_dB));ctx.lineTo(W-pad,yPx(closed_dB));ctx.stroke();ctx.setLineDash([]);
  // Find crossover frequency (gain = closed loop gain) — stability check
  let f_cross=GBW/gain;
  const phaseAtCross=phase(f_cross);
  const phaseMargin=180+phaseAtCross;
  ctx.fillStyle='#888';ctx.textAlign='right';ctx.font='10px system-ui';
  [0,20,40,60,80,100,120].forEach(db=>ctx.fillText(db+'dB',pad-4,yPx(db)+3));
  ctx.textAlign='center';
  ['1k','10k','100k','1M','10M','100M'].forEach((lbl,i)=>ctx.fillText(lbl,xPx(Math.pow(10,i+3)),H-pad+14));
  ctx.textAlign='left';ctx.font='11px system-ui';
  ctx.fillStyle='#e53935';ctx.fillText('Open loop (with Cf comp)',pad+8,pad+16);
  ctx.fillStyle='#0066cc';ctx.fillText('Closed loop gain ('+closed_dB.toFixed(0)+'dB)',pad+8,pad+30);
  const stable=phaseMargin>45;
  result.innerHTML='<b>Gain = '+gain+'× ('+closed_dB.toFixed(0)+'dB)</b><br>Crossover ≈ <b>'+_fmtHz(f_cross)+'</b><br>Phase margin ≈ <b>'+phaseMargin.toFixed(0)+'°</b><br>Status: <b>'+(stable?'✅ Stable (PM>45°)':'⚠️ Unstable — oscillates!')+'</b><br>Comp pole (Cf): <b>'+(Cf>0?_fmtHz(fc_comp):'Off')+'</b><br><b>Add Cf to roll off gain before phase hits 180°</b>';
}
function _fmtHz(f){if(f>=1e6)return(f/1e6).toFixed(1)+'MHz';if(f>=1e3)return(f/1e3).toFixed(0)+'kHz';return f.toFixed(0)+'Hz'}
function resizeCanvas(){cv.width=cv.parentElement.getBoundingClientRect().width||600;cv.height=380}
[slG,slCf,slRf].forEach(s=>s.addEventListener('input',draw));
window.addEventListener('resize',function(){resizeCanvas();draw()});
resizeCanvas();draw();
</script>
</body>
</html>
