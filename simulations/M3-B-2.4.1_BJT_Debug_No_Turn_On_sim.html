<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-B-2.4.1 BJT Debug: Not Turning On</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-B-2.4.1 — Debug: BJT Switch Not Turning On</h1>
<p class="note">Simulate common failure modes. Adjust base resistor and drive voltage to diagnose why BJT won't saturate.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>R_B (kΩ): <span id="rbv">100</span></label><input type="range" id="rb" min="0.1" max="500" value="100" step="1" oninput="sv('rbv',this.value);draw();"></div>
  <div class="ctrl"><label>V_drive (V): <span id="vdv">5</span></label><input type="range" id="vd" min="0" max="5" value="5" step="0.1" oninput="sv('vdv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_C (Ω): <span id="rcv">100</span></label><input type="range" id="rc" min="10" max="10000" value="100" step="10" oninput="sv('rcv',this.value);draw();"></div>
  <div class="ctrl"><label>β_min: <span id="betav">100</span></label><input type="range" id="beta" min="10" max="400" value="100" step="5" oninput="sv('betav',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">V_BE: <span id="vbe">0</span> V</div>
  <div class="ro">I_B: <span id="ib">0</span> µA</div>
  <div class="ro">I_C needed: <span id="icn">0</span> mA</div>
  <div class="ro">I_B needed: <span id="ibn">0</span> mA</div>
  <div class="ro">State: <span id="state">-</span></div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const Vcc=12;
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const RB=gs('rb')*1000;
  const Vd=gs('vd');
  const RC=gs('rc');
  const beta=gs('beta');

  const VBE=Vd>0.7?0.7:Vd;
  const IB=Vd>0.7?(Vd-0.7)/RB:0;
  const IC_sat=(Vcc-0.2)/RC;
  const IB_needed=IC_sat/(beta/10);
  const IC_actual=Math.min(beta*IB, IC_sat);
  const VCE=Vcc-IC_actual*RC;
  const state=Vd<0.6?'Cutoff: V_drive too low':(IB<IB_needed?'Active: R_B too large':'Saturated: OK');

  sv('vbe',VBE.toFixed(2));
  sv('ib',(IB*1e6).toFixed(1));
  sv('icn',(IC_sat*1000).toFixed(1));
  sv('ibn',(IB_needed*1000).toFixed(2));
  sv('state',state);

  // Bar chart: I_B actual vs I_B needed
  const barW=80*dpr, barH=H-2*pad;
  const cx1=pad+80*dpr, cx2=pad+220*dpr;
  const imax=Math.max(IB_needed*1.5, IB*1.5, 1e-3);
  const ys=(H-2*pad)/imax;

  ctx.fillStyle=dark?'#30363d':'#dddddd';
  ctx.fillRect(cx1-barW/2,pad,barW,barH);
  ctx.fillRect(cx2-barW/2,pad,barW,barH);

  const h1=Math.min(IB*ys, barH);
  const h2=Math.min(IB_needed*ys, barH);

  const ok=IB>=IB_needed;
  ctx.fillStyle=ok?'#2ed573':'#ff6b6b';
  ctx.fillRect(cx1-barW/2, H-pad-h1, barW, h1);
  ctx.fillStyle=acc;
  ctx.fillRect(cx2-barW/2, H-pad-h2, barW, h2);

  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText('I_B actual',cx1-30*dpr,H-pad+14*dpr);
  ctx.fillText('I_B needed',cx2-30*dpr,H-pad+14*dpr);
  ctx.fillText((IB*1e6).toFixed(0)+'µA',cx1-15*dpr,H-pad-h1-6*dpr);
  ctx.fillText((IB_needed*1000).toFixed(2)+'mA',cx2-15*dpr,H-pad-h2-6*dpr);

  ctx.fillStyle=ok?'#2ed573':'#ff6b6b';
  ctx.font=`${13*dpr}px system-ui`;
  ctx.fillText(state, pad+280*dpr, H/2);

  ctx.fillStyle=fg; ctx.font=`${10*dpr}px system-ui`;
  ctx.fillText(`V_CE = ${VCE.toFixed(2)}V | I_B_actual = ${(IB*1e6).toFixed(0)}µA | need = ${(IB_needed*1000).toFixed(2)}mA`, pad, pad-8*dpr);

  if(!ok && IB>0){
    ctx.fillStyle='#ffa502';
    ctx.fillText(`Fix: Reduce R_B to ${((Vd-0.7)/IB_needed/1000).toFixed(1)}kΩ`,pad+280*dpr,H/2+20*dpr);
  }
}
draw();
</script></body></html>
