<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>M3-M-3.2.2 MOSFET Power Switch</title>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--border:#cccccc;--text:#111111;--accent:#0066cc;--accent2:#0066cc;}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--accent:#0066cc;--accent2:#58a6ff;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:860px;margin:0 auto;}
h1{font-size:1.2rem;color:var(--accent2);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.note{font-size:0.85rem;color:var(--text);opacity:0.7;margin-bottom:12px;}
canvas{width:100%;height:260px;display:block;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.ctrl{display:flex;flex-direction:column;gap:3px;font-size:0.82rem;}
.ctrl label{color:var(--text);opacity:0.8;}
input[type=range]{width:160px;accent-color:var(--accent);}
.readouts{display:flex;flex-wrap:wrap;gap:12px;font-size:0.85rem;font-family:monospace;}
.ro{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--accent2);}
</style></head><body>
<h1>M3-M-3.2.2 — MOSFET Power Switch: Loss Budget</h1>
<p class="note">Adjust load current, frequency and gate drive to see conduction vs switching loss trade-off.</p>
<canvas id="cv"></canvas>
<div class="controls">
  <div class="ctrl"><label>I_D (A): <span id="idv">5</span></label><input type="range" id="id" min="0.1" max="50" value="5" step="0.1" oninput="sv('idv',parseFloat(this.value).toFixed(1));draw();"></div>
  <div class="ctrl"><label>R_on (mΩ): <span id="ronv">50</span></label><input type="range" id="ron" min="1" max="500" value="50" step="1" oninput="sv('ronv',this.value);draw();"></div>
  <div class="ctrl"><label>Q_g (nC): <span id="qgv">30</span></label><input type="range" id="qg" min="1" max="200" value="30" step="1" oninput="sv('qgv',this.value);draw();"></div>
  <div class="ctrl"><label>f_sw (kHz): <span id="fv">100</span></label><input type="range" id="fsw" min="1" max="2000" value="100" step="1" oninput="sv('fv',this.value);draw();"></div>
</div>
<div class="readouts">
  <div class="ro">P_cond: <span id="pc">0</span> W</div>
  <div class="ro">P_sw: <span id="ps">0</span> W</div>
  <div class="ro">P_gate: <span id="pg">0</span> mW</div>
  <div class="ro">P_total: <span id="pt">0</span> W</div>
  <div class="ro">Efficiency: <span id="eff">0</span> %</div>
</div>
<script>

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
function gs(id){return parseFloat(document.getElementById(id).value);}
function sv(id,val){document.getElementById(id).textContent=val;}
function resize(cv,draw){
  cv.width=cv.offsetWidth*devicePixelRatio;
  cv.height=260*devicePixelRatio;
  cv.style.height='260px';
  draw();
}
function drawAxes(ctx,W,H,pad,xl,yl,color){
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.fillStyle=color;ctx.font=`${11*devicePixelRatio}px system-ui`;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.fillText(xl,W-pad-30,H-pad+14*devicePixelRatio);
  ctx.save();ctx.translate(pad-14*devicePixelRatio,pad+30);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore();
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const VGS=10, VDS_switch=24, Pout=VDS_switch*5; // fixed 24V, 5A base
window.addEventListener('resize',()=>resize(cv,draw));

function draw(){
  const dpr=devicePixelRatio;
  cv.width=cv.offsetWidth*dpr; cv.height=260*dpr;
  const W=cv.width,H=cv.height,pad=55*dpr;
  const dark=isDark();
  const bg=dark?'#161b22':'#f5f5f5';
  const fg=dark?'#e6edf3':'#111111';
  const acc=dark?'#58a6ff':'#0066cc';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const ID=gs('id');
  const RON=gs('ron')/1000; // Ω
  const QG=gs('qg')*1e-9; // C
  const FSW=gs('fsw')*1000; // Hz

  const Rg=10; // 10 Ω gate resistor
  const t_sw = 2*QG/(VGS/Rg); // rise time
  const Pc = ID*ID*RON; // conduction loss (D=0.5)
  const Ps = 0.5*VDS_switch*ID*t_sw*FSW; // switching loss
  const Pg = QG*VGS*FSW; // gate drive
  const Ptot = Pc+Ps+Pg;
  const Pout_actual = VDS_switch*ID*0.5;
  const eff = Pout_actual/(Pout_actual+Ptot)*100;

  sv('pc',Pc.toFixed(2));
  sv('ps',Ps.toFixed(2));
  sv('pg',(Pg*1000).toFixed(1));
  sv('pt',Ptot.toFixed(2));
  sv('eff',eff.toFixed(1));

  // Bar chart showing loss components
  const categories=['P_cond','P_sw','P_gate','P_total'];
  const values=[Pc, Ps, Pg, Ptot];
  const colors=[acc,'#ff6b6b','#ffa502','#2ed573'];
  const maxV=Math.max(...values)*1.2+0.1;
  const bW=(W-2*pad)/5;
  const ys=(H-2*pad)/maxV;

  ctx.fillStyle=fg; ctx.font=`${10*dpr}px system-ui`;
  for(let i=0;i<=5;i++){
    const y=H-pad-i/5*maxV*ys;
    const v=(i/5*maxV).toFixed(1);
    ctx.fillText(v+'W',pad-30*dpr,y+4);
    ctx.beginPath();ctx.strokeStyle=dark?'#30363d':'#dddddd';ctx.lineWidth=0.5;
    ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();
  }

  categories.forEach((cat,i)=>{
    const x=pad+(i+0.5)*bW;
    const bh=Math.min(values[i]*ys, H-2*pad);
    ctx.fillStyle=colors[i];
    ctx.fillRect(x-bW/3,H-pad-bh,bW*0.66,bh);
    ctx.fillStyle=fg;
    ctx.font=`${9*dpr}px system-ui`;
    ctx.fillText(cat,x-18*dpr,H-pad+13*dpr);
    ctx.fillText(values[i].toFixed(2)+'W',x-18*dpr,H-pad-bh-5*dpr);
  });

  // Breakeven frequency text
  const f_break=Pc/(0.5*VDS_switch*ID*t_sw/QG*1e-3); // rough
  ctx.fillStyle=fg; ctx.font=`${11*dpr}px system-ui`;
  ctx.fillText(`P_cond=${Pc.toFixed(2)}W  P_sw=${Ps.toFixed(2)}W  P_gate=${(Pg*1000).toFixed(0)}mW  η=${eff.toFixed(1)}%`,pad,pad-8*dpr);
}
draw();
</script></body></html>
