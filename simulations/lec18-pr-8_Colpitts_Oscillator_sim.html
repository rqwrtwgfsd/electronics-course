<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lec 18 Pr 8 — Colpitts Oscillator</title>
<style>
  :root { --bg:#fff; --surface:#f5f5f5; --border:#ccc; --text:#1a1a1a; --accent:#0066cc; --muted:#666; }
  @media (prefers-color-scheme:dark) { :root { --bg:#1a1a1a; --surface:#2a2a2a; --border:#444; --text:#e8e8e8; --accent:#4499ff; --muted:#999; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; max-width:900px; margin:0 auto; }
  h1 { font-size:18px; margin-bottom:12px; border-bottom:2px solid var(--accent); padding-bottom:8px; }
  .layout { display:grid; grid-template-columns:1fr 260px; gap:16px; }
  canvas { border:1px solid var(--border); border-radius:4px; display:block; width:100%; }
  .controls { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px; }
  .ctrl-group { margin-bottom:12px; }
  label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; display:flex; justify-content:space-between; margin-bottom:4px; }
  .val { color:var(--accent); font-family:monospace; font-weight:700; }
  input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
  .info { background:rgba(0,102,204,0.08); border:1px solid rgba(0,102,204,0.2); border-radius:4px; padding:10px; margin-top:12px; font-size:12px; line-height:1.6; }
  @media (max-width:600px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>Pr 8 — Colpitts Oscillator: Frequency and Loop Gain</h1>
<div class="layout">
  <canvas id="cv" height="380"></canvas>
  <div class="controls">
    <div class="ctrl-group">
      <label>C1 (pF) <span class="val" id="v-c1">200</span></label>
      <input type="range" id="c1" min="50" max="2000" value="200" step="50">
    </div>
    <div class="ctrl-group">
      <label>C2 (pF) <span class="val" id="v-c2">820</span></label>
      <input type="range" id="c2" min="100" max="5000" value="820" step="100">
    </div>
    <div class="ctrl-group">
      <label>L (µH) <span class="val" id="v-l">150</span></label>
      <input type="range" id="lval" min="10" max="1000" value="150" step="10">
    </div>
    <div class="info" id="info">Adjust LC tank to tune frequency.</div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function resizeCanvas() {
  cv.width = cv.parentElement.getBoundingClientRect().width || 600;
  cv.height = 380;
}

function draw() {
  resizeCanvas();
  const W = cv.width, H = cv.height;
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const bg = dark ? '#1a1a1a' : '#ffffff';
  const fg = dark ? '#e8e8e8' : '#1a1a1a';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const C1 = +document.getElementById('c1').value * 1e-12;
  const C2 = +document.getElementById('c2').value * 1e-12;
  const L = +document.getElementById('lval').value * 1e-6;

  document.getElementById('v-c1').textContent = (C1*1e12).toFixed(0) + ' pF';
  document.getElementById('v-c2').textContent = (C2*1e12).toFixed(0) + ' pF';
  document.getElementById('v-l').textContent = (L*1e6).toFixed(0) + ' µH';

  const Cs = (C1 * C2) / (C1 + C2); // series capacitance
  const f0 = 1 / (2 * Math.PI * Math.sqrt(L * Cs));
  const feedback = C1 / C2;

  // BJT params (fixed: I_C=2mA)
  const IC = 2e-3;
  const gm = IC / 0.026;
  const RC = 2200;
  const r_pi = 200 / gm; // beta=200
  const Av = gm * (RC * r_pi / (RC + r_pi));
  const loop_gain = Av * feedback;

  // Draw simulated oscillation sine wave
  const pad = { l: 50, r: 20, t: 50, b: 50 };
  const pw = W - pad.l - pad.r;
  const ph = H - pad.t - pad.b;

  // Time axis: show 3 periods
  const T = 1 / f0;
  const t_total = 3 * T;
  const t_arr = [];
  const v_arr = [];
  const amp = loop_gain >= 1 ? 3 : 0.5; // oscillates if loop gain >= 1
  for (let i = 0; i <= 500; i++) {
    const t = t_total * i / 500;
    t_arr.push(t);
    v_arr.push(amp * Math.sin(2 * Math.PI * f0 * t));
  }

  const yScale = 5; // V peak
  ctx.strokeStyle = dark ? '#333' : '#eee'; ctx.lineWidth = 1;
  for (let v = -4; v <= 4; v += 2) {
    const y = pad.t + ph / 2 - (v / yScale) * (ph / 2);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    ctx.fillStyle = fg; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(v + 'V', pad.l - 4, y + 4);
  }

  // Plot
  ctx.beginPath();
  ctx.strokeStyle = loop_gain >= 1 ? '#1565c0' : '#9e9e9e';
  ctx.lineWidth = 2.5;
  v_arr.forEach((v, i) => {
    const x = pad.l + pw * i / 500;
    const y = pad.t + ph / 2 - (v / yScale) * (ph / 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Time axis
  ctx.strokeStyle = fg; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t + ph / 2); ctx.lineTo(pad.l + pw, pad.t + ph / 2); ctx.stroke();

  // Period marker
  const xT = pad.l + pw / 3;
  ctx.setLineDash([3, 3]);
  ctx.strokeStyle = '#fb8c00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xT, pad.t); ctx.lineTo(xT, pad.t + ph); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#fb8c00'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('T = ' + (T*1e6).toFixed(2) + 'µs', xT, pad.t + 14);

  ctx.fillStyle = fg; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(
    `f₀ = ${(f0/1e6).toFixed(3)} MHz  |  Loop Gain = ${loop_gain.toFixed(1)}  |  ${loop_gain >= 1 ? '✓ OSCILLATES' : '✗ No oscillation'}`,
    pad.l + pw / 2, pad.t - 10
  );

  ctx.fillStyle = fg; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Simulated output voltage (3 cycles shown)', pad.l + pw / 2, H - 10);

  document.getElementById('info').innerHTML =
    `<b>Tank parameters:</b><br>` +
    `C_series = ${(Cs*1e12).toFixed(1)} pF<br>` +
    `f₀ = ${(f0/1e6).toFixed(4)} MHz<br>` +
    `Feedback β = C1/C2 = ${feedback.toFixed(3)}<br>` +
    `|A_v| = ${Av.toFixed(1)}<br>` +
    `Loop gain = ${loop_gain.toFixed(2)}<br>` +
    `<b>${loop_gain >= 1 ? 'Barkhausen satisfied — oscillates' : 'Loop gain < 1 — no oscillation'}</b>`;
}

['c1','c2','lval'].forEach(id => document.getElementById(id).addEventListener('input', draw));
window.addEventListener('resize', draw);
draw();
</script>
</body>
</html>
